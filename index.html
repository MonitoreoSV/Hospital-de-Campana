  // Marca ⚠️ si lleva mucho en la fase (ayuda a priorizar y a detectar abandonos).
  function esperasHTML(d, ultEv, ahora){
    const ing=Number(d.tsMs)||0;
    const faseTs=Math.max(ing, ultEv[d.id]||0);
    const enFaseMs=ahora-faseTs, desdeMs=ahora-ing;
    const alerta = enFaseMs >= 2*3600000; // ≥2 h en la misma fase
    const enFaseTxt=(alerta?'⚠️ ':'')+'en fase '+fmtDur(enFaseMs);
    const desdeTxt='desde ingreso '+fmtDur(desdeMs);

  const cntInfec=()=>datosBase().filter(d=>d.sospechaInfeccion).length;

  const tieneColores = estados.includes(ESTADO.ESPERA_ROJO)||estados.includes(ESTADO.ESPERA_AMARILLO)||estados.includes(ESTADO.ESPERA_VERDE);

    if(tieneColores){

            '<button type="button" class="bp-chip" data-col="ESPERA VERDE">🟢 Verde ('+cnt("ESPERA VERDE")+')</button>';
    }
    html+='<button type="button" class="bp-chip bp-chip-infec" data-infec="1">🦠 Infección ('+cntInfec()+')</button>';
    if(tieneColores) html+='<button type="button" class="bp-chip bp-chip-orden" data-orden="1">↕ Orden: llegada</button>';
    chipsWrap.innerHTML=html;
    $$(".bp-chip[data-col]",chipsWrap).forEach(b=>b.addEventListener("click",()=>{
      colorFiltro=b.getAttribute("data-col");
      $$(".bp-chip[data-col]",chipsWrap).forEach(x=>x.classList.toggle("sel",x===b));
      pintar(input.value);
    }));
    const btnInfec=chipsWrap.querySelector(".bp-chip-infec");
    if(btnInfec) btnInfec.addEventListener("click",()=>{
      soloInfec=!soloInfec; btnInfec.classList.toggle("sel",soloInfec);
      pintar(input.value);

    const btnOrden=chipsWrap.querySelector(".bp-chip-orden");
    if(btnOrden) btnOrden.addEventListener("click",()=>{
      ordenActual = ordenActual==="prioridad" ? "fifo" : "prioridad";
      btnOrden.textContent = ordenActual==="fifo" ? "↕ Orden: llegada" : "↕ Orden: prioridad";
      pintar(input.value);
    });
  }
  input.placeholder = datosBase().length ? ("Filtrar por cédula o nombre… ("+datosBase().length+" en espera)") : "— No hay pacientes en espera —";
  let selId=null;
  function pintar(filtro){
    const n=normalizar(filtro||"");
    let vis=datosBase().filter(d=>!n||normalizar(d.busqueda).includes(n));
    if(colorFiltro) vis=vis.filter(d=>d.estado===colorFiltro);
    if(soloInfec) vis=vis.filter(d=>d.sospechaInfeccion);
    if(!vis.length){ lista.innerHTML='<div class="la-vacio">'+(datosBase().length?"Sin coincidencias.":"No hay pacientes en espera.")+'</div>'; return; }
    const ultEv=mapaUltEvento(), ahoraMs=Date.now();
    lista.innerHTML=vis.map((d,i)=>'<div class="la-row'+(d.id===selId?" sel":"")+'" data-id="'+d.id+'"><span class="la-pos">'+(i+1)+'</span><span class="la-ic">'+(iconos[d.estado]||"")+'</span><div class="la-main">'+esc(d.etiqueta)+(d.embarazada?' <span class="tag-emb">🤰</span>':'')+(d.sospechaInfeccion?' <span class="tag-infec">🦠</span>':'')+'<small>'+esperasHTML(d, ultEv, ahoraMs)+'</small></div></div>').join("");

function toast(tipo,msg){
  if(!msg) return;
  let cont=document.getElementById("toasts");
  if(!cont){ cont=document.createElement("div"); cont.id="toasts"; document.body.appendChild(cont); }
  const t=document.createElement("div"); t.className="toast toast-"+(tipo||"info");
  const ic=({ok:"✅",warn:"⚠️",error:"⛔",info:"ℹ️"})[tipo]||"ℹ️";
  t.innerHTML='<span class="toast-ic">'+ic+'</span><span class="toast-msg"></span><button class="toast-x" type="button" aria-label="Cerrar">✕</button>';
  t.querySelector(".toast-msg").textContent=msg;
  cont.appendChild(t);
  const quitar=()=>{ if(!t.parentNode) return; t.classList.add("saliendo"); setTimeout(()=>{ if(t.parentNode) t.parentNode.removeChild(t); },220); };
  t.querySelector(".toast-x").addEventListener("click",quitar);
  const dur=(tipo==="warn"||tipo==="error")?9000:3500;
  const tmr=setTimeout(quitar,dur);
  t.addEventListener("click",e=>{ if(e.target.classList.contains("toast-x")) clearTimeout(tmr); });
  requestAnimationFrame(()=>t.classList.add("visible"));
}

/* --- Modal de confirmación (Promise<bool> o Promise<string> si requiereComentario) --- */
function confirmar(titulo, detalleHTML, opciones){
  opciones=opciones||{};
  const pideCom=!!opciones.requiereComentario;
  return new Promise(res=>{
    const f=document.createElement("div"); f.className="modal-fondo";
    f.innerHTML='<div class="modal"><h3>'+esc(titulo)+'</h3><div class="modal-cuerpo">'+(detalleHTML||"")+'</div>'+
      (pideCom?'<label class="modal-coment-l">'+esc(opciones.comentarioLabel||"Comentario del cambio de estado *")+'</label><textarea class="modal-coment" placeholder="Obligatorio: qué se decidió y por qué"></textarea><div class="modal-coment-err" style="display:none">Escribe un comentario para continuar.</div>':'')+
      '<div class="modal-acciones"><button class="btn-sec" data-a="0">'+esc(opciones.cancelar||"Cancelar")+'</button><button class="btn-ok" data-a="1">'+esc(opciones.ok||"Confirmar")+'</button></div></div>';
    document.body.appendChild(f);
    const ta=f.querySelector(".modal-coment"), err=f.querySelector(".modal-coment-err");
    if(ta) setTimeout(()=>{ try{ta.focus();}catch(e){} },30);
    function cerrar(v){ if(f.parentNode) document.body.removeChild(f); res(v); }
    f.addEventListener("click",e=>{
      if(e.target===f){ cerrar(pideCom?"":false); return; }
      const a=e.target.getAttribute("data-a"); if(a===null) return;
      if(a==="0"){ cerrar(pideCom?"":false); return; }
      if(pideCom){
        const txt=(ta.value||"").trim();
        if(!txt){ err.style.display="block"; try{ta.focus();}catch(x){} return; }
        cerrar(txt);
      } else { cerrar(true); }
    });
  });
}

/* --- Registro con confirmación + anti-duplicado (deshabilita botón hasta guardar) --- */
async function registrar(btn, confInfo, tablas, fn, contexto){
  if(ocupado){ mostrarAviso("warn","⏳ Guardando… espera un momento antes de volver a tocar."); return; }
  let comentario="";
  if(confInfo){
    const opc={ok:confInfo.ok||"Sí, registrar"};
    if(confInfo.comentario){ opc.requiereComentario=true; opc.comentarioLabel=confInfo.comentarioLabel||"Comentario del cambio de estado *"; }
    const r=await confirmar(confInfo.titulo, confInfo.detalle, opc);
    if(!r) return;
    if(confInfo.comentario) comentario=String(r);
  }
  ocupado=true; const t0=btn?btn.textContent:""; if(btn){ btn.disabled=true; btn.textContent="Guardando…"; }
  let mutado=false;
  try{
    const r=fn(comentario); mutado=true;
    prepararLog(confInfo?confInfo.titulo:moduloActual, r.mensaje);
    try{ await commitAll(conLog(tablas)); }
    catch(sync){ ocupado=false; renderModulo((contexto&&contexto.volverA)||moduloActual, {tipo:"warn", msg:sync.message}, contexto); return; }
    ocupado=false;
    renderModulo((contexto&&contexto.volverA)||moduloActual, {tipo:"ok", msg:r.mensaje}, contexto);
  }catch(err){
    ocupado=false; if(btn){ btn.disabled=false; btn.textContent=t0; }
    if(!mutado) mostrarAviso("error", err.message); else renderModulo((contexto&&contexto.volverA)||moduloActual,{tipo:"error",msg:err.message},contexto);
  }
}

/* ===== Seguimiento post-traslado (v8.86) =============================
   Pantalla propia para pacientes ya TRASLADADOS. Muestra el contexto clínico
   EN VIVO (solo lectura: datos de ingreso + lo que registraron los médicos en
   Triaje/Consulta/Estabilización + bitácora) y un seguimiento EDITABLE guardado
   en la hoja SeguimientoTraslado (append-only: una fila por nota → el merge
   nota-por-nota es automático, no se pierde ninguna nota aunque dos equipos
   editen el mismo caso sin señal). Editable por admin y coordinación. */
let segTrasFiltro="abiertos", segTrasSel=null;
function segTrasNotasDe(pid){
  return DB.seguimientoTraslado.filter(r=>String(r.idPaciente)===String(pid))
    .sort((a,b)=>(Number(a.tsMs)||0)-(Number(b.tsMs)||0));
}
function segTrasEstado(pid){
  const notas=segTrasNotasDe(pid);
  const ultimo=(tipo)=>{ let r=null; notas.forEach(n=>{ if(n.tipo===tipo) r=n; }); return r; };
  const dxRow=ultimo("diagnostico");
  const extrasMap={}; notas.forEach(n=>{ if(n.tipo==="extra") extrasMap[n.titulo||""]=n; });
  let cierre=null; notas.forEach(n=>{ if(n.tipo==="cierre"||n.tipo==="apertura") cierre=n; });
  return {
    evolucion:(function(){ var edit={},del={}; notas.forEach(function(n){ if(n.tipo==="evolucionEdit"){var t=String(n.meta||"");if(t)edit[t]=n;} else if(n.tipo==="evolucionDel"){var t=String(n.meta||"");if(t)del[t]=1;} }); return notas.filter(function(n){return n.tipo==="evolucion" && !del[String(n.tsMs)];}).map(function(n){ var e=edit[String(n.tsMs)]; return e?Object.assign({},n,{texto:e.texto,editado:true}):n; }); })(),
    pendiente:(ultimo("pendiente")||{}).texto||"",
    diagnostico:(dxRow||{}).texto||"",
    dxEnEstudio:!!(dxRow && String(dxRow.meta||"").indexOf("enEstudio")>=0),
    estatus:(ultimo("estatus")||{}).texto||"",
    fechaRow:(ultimo("fecha")||{}).texto||"",
    abierto:!(cierre && cierre.tipo==="cierre"),
    extras:Object.keys(extrasMap).map(t=>({titulo:t, texto:extrasMap[t].texto||""})).filter(e=>e.texto)
  };
}

  const t=parseFechaHoraStr(p.actualizado); if(t) return _stFechaDe(t);

  if(p.fecha) facts.push(["Ingreso", p.fecha]);

  const factsHTML=facts.map(f=>'<span class="st-fact"><b>'+esc(f[0])+':</b> '+esc(f[1])+'</span>').join("");
  const prev=[];
  DB.triage.filter(r=>String(r.id)===String(p.id)).forEach(t=>{
    const txt=[t.motivos,t.observaciones].filter(Boolean).join(" · ");
    prev.push({ts:Number(t.tsMs)||parseFechaHoraStr(t.fechaHora), fuente:"Triaje"+(t.codigo?" ("+t.codigo+")":""), texto:txt||"(sin nota)"});
  });
  DB.consulta.filter(r=>String(r.id)===String(p.id)).forEach(c=>{
    const txt=[c.motivo?("Motivo: "+c.motivo):"", c.diagnostico?("Dx: "+c.diagnostico):"", c.desenlace?("Desenlace: "+c.desenlace):"", c.observaciones].filter(Boolean).join(" · ");
    prev.push({ts:Number(c.tsMs)||parseFechaHoraStr(c.fechaHora), fuente:"Consulta"+(c.medico?" · "+c.medico:""), texto:txt||"(sin nota)"});
  });
  DB.estabilizacion.filter(r=>String(r.id)===String(p.id)).forEach(e=>{
    const txt=[e.solucion?("Sol.: "+e.solucion):"", e.medicamentosIV?("Med IV: "+e.medicamentosIV):"", e.desenlace?("Desenlace: "+e.desenlace):"", e.obsSalida||e.obsEntrada].filter(Boolean).join(" · ");
    prev.push({ts:Number(e.tsMs)||parseFechaHoraStr(e.fechaHora), fuente:"Estabilización", texto:txt||"(sin nota)"});
  });
  prev.sort((a,b)=>(a.ts||0)-(b.ts||0));
  let prevHTML=prev.map(n=>'<div class="st-prev-nota"><div class="meta">'+esc(_stFechaDe(n.ts))+' · '+esc(n.fuente)+'</div>'+esc(n.texto)+'</div>').join("");
  if(p.descripcion) prevHTML+='<div class="st-prev-nota"><div class="meta">Bitácora del paciente</div>'+esc(p.descripcion)+'</div>';
  if(!prevHTML) prevHTML='<div class="st-src">Sin historia clínica previa registrada.</div>';
  return '<div class="st-ctx">'+
    '<div class="st-ctx-lbl">Datos iniciales del ingreso <span class="st-ro">solo lectura</span></div>'+
    '<div class="st-facts">'+(factsHTML||'<span class="st-src">Sin datos iniciales.</span>')+'</div>'+
    '<div class="st-ctx-lbl" style="margin-top:11px">Historia clínica previa — lo que registraron los médicos <span class="st-ro">solo lectura</span></div>'+
    '<div class="st-prev">'+prevHTML+'</div>'+
    '<div class="st-src">Traído en vivo de Ingreso, Triaje, Consulta, Estabilización y la bitácora. No se edita aquí.</div>'+
  '</div>';
}
function segTrasResumen(p, est){
  const edad=(p.edad!==""?p.edad+" años":"");
  const nom=p.noIdentificado?etiquetaPaciente(p):(nombreCompleto(p)+(edad?" – "+edad:""));
  const L=[nom];
  const f=segTrasFechaTraslado(p,est); if(f) L.push("• Fecha de traslado: "+f+".");
  const evo=est.evolucion.length?String(est.evolucion[est.evolucion.length-1].texto||"").trim():"";
  if(evo) L.push(evo);
  if(est.pendiente) L.push("• Pendiente: "+est.pendiente);
  if(est.diagnostico) L.push("• Diagnóstico"+(est.dxEnEstudio?" (en estudio)":"")+": "+est.diagnostico);
  if(est.estatus) L.push("• Estatus"+(!est.abierto?" final":"")+": "+est.estatus);
  est.extras.forEach(x=>{ if(x.titulo||x.texto) L.push("• "+(x.titulo||"Nota")+": "+x.texto); });
  return L.join("\n");
}
async function segTrasGuardarIngreso(pid, campos){
  const p=DB.pacientes.find(x=>String(x.id)===String(pid)); if(!p) throw new Error("Paciente no encontrado.");
  const norm=(s)=>String(s==null?"":s).trim();
  const nc=norm(campos.contacto), nm=norm(campos.medPermanentes), no=norm(campos.observacionIngreso);
  if(nc===norm(p.contacto)&&nm===norm(p.medPermanentes)&&no===norm(p.observacionIngreso)){ mostrarAviso("warn","No cambiaste ningún dato de ingreso."); return; }
  p.contacto=nc; p.medPermanentes=nm; p.observacionIngreso=no; p.actualizado=ahoraStr(); p.actualizadoMs=Date.now();
  prepararLog("Editó datos de ingreso (post-traslado)", nombreCompleto(p));
  await commitAll(conLog(["pacientes"]));
}
async function segTrasAgregar(pid, tipo, titulo, texto, meta){
  const now=Date.now(), d=new Date(now);
  DB.seguimientoTraslado.push({ tsMs:now, idPaciente:String(pid), fecha:fechaHoy(d), hora:horaAhora(d), autor:(usuarioActual&&usuarioActual.nombre)||"", tipo:tipo, titulo:titulo||"", texto:texto||"", meta:meta||"" });
  const p=DB.pacientes.find(x=>String(x.id)===String(pid));
  prepararLog("SEGUIMIENTO POST-TRASLADO", ((p?nombreCompleto(p):pid))+" → "+tipo+(titulo?(" ("+titulo+")"):"")+(texto?": "+texto.slice(0,80):""));
  await commitAll(conLog(["seguimientoTraslado"]));
}
async function segTrasGuardarCampos(pid, prev, campos){
  const p=DB.pacientes.find(x=>String(x.id)===String(pid));
  const norm=(s)=>String(s==null?"":s).trim();
  const fechaMostrada=p?segTrasFechaTraslado(p,prev):"";
  const tasks=[];
  if(norm(campos.fecha) && norm(campos.fecha)!==norm(fechaMostrada)) tasks.push(["fecha","",norm(campos.fecha),""]);
  if(norm(campos.pendiente)!==norm(prev.pendiente)) tasks.push(["pendiente","",norm(campos.pendiente),""]);
  if(norm(campos.diagnostico)!==norm(prev.diagnostico) || (!!campos.dxEnEstudio)!==(!!prev.dxEnEstudio)) tasks.push(["diagnostico","",norm(campos.diagnostico), campos.dxEnEstudio?"enEstudio":""]);
  if(norm(campos.estatus)!==norm(prev.estatus)) tasks.push(["estatus","",norm(campos.estatus),""]);
  if(!tasks.length){ mostrarAviso("warn","No hay cambios que guardar."); return; }
  const base=Date.now(), d=new Date(base);
  tasks.forEach((t,i)=>DB.seguimientoTraslado.push({ tsMs:base+i, idPaciente:String(pid), fecha:fechaHoy(d), hora:horaAhora(d), autor:(usuarioActual&&usuarioActual.nombre)||"", tipo:t[0], titulo:t[1], texto:t[2], meta:t[3] }));
  prepararLog("SEGUIMIENTO POST-TRASLADO", ((p?nombreCompleto(p):pid))+" → actualizó "+tasks.map(t=>t[0]).join(", "));
  await commitAll(conLog(["seguimientoTraslado"]));
}

/* ---- Buscador global (pacientes, veterinaria, inventario, usuarios) ---- */
function moduloPermitido(m){ return !!(usuarioActual && ROLES[usuarioActual.rol] && ROLES[usuarioActual.rol].modulos.includes(m)); }
let bgQuery="";
function resultadosBuscadorGlobal(q){
  const n=normalizar(q);
  if(!n) return {pac:[],vet:[],inv:[],usr:[]};
  const pac = moduloPermitido("pacientes") ? DB.pacientes.filter(p=>normalizar([p.nombre,p.apellido,p.cedula,p.repCedula,p.id,p.descripcion].join(" ")).includes(n)).slice(0,8) : [];
  const vet = moduloPermitido("pacientes") ? DB.consultaVet.filter(r=>normalizar([r.nombreAnimal,r.propietario,r.cedulaPropietario,r.especie].join(" ")).includes(n)).slice(0,6) : [];
  const inv = moduloPermitido("inventario") ? getInventario(DB).filter(it=>normalizar(it.item).includes(n)).slice(0,6) : [];
  const usr = (usuarioActual && usuarioActual.rol==="admin" && DB._usuariosCargados) ? DB.usuarios.filter(u=>normalizar([u.usuario,u.nombre,ROLES[u.rol]?ROLES[u.rol].nombre:u.rol].join(" ")).includes(n)).slice(0,6) : [];
  return {pac,vet,inv,usr};
}
function abrirBuscadorGlobal(){
  bgQuery="";
  if(usuarioActual && usuarioActual.rol==="admin" && !DB._usuariosCargados){
    cargarUsuariosSiFalta().then(()=>pintarBuscadorGlobal());
  }
  const f=document.createElement("div"); f.className="modal-fondo bg-fondo"; f.id="bgFondo";
  f.innerHTML='<div class="modal bg-modal"><div class="bg-head"><input type="search" id="bgInput" placeholder="Buscar paciente, animal, insumo, usuario…" autocomplete="off"><button class="btn-sec bg-x" id="bgCerrar" type="button">✕</button></div><div id="bgResultados" class="bg-resultados"></div></div>';
  document.body.appendChild(f);
  $("#bgCerrar").addEventListener("click", cerrarBuscadorGlobal);
  f.addEventListener("click", e=>{ if(e.target===f) cerrarBuscadorGlobal(); });
  $("#bgInput").addEventListener("input", e=>{ bgQuery=e.target.value; pintarBuscadorGlobal(); });
  pintarBuscadorGlobal();
  setTimeout(()=>{ const i=$("#bgInput"); if(i) i.focus(); }, 60);
}
function cerrarBuscadorGlobal(){ const f=document.getElementById("bgFondo"); if(f && f.parentNode) f.parentNode.removeChild(f); }
function irABuscadorResultado(tipo, ref){
  cerrarBuscadorGlobal();
  if(tipo==="pac") renderModulo("pacientes", null, {abrirId:ref});
  else if(tipo==="vet") renderModulo("pacientes", null, {abrirVetIdx:ref});
  else if(tipo==="inv"){ invSub="stock"; renderModulo("inventario"); }
  else if(tipo==="usr") renderModulo("usuarios");
}
function pintarBuscadorGlobal(){
  const cont=document.getElementById("bgResultados"); if(!cont) return;
  if(!bgQuery.trim()){ cont.innerHTML='<div class="vacio">Escribe para buscar en pacientes, veterinaria, inventario'+(usuarioActual&&usuarioActual.rol==="admin"?" y usuarios":"")+'.</div>'; return; }
  const r=resultadosBuscadorGlobal(bgQuery);
  const total=r.pac.length+r.vet.length+r.inv.length+r.usr.length;
  if(!total){ cont.innerHTML='<div class="vacio">Sin coincidencias.</div>'; return; }
  let html="";
  if(r.pac.length) html+='<div class="bg-grupo"><div class="bg-grupo-t">🧑 Pacientes</div>'+r.pac.map(p=>'<div class="bg-item" data-t="pac" data-r="'+esc(p.id)+'">'+esc(etiquetaPaciente(p))+(p.embarazada?' <span class="tag-emb">🤰</span>':'')+' <small class="mut">· '+esc(ESTADO_LABEL[p.estado]||p.estado)+'</small></div>').join("")+'</div>';
  if(r.vet.length) html+='<div class="bg-grupo"><div class="bg-grupo-t">🐾 Veterinaria</div>'+r.vet.map(v=>'<div class="bg-item" data-t="vet" data-r="'+DB.consultaVet.indexOf(v)+'">'+esc(v.nombreAnimal||"(sin nombre)")+' · '+esc(v.especie||"")+' <small class="mut">· '+esc(v.propietario||"")+'</small></div>').join("")+'</div>';
  if(r.inv.length) html+='<div class="bg-grupo"><div class="bg-grupo-t">📦 Inventario</div>'+r.inv.map(it=>'<div class="bg-item" data-t="inv" data-r="'+esc(it.item)+'">'+esc(it.item)+' <small class="mut">· stock '+it.stock+(it.unidad?" "+esc(it.unidad):"")+'</small></div>').join("")+'</div>';
  if(r.usr.length) html+='<div class="bg-grupo"><div class="bg-grupo-t">👥 Usuarios</div>'+r.usr.map(u=>'<div class="bg-item" data-t="usr" data-r="'+esc(u.usuario)+'">'+esc(u.nombre||u.usuario)+' <small class="mut">· @'+esc(u.usuario)+' · '+(ROLES[u.rol]?esc(ROLES[u.rol].nombre):esc(u.rol))+'</small></div>').join("")+'</div>';
  cont.innerHTML=html;
  $$(".bg-item",cont).forEach(el=>el.addEventListener("click",()=>{
    const t=el.getAttribute("data-t"), r=el.getAttribute("data-r");
    irABuscadorResultado(t, t==="vet"?+r:r);
  }));
}
function restaurarOLogin(){
  const s=sesionGuardada();
  if(s && s.usuario && s.rol){
    // La sesión guarda usuario+rol+nombre validados en su momento; se restaura
    // sin volver a consultar la lista (que ya no vive en el navegador).
    iniciarSesionCon({usuario:s.usuario, rol:s.rol, nombre:s.nombre||s.usuario, activo:true}, true);
    return;
  }
  renderLogin();
}
async function loginRemoto(usuario){
  if(MODO!=="sheet"){ return {ok:false, error:"Sin conexión con el servidor. Revisa tu internet."}; }
  try{
    const j=await apiPost({op:"login", usuario});
    return j;
  }catch(e){ return {ok:false, error:"No se pudo validar (sin conexión): "+e.message}; }
}
function renderLogin(){
  clearInterval(dashTimer); clearInterval(syncRolTimer);
  // Precalentamiento: un ping diminuto en segundo plano mientras la persona
  // escribe su usuario. Establece la conexión (DNS+TLS) y "despierta" el
  // servidor, así el botón Entrar responde ~0.5–1s más rápido. Si falla, no
  // pasa nada: el login funciona igual.
  if(MODO==="sheet" && API_URL){ try{ fetch(API_URL+(API_URL.indexOf("?")>=0?"&":"?")+"action=ping"+(CLAVE_API?"&k="+encodeURIComponent(CLAVE_API):""), {method:"GET"}).catch(()=>{}); }catch(e){} }
  const app=$("#app");
  app.innerHTML =
    '<div class="login-wrap"><div class="login-card">'+
      '<img class="login-logo" src="'+LOGO_SRC+'" alt="Misión Humanitaria"><h1>Hospital de Campaña</h1><p class="login-sub">Misión Humanitaria · La Güaira - Catia La Mar</p>'+
      '<form id="loginForm">'+
        '<label>Usuario</label><input id="lu" autocomplete="off" autocapitalize="off" autofocus>'+
        '<div class="aviso error" id="loginErr" style="display:none"></div>'+
        '<button class="btn" type="submit" id="loginBtn">Entrar</button>'+
      '</form>'+
      '<div class="login-ver">v'+VERSION+'</div>'+
    '</div></div>';
  $("#loginForm").addEventListener("submit",async e=>{
    e.preventDefault();
    const u=val("#lu").trim();
    const err=$("#loginErr");
    if(!u){ err.style.display="block"; err.textContent="Escribe tu usuario."; return; }
    const btn=$("#loginBtn"); btn.disabled=true; const t0=btn.textContent; btn.textContent="Validando…";
    const r=await loginRemoto(u);
    btn.disabled=false; btn.textContent=t0;
    if(!r.ok){ err.style.display="block"; err.textContent=r.error||"Usuario no encontrado."; return; }
    if(!ROLES[r.usuario.rol]){ err.style.display="block"; err.textContent="El rol del usuario no es válido. Contacta al administrador."; return; }
    iniciarSesionCon({usuario:r.usuario.usuario, rol:r.usuario.rol, nombre:r.usuario.nombre||r.usuario.usuario, activo:true});
  });
}

  { const ci=$("#i_cedula"); if(ci){ ci.addEventListener("change",chequearReingreso); ci.addEventListener("blur",chequearReingreso); } }

    registrar(btn, {titulo:reingresoDe?"Confirmar reingreso":"Confirmar ingreso", detalle, ok:"Sí, registrar"}, ["pacientes"], ()=>registrarPaciente(DB,datos), {volverA:"ingreso"});
  });
}

function cerrarSueroSiAbierto(db,id,nota,resp,obsSal){

      r.horaFin=horaAhora(); r.desenlace=nota||r.desenlace; if(resp)r.respSalida=resp; if(obsSal)r.obsSalida=obsSal; return true;

  }
  const soloInfecSala=!!salaFiltroInfec[cfg.mod];
  const salaFiltrada = soloInfecSala ? sala.filter(p=>p.sospechaInfeccion) : sala;
  const nInfec=todas.filter(p=>p.sospechaInfeccion).length;
  c.innerHTML='<div class="tarjeta"><h2>'+cfg.titulo+'</h2><p class="desc">'+todas.length+' paciente(s). '+cfg.desc+'</p>'+
      bannerSobrecupo(cfg.mod)+
      '<input class="es-buscar" id="salaBuscar" placeholder="🔍 Buscar paciente por nombre o documento…" value="'+esc(salaFiltro[cfg.mod]||"")+'">'+
      '<div class="bp-chips" style="margin-top:8px"><button type="button" class="bp-chip'+(!soloInfecSala?" sel":"")+'" id="salaTodos">Todos ('+todas.length+')</button><button type="button" class="bp-chip bp-chip-infec'+(soloInfecSala?" sel":"")+'" id="salaInfec">🦠 Infección ('+nInfec+')</button></div>'+
      avisoHTML()+'</div>'+
    (salaFiltrada.length?salaFiltrada.map(p=>'<div class="tarjeta es-wrap">'+card(p)+'</div>').join(""):'<div class="tarjeta"><div class="vacio">'+(q||soloInfecSala?"Ningún paciente coincide con el filtro.":"No hay pacientes aquí ahora.")+'</div></div>');

  const chTodos=$("#salaTodos"), chInfec=$("#salaInfec");
  if(chTodos) chTodos.addEventListener("click",()=>{ salaFiltroInfec[cfg.mod]=false; renderModulo(cfg.mod); });
  if(chInfec) chInfec.addEventListener("click",()=>{ salaFiltroInfec[cfg.mod]=true; renderModulo(cfg.mod); });

  // Buscador (conserva foco y cursor al re-renderizar)
  const bq=$("#salaBuscar");
  if(bq) bq.addEventListener("input",()=>{ salaFiltro[cfg.mod]=bq.value; const pos=bq.selectionStart; renderModulo(cfg.mod); const n=$("#salaBuscar"); if(n){ n.focus(); try{ n.setSelectionRange(pos,pos); }catch(e){} } });

  // Montar selectores de medicamentos (uno por paciente); aviso informativo de stock
  if(cfg.conTratamiento){
    sala.forEach(p=>{
      const selId="selMedSala_"+p.id;
      if($("#"+selId)) montarSelectorItems(selId,(nombre,cant)=>avisoStockItem(nombre,cant));
    });
  }

  // Confirmar / descartar sospecha de infección
  $$(".infec-btn").forEach(btn=>btn.addEventListener("click",async()=>{
    const id=btn.getAttribute("data-id"); const esConfirmar=btn.classList.contains("confirmar");
    const ok=await confirmar(esConfirmar?"Confirmar infección":"Descartar sospecha", esConfirmar?"El paciente queda marcado como infección confirmada.":"Se quitará el tag de sospecha de infección.", {ok:"Sí"});
    if(!ok) return;
    ocupado=true;
    try{ const r=resolverInfeccion(DB,id,esConfirmar); prepararLog(esConfirmar?"Confirmó infección":"Descartó infección", id); await commitAll(conLog(["pacientes"])); ocupado=false; renderModulo(cfg.mod,{tipo:"ok",msg:r.mensaje}); }
    catch(e){ ocupado=false; renderModulo(cfg.mod,{tipo:"warn",msg:e.message}); }
  }));

  // GUARDAR EVOLUCIÓN: nota + tratamiento + medicamentos, todo en una acción
  $$(".es-guardar").forEach(btn=>btn.addEventListener("click",async()=>{
    const id=btn.getAttribute("data-id"); const p=DB.pacientes.find(x=>x.id===id); if(!p) return;
    const cont=btn.closest(".es-acciones");
    const obs=cont.querySelector(".es-obs").value.trim();
    const trat=cfg.conTratamiento?cont.querySelector(".es-trat").value.trim():"";
    const _mp=cont.querySelector(".es-medperm"); if(_mp) p.medPermanentes=_mp.value.trim();
    const selId="selMedSala_"+id;
    const meds=cfg.conTratamiento?serializeItems(selId):"";
    if(!obs && !trat && !meds){ mostrarAviso("warn","Escribe una observación, un tratamiento o agrega medicamentos."); return; }
    const resumen=[trat, meds].filter(Boolean).join(" · ");
    const ok=await confirmar("Guardar evolución", '<b>'+esc(etiquetaPaciente(p))+'</b>'+(obs?'<br>Obs: '+esc(obs):'')+(resumen?'<br>'+esc(resumen):''), {ok:"Sí, guardar"});
    if(!ok) return;
    btn.disabled=true; ocupado=true;
    try{
      const partes=[];
      // En estabilización, guardar cualquier evolución significa que el paciente
      // ya está siendo atendido en camilla. Si todavía figura "en espera"
      // (ESPERA_ESTABILIZACION), lo pasamos a SUERO_EN_CURSO aunque no haya
      // medicamento — así deja de aparecer como "en espera".
      if(cfg.mod==="estabilizacion" && p.estado===ESTADO.ESPERA_ESTABILIZACION){
        registrarEstabEntrada(DB,{id, solucion:trat||"(en camilla)", volumen:"", medicamentosIV:meds, observaciones:obs, responsable:usuarioActual.nombre});
        if(meds && trat) descontarInsumos(DB, meds, "Medicación en "+cfg.titulo, id, usuarioActual.nombre);
        if(trat) partes.push("Tratamiento: "+trat);
        if(meds) partes.push("Meds: "+meds);
      } else if(cfg.conTratamiento && (trat||meds)){
        if(p.estado!==ESTADO.SUERO_EN_CURSO){
          registrarEstabEntrada(DB,{id, solucion:trat||"(medicación)", volumen:"", medicamentosIV:meds, observaciones:obs, responsable:usuarioActual.nombre});
        }else{
          // ya en camilla: descuenta meds y registra la actualización en la evolución
          if(meds) descontarInsumos(DB, meds, "Medicación en "+cfg.titulo, id, usuarioActual.nombre);
          p.estabUltAct=Date.now();
        }
        if(trat) partes.push("Tratamiento: "+trat);
        if(meds) partes.push("Meds: "+meds);
      }
      const notaFinal=[obs, partes.join(" · ")].filter(Boolean).join(" — ");
      if(notaFinal){ p.descripcion=(p.descripcion?p.descripcion+" | ":"")+_hNota()+" ["+usuarioActual.usuario+"] "+notaFinal; }
      if(p.estado===ESTADO.SUERO_EN_CURSO) p.estabUltAct=Date.now();
      p.actualizado=ahoraStr(); p.actualizadoMs=Date.now();
      prepararLog("Evolución en "+cfg.titulo, etiquetaPaciente(p)+(notaFinal?": "+notaFinal:""));
      await commitAll(conLog(["pacientes","estabilizacion","inventario","movimientos"]));
      ocupado=false; renderModulo(cfg.mod,{tipo:"ok",msg:"Evolución guardada."});
    }catch(e){ ocupado=false; renderModulo(cfg.mod,{tipo:"warn",msg:e.message}); }
  }));

  // CIERRE: a consulta / estabilización / traslado / alta (según cfg.salidas)
  $$(".es-out").forEach(btn=>btn.addEventListener("click",async()=>{
    const id=btn.getAttribute("data-id"), acc=btn.getAttribute("data-a");
    const p=DB.pacientes.find(x=>x.id===id); if(!p) return;
    const _cont=btn.closest(".es-acciones");
    const _mpC=_cont.querySelector(".es-medperm"); if(_mpC) p.medPermanentes=_mpC.value.trim();
    const dxF=_cont.querySelector(".es-cierre-dx").value.trim();
    const queP=_cont.querySelector(".es-cierre-obs").value.trim();
    if(!dxF){ mostrarAviso("error","El diagnóstico final es obligatorio."); return; }
    const obs="Dx final: "+dxF+(queP?" | Qué pasará: "+queP:"");
    const titulos={consulta:"Volver a consulta", estabilizacion:"Pasar a estabilización", traslado:"Escalar paciente", alta:"Dar de alta", saludmental:"Derivar a salud mental"};
    const ok=await confirmar(titulos[acc], '<b>'+esc(etiquetaPaciente(p))+'</b><br>Comentario: '+esc(obs), {ok:"Sí, confirmar"});
    if(!ok) return;
    btn.disabled=true;
    try{
      ocupado=true;
      cerrarSueroSiAbierto(DB,id, acc==="consulta"?"Devuelto a consulta":acc==="saludmental"?"Derivado a salud mental":acc.toUpperCase(), usuarioActual.nombre, obs);
      p.estado = acc==="alta"?ESTADO.ALTA
               : acc==="traslado"?ESTADO.TRASLADO_PENDIENTE
               : acc==="estabilizacion"?ESTADO.ESPERA_ESTABILIZACION
               : acc==="saludmental"?ESTADO.SALUD_MENTAL
               : acc==="consulta"?colorEsperaDe(DB,id)
               : p.estado;
      _bumpMov(p); p.estabUltAct=""; p.actualizado=ahoraStr(); p.actualizadoMs=Date.now();
      // v8.93 FIX: este camino (tablero de camillas de estabilización/salud mental)
      // asigna el estado directo y NO pasaba por actualizarEstado, así que las altas
      // dadas desde aquí quedaban SIN CIERRE (ms). Eso obligaba a deducir el día de
      // egreso por el fallback (ULTIMA ACTUALIZACION) y volvía frágil la atribución
      // de día. Se sella igual que actualizarEstado (línea ~1113).
      if(ESTADOS_FINALES.includes(p.estado) && !p.cierreTsMs) p.cierreTsMs=Date.now();
      p.descripcion=(p.descripcion?p.descripcion+" | ":"")+_hNota()+" ["+usuarioActual.usuario+"] "+obs;
      prepararLog(titulos[acc], etiquetaPaciente(p)+" — "+obs);
      await commitAll(conLog(["pacientes","estabilizacion"]));
      ocupado=false; renderModulo(cfg.mod,{tipo:"ok",msg:"Listo."});
    }catch(e){ ocupado=false; renderModulo(cfg.mod,{tipo:"warn",msg:e.message}); }
  }));
}

let invSub="stock";

/* Carga SheetJS bajo demanda (solo al primer «Exportar»), desde cdnjs. Se
   cachea la promesa para no reinyectar el script. Requiere conexión: si falla
   la descarga, se avisa y no se cae la app. Solo se usa para GENERAR .xlsx
   (no se leen archivos ajenos, así que los avisos de parseo de SheetJS no
   aplican). */
const SHEETJS_URL="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
let _sheetJSProm=null;
function cargarSheetJS(){
  if(window.XLSX) return Promise.resolve(window.XLSX);
  if(_sheetJSProm) return _sheetJSProm;
  _sheetJSProm=new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src=SHEETJS_URL; s.async=true;
    s.onload=()=>{ if(window.XLSX) res(window.XLSX); else { _sheetJSProm=null; rej(new Error("SheetJS no se inicializó.")); } };
    s.onerror=()=>{ _sheetJSProm=null; rej(new Error("No se pudo descargar el generador de Excel. Revisa la conexión e intenta de nuevo.")); };
    document.head.appendChild(s);
  });
  return _sheetJSProm;
}
/* Exporta el inventario a un .xlsx con dos hojas: «Stock» (existencias
   actuales) y «Movimientos» (historial completo de entradas/salidas). */
async function exportarInventarioExcel(btn){
  let t0="⬇️ Exportar a Excel";
  if(btn){ t0=btn.textContent; btn.disabled=true; btn.textContent="Generando…"; }
  try{
    const XLSX=await cargarSheetJS();
    const stock=getInventario(DB);
    const estadoTxt=it=>it.sinStock?"NO HAY":it.bajoStock?"QUEDA POCO":it.porAgotarse?"POR AGOTARSE":"HAY";
    const hojaStock=[["Ítem","Categoría","Unidad","Stock","Mínimo","Estado","Área","Última actualización"]]
      .concat(stock.map(it=>[it.item, catNorm(it.categoria), it.unidad||"", Number(it.stock)||0, Number(it.minimo)||0, estadoTxt(it), it.area, it.actualizado||""]));
    const movs=DB.movimientos.filter(m=>String(m.item||"").trim());
    const hojaMovs=[["Fecha/Hora","Ítem","Tipo","Cantidad","Saldo resultante","Origen/Motivo","Referencia","Responsable"]]
      .concat(movs.map(m=>[m.fechaHora||"", m.item||"", m.tipo||"", Number(m.cantidad)||0, Number(m.saldo)||0, m.origen||"", m.referencia||"", m.responsable||""]));
    const wb=XLSX.utils.book_new();
    const ws1=XLSX.utils.aoa_to_sheet(hojaStock);
    ws1["!cols"]=[{wch:38},{wch:16},{wch:10},{wch:8},{wch:8},{wch:14},{wch:16},{wch:20}];
    const ws2=XLSX.utils.aoa_to_sheet(hojaMovs);
    ws2["!cols"]=[{wch:20},{wch:38},{wch:9},{wch:9},{wch:16},{wch:30},{wch:16},{wch:18}];
    XLSX.utils.book_append_sheet(wb, ws1, "Stock");
    XLSX.utils.book_append_sheet(wb, ws2, "Movimientos");
    const now=new Date();
    const nombre="inventario_"+now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+"_"+pad(now.getHours())+pad(now.getMinutes())+".xlsx";
    XLSX.writeFile(wb, nombre);
    mostrarAviso("ok","Excel generado: "+nombre+" — "+stock.length+" ítem(s), "+movs.length+" movimiento(s).");
  }catch(e){ mostrarAviso("error", e.message||"No se pudo exportar."); }
  finally{ if(btn){ btn.disabled=false; btn.textContent=t0; } }
}

/* ---- utilidades de rango para el tablero ---- */
let dashRango="hoy"; // hoy | ayer | 7d | todo
/* Huso (horas tras UTC) con que se define el "día" del tablero y los reportes.
   6 = El Salvador (donde se leen los reportes); 4 = Venezuela (donde ocurre el operativo).
   Cambiar SOLO este número para alternar. */
const HUSO_DIA = 6;
function _medianocheHoy(){ const z=new Date(Date.now()-HUSO_DIA*3600000); return Date.UTC(z.getUTCFullYear(), z.getUTCMonth(), z.getUTCDate()) + HUSO_DIA*3600000; } /* medianoche de HOY en el huso del reporte, no del dispositivo */
// Día de referencia para las tarjetas "de hoy". Normal = hoy (sin tope superior,
// idéntico al comportamiento previo). Con "ayer" se corre un día y se ACOTA por
// arriba a la medianoche de hoy, para mostrar solo el día anterior.
function diaRef0(){ const t=_medianocheHoy(); return dashRango==="ayer" ? t-86400000 : t; }
function diaRef1(){ return dashRango==="ayer" ? _medianocheHoy() : Infinity; }
function enDia(ts){ ts=Number(ts)||0; return ts>=rangoDesde() && ts<rangoHasta(); } /* v8.91 FIX: sigue el rango del tablero. hoy/ayer idénticos a antes; 7d/todo ya no colapsaban a "hoy" (por eso las tarjetas salían en cero al filtrar). */
function _horaDia(ts){ return new Date((Number(ts)||0)-HUSO_DIA*3600000).getUTCHours(); } /* v8.78 (1A): hora del día (0-23) en el huso del tablero (El Salvador), no del dispositivo — así las barras horarias se ven iguales miren desde donde miren */
// Período para métricas acumuladas. "ayer" = solo ese día; hoy/7d/todo como antes.
function rangoDesde(){ const now=Date.now(); if(dashRango==="hoy") return _medianocheHoy(); if(dashRango==="ayer") return _medianocheHoy()-86400000; if(dashRango==="7d") return now-7*86400000; return 0; }
function rangoHasta(){ return dashRango==="ayer" ? _medianocheHoy() : Infinity; }
function enRango(ts){ ts=Number(ts)||0; return ts>=rangoDesde() && ts<rangoHasta(); }
/* Flujo por etapas del período (para el funnel) */
function flujoEtapas(db){
  const d0=rangoDesde();
  const ing=db.pacientes.filter(p=>(p.tsMs||0)>=d0).length;
  const tri=db.triage.filter(r=>(r.tsMs||0)>=d0).length;
  const desc=db.triage.filter(r=>(r.tsMs||0)>=d0&&r.codigo==="DESCARTADO").length;
  const con=db.consulta.filter(r=>(r.tsMs||0)>=d0).length;
  const est=db.estabilizacion.filter(r=>(r.tsMs||0)>=d0).length;
  const alt=db.consulta.filter(r=>(r.tsMs||0)>=d0&&/alta/i.test(r.desenlace||"")).length
          + db.estabilizacion.filter(r=>(r.tsMs||0)>=d0&&/alta/i.test(r.desenlace||"")).length;
  const tra=db.traslados.filter(r=>(r.tsMs||0)>=d0).length;
  return [
    {n:"Ingresos", v:ing, c:"#0F47AF"},
    {n:"Triage", v:tri, c:"#1565c0"},
    // Aparte del flujo de atención: no fueron tratados, se determinó en
    // Triage que el caso está fuera del alcance de la misión.
    {n:"Descartados (fuera del alcance)", v:desc, c:"#66707C"},
    {n:"Consulta", v:con, c:"#2e7d32"},
    {n:"Estabilización", v:est, c:"#00838f"},
    {n:"Egresos (altas + escalamientos)", v:alt+tra, c:"#5c6b78"}
  ];
}
function funnelSVG(fases){
  const max=Math.max(1,...fases.map(f=>f.v));
  return '<div class="funnel">'+fases.map((f,i)=>{
    const pct=fases[0].v?Math.round(f.v/fases[0].v*100):0;
    const w=Math.max(6,Math.round(f.v/max*100));
    return '<button class="fun-fila" data-i="'+i+'"><span class="fun-nom">'+f.n+'</span>'+
      '<span class="fun-pista"><span class="fun-bar" style="width:'+w+'%; background:'+f.c+'"></span></span>'+
      '<span class="fun-val">'+f.v+(i?'<small>'+pct+'%</small>':'<small>100%</small>')+'</span></button>';
  }).join("")+'</div><div id="funDet" class="mut" style="font-size:12px; min-height:16px"></div>';
}
/* History line: serie temporal según rango */
function serieHistoria(db){
  const d0=rangoDesde(), now=Date.now();
  const porHora=dashRango==="hoy";
  const paso=porHora?3600000:86400000;
  const ini=porHora?d0:(dashRango==="7d"?d0:(()=>{ const ts=[...db.pacientes,...db.consulta,...db.traslados].map(r=>r.tsMs||0).filter(Boolean); return ts.length?Math.min(...ts):now-86400000; })());
  const nb=Math.max(1,Math.min(porHora?24:60, Math.ceil((now-ini)/paso)+1));
  const mk=()=>new Array(nb).fill(0);
  const S={ingresos:mk(), atenciones:mk(), egresos:mk()};
  const idx=ts=>{ const i=Math.floor((ts-ini)/paso); return (i>=0&&i<nb)?i:-1; };
  db.pacientes.forEach(p=>{ const i=idx(p.tsMs||0); if(i>=0)S.ingresos[i]++; });
  db.triage.forEach(r=>{ const i=idx(r.tsMs||0); if(i>=0)S.atenciones[i]++; });
  db.consulta.forEach(r=>{ const i=idx(r.tsMs||0); if(i>=0){S.atenciones[i]++; if(/alta/i.test(r.desenlace||""))S.egresos[i]++;} });
  db.estabilizacion.forEach(r=>{ const i=idx(r.tsMs||0); if(i>=0&&/alta/i.test(r.desenlace||""))S.egresos[i]++; });
  db.traslados.forEach(r=>{ const i=idx(r.tsMs||0); if(i>=0)S.egresos[i]++; });
  const et=[]; for(let i=0;i<nb;i++){ const t=new Date(ini+i*paso); et.push(porHora? pad(_horaDia(ini+i*paso))+"h" : pad(t.getDate())+"/"+pad(t.getMonth()+1)); } /* v8.78 (1A): etiqueta horaria en el huso del tablero */
  return {S, et, nb};
}
/* Flujo por HORA DEL DÍA (0–23h) agregando TODOS los días del período filtrado.
   Sirve para ver el patrón horario tomando datos de varios días a la vez. */
function serieHora(db){
  const nb=24, mk=()=>new Array(nb).fill(0);
  const S={ingresos:mk(), atenciones:mk(), egresos:mk()};
  const hr=ts=>{ ts=Number(ts)||0; return (ts&&enRango(ts))?_horaDia(ts):-1; }; /* v8.78 (1A) */
  db.pacientes.forEach(p=>{ const i=hr(p.tsMs); if(i>=0)S.ingresos[i]++; });
  db.triage.forEach(r=>{ const i=hr(r.tsMs); if(i>=0)S.atenciones[i]++; });
  db.consulta.forEach(r=>{ const i=hr(r.tsMs); if(i>=0){S.atenciones[i]++; if(/alta/i.test(r.desenlace||""))S.egresos[i]++;} });
  db.estabilizacion.forEach(r=>{ const i=hr(r.tsMs); if(i>=0&&/alta/i.test(r.desenlace||""))S.egresos[i]++; });
  db.traslados.forEach(r=>{ const i=hr(r.tsMs); if(i>=0)S.egresos[i]++; });
  const et=[]; for(let i=0;i<nb;i++) et.push(pad(i)+"h");
  return {S, et, nb};
}
function historiaSVG(h){
  const W=620,H=170,P=26;
  const series=[["ingresos","#0F47AF","Ingresos"],["atenciones","#e8a000","Atenciones"],["egresos","#2e7d32","Egresos"]];
  const max=Math.max(1,...series.map(sr=>Math.max(...h.S[sr[0]])));
  const x=i=>P+(W-2*P)*(h.nb===1?0.5:i/(h.nb-1));
  const y=v=>H-P-(H-2*P)*(v/max);
  let g="";
  series.forEach(sr=>{
    const vals=h.S[sr[0]];
    g+='<path d="'+vals.map((v,i)=>(i?"L":"M")+x(i).toFixed(1)+" "+y(v).toFixed(1)).join(" ")+'" fill="none" stroke="'+sr[1]+'" stroke-width="2"/>';
    g+=vals.map((v,i)=>v?'<circle cx="'+x(i).toFixed(1)+'" cy="'+y(v).toFixed(1)+'" r="4.5" fill="'+sr[1]+'"><title>'+sr[2]+" · "+h.et[i]+" · "+v+'</title></circle>':"").join("");
  });
  const ejeX=h.et.map((e,i)=>(h.nb<=12||i%Math.ceil(h.nb/10)===0)?'<text x="'+x(i).toFixed(1)+'" y="'+(H-6)+'" font-size="9" fill="#66707C" text-anchor="middle">'+e+'</text>':"").join("");
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%; height:auto" role="img" aria-label="Actividad en el tiempo">'+
    '<line x1="'+P+'" y1="'+(H-P)+'" x2="'+(W-P)+'" y2="'+(H-P)+'" stroke="#d4dade"/>'+g+ejeX+'</svg>'+
    '<div class="hist-leg"><span style="color:#0F47AF">● Ingresos</span><span style="color:#b8730a">● Atenciones (triage+consulta)</span><span style="color:#2e7d32">● Egresos</span></div>';
}
/* Alarma de estabilización sin actualización */
function estabSinActualizar(db, mins){
  const lim=(mins||60)*60000, now=Date.now();
  return db.pacientes.filter(p=>p.estado===ESTADO.SUERO_EN_CURSO && p.estabUltAct && (now-p.estabUltAct)>lim);
}
/* ---- Seguimiento de casos críticos escalados (ambulancia → clínica) ----
   El seguimiento vive en el propio paciente (campo segTraslado, JSON), porque
   abarca desde que sigue "escalamiento pendiente" hasta que egresa "escalado":
   así persiste durante toda la vida del caso y se sincroniza por upsert (id).
   Formato: {"solicitada":{ts,cuando,resp},"enCamino":{...},"ingresado":{...}}
   Etapa faltante = aún no realizada. Es monotónico (no puedes marcar "en
   camino" sin "solicitada"). */
const ETAPAS_AMBULANCIA = [
  {k:"solicitada", ic:"📞", txt:"Ambulancia solicitada"},
  {k:"enCamino",   ic:"🚑", txt:"Ambulancia en camino"},
  {k:"ingresado",  ic:"🏥", txt:"Paciente ingresado a clínica privada"}
];
function segTrasladoDe(p){
  try{ const o=JSON.parse((p&&p.segTraslado)||"{}"); return (o&&typeof o==="object")?o:{}; }catch(e){ return {}; }
}
function nivelSeg(seg){ let n=0; for(const e of ETAPAS_AMBULANCIA){ if(seg&&seg[e.k]&&seg[e.k].ts) n++; else break; } return n; }
function puedeEditarSeg(){ return moduloPermitido("traslado"); } // admin y coordinación; "Solo tablero" queda de lectura
/* Avanza o deshace una etapa del seguimiento de ambulancia (monotónico) y
   persiste por el mismo camino que el resto de la app (commitAll + cola). */
async function toggleSegTraslado(pid, key){
  const p=DB.pacientes.find(x=>x.id===pid); if(!p) return;
  const idx=ETAPAS_AMBULANCIA.findIndex(e=>e.k===key); if(idx<0) return;
  const seg=segTrasladoDe(p);
  const yaHecho=!!(seg[key]&&seg[key].ts);
  // "🏥 Ingresó a clínica" es un EGRESO: al marcarlo el caso se cierra (pasa a
  // TRASLADADO). Deshacerlo el mismo día lo reabre, salvo que ya exista un
  // traslado formal registrado (esa fila es la fuente de verdad del cierre).
  const cerrando   = (key==="ingresado" && !yaHecho && p.estado!==ESTADO.TRASLADADO);
  const reabriendo = (key==="ingresado" &&  yaHecho && p.estado===ESTADO.TRASLADADO && !DB.traslados.some(t=>String(t.id)===String(pid)));
  if(cerrando){
    const ok=await confirmar("Cerrar caso escalado", "<b>"+esc(etiquetaPaciente(p))+"</b> quedará como <b>Trasladado (egresó)</b> al confirmar que ingresó a la clínica privada. ¿Continuar?", {ok:"Sí, cerrar"});
    if(!ok) return;
  }
  if(yaHecho){
    for(let i=idx;i<ETAPAS_AMBULANCIA.length;i++) delete seg[ETAPAS_AMBULANCIA[i].k]; // deshace esta y las posteriores
    if(reabriendo){ p.estado=ESTADO.TRASLADO_PENDIENTE; p.cierreTsMs=""; _bumpMov(p); p.actualizado=ahoraStr(); p.actualizadoMs=Date.now(); } // reabre el caso
  }else{
    const now=Date.now(), rsp=(usuarioActual&&usuarioActual.nombre)||"";
    for(let i=0;i<=idx;i++){ const k=ETAPAS_AMBULANCIA[i].k; if(!(seg[k]&&seg[k].ts)) seg[k]={ts:now, cuando:ahoraStr(), resp:rsp}; } // rellena las anteriores que falten
    if(cerrando){ actualizarEstado(DB, pid, ESTADO.TRASLADADO); } // egreso: cierra el caso
    // v8.41: si al marcar "ingresó a clínica" el paciente YA estaba TRASLADADO
    // (p. ej. una cola rezagada de otro equipo lo cerró antes) pero sin sello de
    // egreso, se completa aquí — evita traslados finales sin cierreTsMs (caso
    // observado). Usa la hora de la etapa de ingreso recién marcada.
    if(key==="ingresado" && p.estado===ESTADO.TRASLADADO && !p.cierreTsMs){
      p.cierreTsMs=(seg.ingresado&&seg.ingresado.ts)||now; p.actualizado=ahoraStr(); p.actualizadoMs=Date.now();
    }
  }
  p.segTraslado=JSON.stringify(seg);
  prepararLog("SEGUIMIENTO ESCALAMIENTO", (nombreCompleto(p)||p.id)+" → "+(yaHecho?"(deshecho) ":"")+ETAPAS_AMBULANCIA[idx].txt+(cerrando?" · CASO CERRADO (egresó)":reabriendo?" · CASO REABIERTO":""));
  await commitAll(conLog(["pacientes"]));
}
/* Lista los casos críticos escalados (pendientes + escalados de hoy) y, si hay
   uno seleccionado (doble clic), su panel de seguimiento debajo. */
function htmlSeguimientoEscalados(escSel){
  const H0=_medianocheHoy(); /* v8.78 (1A): corte de día = medianoche de El Salvador (huso del tablero), no la hora local del dispositivo */
  const cerradoHoy=(p)=>{ const c=Number(p.cierreTsMs)||0; if(c) return c>=H0; const t=parseFechaHoraStr(p.actualizado); return t?(t>=H0):((Number(p.tsMs)||0)>=H0); };
  const lista=DB.pacientes
    .filter(p=> p.estado===ESTADO.TRASLADO_PENDIENTE || (p.estado===ESTADO.TRASLADADO && cerradoHoy(p)) )
    .sort((a,b)=> (a.estado===ESTADO.TRASLADO_PENDIENTE?0:1)-(b.estado===ESTADO.TRASLADO_PENDIENTE?0:1) || (b.tsMs||0)-(a.tsMs||0) );
  const listaHTML=lista.map(p=>{
    const seg=segTrasladoDe(p), nv=nivelSeg(seg), pend=p.estado===ESTADO.TRASLADO_PENDIENTE;
    return '<div class="seg-item'+(escSel===p.id?" sel":"")+'" data-pid="'+esc(p.id)+'" title="Doble clic para ver el seguimiento">'+
      '<div class="seg-item-main"><b>'+esc(etiquetaPaciente(p))+'</b><small>'+(pend?"🚑 Escalamiento pendiente":"✅ Escalado (egresó hoy)")+' · '+(nv===0?"sin seguimiento":esc(ETAPAS_AMBULANCIA[nv-1].txt))+'</small></div>'+
      '</div>';
  }).join("");
  let det="";
  const psel=escSel?lista.find(p=>p.id===escSel):null;
  if(psel){
    const seg=segTrasladoDe(psel), nv=nivelSeg(seg), editable=puedeEditarSeg();
    det='<div class="seg-detalle"><div class="seg-det-cab"><b>'+esc(etiquetaPaciente(psel))+'</b><span class="mut">'+esc(ESTADO_LABEL[psel.estado]||psel.estado)+'</span></div>'+
      '<div class="seg-steps">'+ETAPAS_AMBULANCIA.map((e,i)=>{
        const done=!!(seg[e.k]&&seg[e.k].ts);
        const habil=editable && (done? (i===nv-1) : (i===nv)); // solo el borde: avanzar el siguiente o deshacer el último
        const info=done?('<small>'+esc(seg[e.k].cuando||"")+(seg[e.k].resp?" · "+esc(seg[e.k].resp):"")+'</small>'):'<small class="mut">pendiente</small>';
        return '<button type="button" class="seg-step'+(done?" done":"")+'"'+(habil?'':' disabled')+' data-seg="'+e.k+'" data-pid="'+esc(psel.id)+'">'+
          '<span class="seg-step-ic">'+(done?"✓":e.ic)+'</span><span class="seg-step-tx">'+esc(e.txt)+'</span>'+info+'</button>';
      }).join("")+'</div>'+
      '<div class="mut" style="font-size:11px; margin-top:8px">'+(editable?"Toca la siguiente etapa para avanzar, o la última marcada para deshacer.":"Tu rol es de solo lectura para este seguimiento.")+'</div>'+
    '</div>';
  }
  return '<h3 class="dash-h">🚑 Seguimiento de casos críticos escalados <small class="mut" style="text-transform:none">(doble clic en un caso para ver / actualizar la ambulancia)</small></h3>'+
    '<div class="seg-wrap"><div class="seg-lista">'+(lista.length?listaHTML:'<div class="vacio">Sin casos críticos escalados por ahora.</div>')+'</div>'+det+'</div>';
}

    const sinAct=estabSinActualizar(DB,60);
    const vetRango=DB.consultaVet.filter(r=>enRango(r.tsMs));
    const enSala=(cc["ESPERA ESTABILIZACION"]||0)+(cc["SUERO EN CURSO"]||0);
    const espR=cc["ESPERA ROJO"]||0, espA=cc["ESPERA AMARILLO"]||0, espV=cc["ESPERA VERDE"]||0;
    const enSaludMental=DB.pacientes.filter(p=>p.estado===ESTADO.SALUD_MENTAL).length;
    const kpi=(n,v,cl,al,sub)=>'<div class="kpi '+(cl||"")+(al?" alarma":"")+'"><b>'+(v||0)+'</b><span>'+n+'</span>'+(sub?'<small class="kpi-sub">'+sub+'</small>':'')+'</div>';
    const tiempo=(n,min,meta)=>{ if(min==null)return '<div class="tiempo"><b>—</b><small>'+n+'</small></div>'; const cl=meta?(min<=meta?"ok":"lento"):""; return '<div class="tiempo '+cl+'"><b>'+min+' min</b><small>'+n+(meta?" · meta ≤ "+meta:"")+'</small></div>'; };
    const tiempoCard=(titulo,sub,valor,pie)=>'<div class="tiempo"><b>'+esc(valor)+'</b><small>'+esc(titulo)+(sub?" · "+esc(sub):"")+'</small>'+(pie?'<small class="mut">'+esc(pie)+'</small>':'')+'</div>';

    const hoy0=diaRef0(), hoy1=diaRef1();
    const criticos=getInventario(DB).filter(it=>it.sinStock||it.bajoStock);
    // Derivaciones a Salud Mental: pueden venir de Triage (código SALUDMENTAL)
    // o de Consulta (desenlace "Derivado a salud mental"). Sumamos ambas vías.
    const derivSM=DB.triage.filter(r=>enDia(r.tsMs)&&r.codigo==="SALUDMENTAL").length
                + DB.consulta.filter(r=>enDia(r.tsMs)&&/salud mental/i.test(r.desenlace||"")).length;
    const vetHoy=DB.consultaVet.filter(r=>enDia(r.tsMs));
    const vetEnEstab=DB.pacientesVet.filter(p=>p.estado===VETESTADO.ESTABILIZACION).length;
    const vetInfeccion=DB.pacientesVet.filter(p=>p.sospechaInfeccion && !VETESTADOS_FINALES.includes(p.estado)).length;
    const noIdHoy=DB.pacientes.filter(p=>enDia(p.tsMs)&&p.noIdentificado).length;
    const refConf = r.si + r.no; // solo las ya confirmadas cuentan para la tasa
    const tRef = refConf>0 ? Math.round(r.si/refConf*100)+"%" : (tot>0?"sin confirmar":"—");
    const tmin=(v,meta)=>({v:(v!=null?v+" min":"—"), mal:(meta!=null&&v!=null&&v>meta)});

    // Nodo del timeline: número grande "ahora" + filas de datos del área
    function nodo(cfg){
      const filas=cfg.filas.map(x=>'<div class="row"><span>'+x[0]+'</span><b'+(x[2]?' class="mal"':'')+'>'+x[1]+'</b></div>').join("");
      return '<div class="tl-node'+(cfg.al?" alerta":"")+(cfg.vet?" vet":"")+(cfg.acento?" "+cfg.acento:"")+(zoom===cfg.id?" sel":"")+'">'+
        '<button class="tl-card" data-fase="'+cfg.id+'">'+
          '<div class="tl-big">'+cfg.n+'</div><div class="tl-cap">'+cfg.cap+'</div>'+
          (cfg.chips?'<div class="tl-chips">'+cfg.chips+'</div>':'')+
          '<div class="tl-rows">'+filas+'</div>'+
        '</button>'+
        '<div class="tl-conn"><div class="tl-dot">'+cfg.ic+'<span class="tl-badge">'+cfg.n+'</span>'+(cfg.al?'<span class="pipe-dot"></span>':'')+'</div></div>'+
        '<div class="tl-lbl">'+cfg.nombre+'</div>'+
      '</div>';
    }
    const chipsCon='<span class="sem-chip"><i class="sem-b" style="background:var(--rojo)"></i>'+espR+'</span>'+
                   '<span class="sem-chip"><i class="sem-b" style="background:var(--amarillo)"></i>'+espA+'</span>'+
                   '<span class="sem-chip"><i class="sem-b" style="background:var(--verde)"></i>'+espV+'</span>';

    const NODOS=[
      {id:"REC", nombre:"Recepción", ic:"🚪", n:h.ingresos, cap:"ingresos hoy", al:false,
       filas:[["Sin identificar hoy", noIdHoy],["Menores hoy", h.menores],["Embarazadas hoy", h.embarazadas],["🦠 Sospecha infección", infeccionActivos, infeccionActivos>0]],
       lista:()=>DB.pacientes.filter(p=>enDia(p.tsMs))},
      {id:"TRI", nombre:"Triage", ic:"🚦", n:cc["INGRESADO"]||0, cap:"en espera", al:(cc["INGRESADO"]||0)>=8,
       filas:[["Hechos hoy", h.triages],["Ingreso → triage", tmin(d.tiempos.ingresoTriage,30).v, tmin(d.tiempos.ingresoTriage,30).mal]],
       lista:()=>DB.pacientes.filter(p=>p.estado===ESTADO.INGRESADO)},
      {id:"CON", nombre:"Consulta", ic:"🩺", n:espR+espA+espV, cap:"en consulta", al:espR>0, chips:chipsCon,
       filas:[["Consultas hoy", h.consultas],["Triage → consulta", tmin(d.tiempos.triageConsulta,60).v, tmin(d.tiempos.triageConsulta,60).mal]],
       lista:()=>DB.pacientes.filter(p=>[ESTADO.ESPERA_ROJO,ESTADO.ESPERA_AMARILLO,ESTADO.ESPERA_VERDE].includes(p.estado))},
      {id:"EST", nombre:"Estabilización", ic:"🛏️", n:enSala, cap:"en camillas", al:sinAct.length>0,
       filas:[["+1 h sin actualizar", sinAct.length, sinAct.length>0],["Tratamientos hoy", h.sueros]],
       lista:()=>DB.pacientes.filter(p=>[ESTADO.ESPERA_ESTABILIZACION,ESTADO.SUERO_EN_CURSO].includes(p.estado))},
      {id:"SM", nombre:"Salud mental", ic:"🧠", n:enSaludMental, cap:"en atención", al:false, acento:"sm",
       filas:[["Derivaciones hoy", derivSM]],
       lista:()=>DB.pacientes.filter(p=>p.estado===ESTADO.SALUD_MENTAL)}
    ];
    const pipe = NODOS.map(f=>nodo(f)).join("");

    // Descartados es un desenlace TERMINAL (como Alta): va en la primera
    // línea de KPIs, no en el timeline — el timeline muestra el flujo vivo.

    // Línea veterinaria
    const estabVetHoy=DB.estabVet.filter(r=>enDia(r.tsMs));              // tratamientos vet registrados hoy
    const estabVetRango=DB.estabVet.filter(r=>enRango(r.tsMs));
    // v8.42: "esperando consulta" por EVIDENCIA (espejo del lado humano). Un
    // animal solo espera de verdad si NO tiene consulta registrada por ID VET.
    // Si tiene consulta pero su estado sigue en INGRESADO VET, es un revertido
    // (cola rezagada lo pisó) → NO cuenta como espera y se marca en Alertas.
    const _idsConConsultaVet=(()=>{ const s={}; DB.consultaVet.forEach(c=>{ if(c.idVet) s[c.idVet]=1; }); return s; })();
    const vetIngresadosRaw=DB.pacientesVet.filter(p=>p.estado===VETESTADO.INGRESADO);
    const vetRevertidos=vetIngresadosRaw.filter(p=>_idsConConsultaVet[p.id]);              // consultados pero atascados en INGRESADO
    const vetIngresados=vetIngresadosRaw.filter(p=>!_idsConConsultaVet[p.id]);             // esperan de verdad (sin consulta)
    const vetRegHoy=DB.pacientesVet.filter(p=>enDia(p.tsMs));             // animales ingresados hoy (flujo del día)
    const vetEstabHoy=vetHoy.filter(r=>/estabiliz/i.test(r.desenlace||"")).length; // consultas de hoy derivadas a estabilización
    // Timestamp del último cambio de estado del animal (para "altas vet en rango").
    // pacientesVet no tiene cierreTsMs, así que se resuelve con cadena de respaldo:
    // texto dd/MM/yyyy → ISO (por si el Sheet lo guardó como datetime) → tsMs (creación, mismo día).
    const _tsVetAct=p=>{ const t=parseFechaHoraStr(p.actualizado); if(t) return t; const d=Date.parse(p.actualizado); if(!isNaN(d)) return d; return Number(p.tsMs)||0; };
    const altasVet=DB.pacientesVet.filter(p=>/alta/i.test(p.estado||p.desenlace||"") && enRango(_tsVetAct(p))).length;
    const altasVetHoy=vetRegHoy.filter(p=>p.estado===VETESTADO.ALTA).length;
    const vetReferidosHoy=vetRegHoy.filter(p=>p.estado===VETESTADO.REFERIDO).length;
    // v8.48: "consultados hoy" = animales del día que YA pasaron de esperar
    // (cualquier estado distinto de INGRESADO VET). Cuenta ANIMALES, no eventos
    // del formulario de consulta (un animal puede tener varias consultas, y las
    // consultas viejas no tienen ID VET). Así el flujo cuadra:
    // ingresos hoy = esperando + consultados.
    const vetConsultadosHoy=vetRegHoy.filter(p=>p.estado!==VETESTADO.INGRESADO).length;
    // v8.53: "consultados" del PERÍODO (animales, no eventos), para que el KPI
    // "Consultas" y el gráfico por especie del Resumen también cuadren y nunca
    // superen los ingresos. Animales ingresados en el rango que ya pasaron de
    // "esperando" (cualquier estado distinto de INGRESADO VET).
    const vetConsultadosRangoArr=DB.pacientesVet.filter(p=>enRango(p.tsMs) && p.estado!==VETESTADO.INGRESADO);
    const vetConsultadosRango=vetConsultadosRangoArr.length;
    const eutanasiaVet=DB.pacientesVet.filter(p=>/eutanasia/i.test(p.estado||p.desenlace||"") && enRango(_tsVetAct(p))).length;
    const defuncionVet=DB.pacientesVet.filter(p=>/defuncion|defunción/i.test(p.estado||p.desenlace||"") && enRango(_tsVetAct(p))).length;
    const insumosVet={};                                                     // insumos IV consumidos en la sala vet (período)
    estabVetRango.forEach(r=>{ String(r.insumosIV||"").split(";").forEach(parte=>{ const m=parte.trim().match(/^(.*)\sx\s(\d+)$/); if(m){ const nom=m[1].trim(); insumosVet[nom]=(insumosVet[nom]||0)+(+m[2]); } else if(parte.trim()){ insumosVet[parte.trim()]=(insumosVet[parte.trim()]||0)+1; } }); });
    // "En proceso" (vet), igual que la humana: el número grande y sus filas
    // cuentan SOLO a los ingresados HOY (enDia sobre tsMs de ingreso), partidos
    // por su estado actual. "De días previos" es aparte y NO se suma al total
    // (espejo exacto de d.enProcesoHoy/d.enProcesoPrevios del lado humano).
    const vetEsperando=vetIngresados.filter(p=>enDia(p.tsMs)).length;         // esperando consulta, ingresados hoy
    const vetEnConsulta=vetRevertidos.filter(p=>enDia(p.tsMs)).length;       // en consulta (revertidos), ingresados hoy
    const vetEnEstabAhora=DB.pacientesVet.filter(p=>p.estado===VETESTADO.ESTABILIZACION && enDia(p.tsMs)).length; // en estabilización, ingresados hoy
    const vetEnProceso=vetEsperando+vetEnConsulta+vetEnEstabAhora;            // total = solo cohorte de hoy (excluye días previos)
    const vetActivos=DB.pacientesVet.filter(p=>!VETESTADOS_FINALES.includes(p.estado));
    const vetEnProcesoPrevios=vetActivos.filter(p=>!enDia(p.tsMs)).length;    // de días previos (informativo, no sumado al total)

    // --- Ingresos totales / hoy (vet): desglose por especie (top 3 + otras) + propietario + infección ---
    const _topEspeciesVet=(arr,n)=>{
      const cont={}; arr.forEach(p=>{ const e=String(p.especie||"").trim()||"Sin especificar"; cont[e]=(cont[e]||0)+1; });
      const ord=Object.entries(cont).sort((a,b)=>b[1]-a[1]);
      return {top:ord.slice(0,n), resto:ord.slice(n).reduce((s,x)=>s+x[1],0)};
    };
    const _filasEspeciesVet=(arr)=>{
      const {top,resto}=_topEspeciesVet(arr,3);
      const filas=top.map(x=>["🐾 "+x[0], x[1]]);
      if(resto>0) filas.push(["Otras especies", resto]);
      return filas;
    };
    const vetInfecTotal=DB.pacientesVet.filter(p=>p.sospechaInfeccion).length;
    const vetInfecHoy=vetRegHoy.filter(p=>p.sospechaInfeccion).length;

    // --- Altas hoy (vet), completa: espejo de la lógica humana — cuenta el alta
    // el día en que EGRESÓ (no en el que ingresó), y separa "de días previos"
    // comparando el día efectivo de ingreso (ID V-YYYYMMDD, o última reactivación
    // si es posterior) contra el día de referencia del tablero. También separa
    // el origen: si pasó por Estab. vet. o fue alta directa desde consulta.
    const _vetIdsConEstab=(()=>{ const s={}; DB.estabVet.forEach(r=>{ if(r.idVet) s[r.idVet]=1; }); return s; })();
    let vetAltasMismoDia=0, vetAltasDiasPrevios=0, vetAltasPorConsulta=0, vetAltasPorEstab=0;
    DB.pacientesVet.forEach(p=>{
      if(p.estado!==VETESTADO.ALTA) return;
      if(!enDia(_tsVetAct(p))) return;                                       // ¿egresó hoy?
      const _idm=String(p.id||"").match(/^V-(\d{4})(\d{2})(\d{2})/);
      let _ingNum=_idm?(+(_idm[1]+_idm[2]+_idm[3])):0;
      let _reactNum=0;
      try{
        const _re=/(\d{2})\/(\d{2})\/(\d{4})\s+\d{1,2}:\d{2}:\d{2}\s+REACTIVADO/g; let _rm;
        while((_rm=_re.exec(String(p.descripcion||"")))!==null){ const _n=+(_rm[3]+_rm[2]+_rm[1]); if(_n>_reactNum)_reactNum=_n; }
      }catch(e){}
      if(_reactNum>_ingNum) _ingNum=_reactNum;
      const _zr=new Date(diaRef0()-HUSO_DIA*3600000);
      const _refNum=_zr.getUTCFullYear()*10000+(_zr.getUTCMonth()+1)*100+_zr.getUTCDate();
      const _esPrevio=!!(_ingNum && _ingNum<_refNum);
      if(_esPrevio) vetAltasDiasPrevios++; else vetAltasMismoDia++;
      if(_vetIdsConEstab[p.id]) vetAltasPorEstab++; else vetAltasPorConsulta++;
    });
    // Referidos/Eutanasia/Defunción que EGRESARON hoy (mismo criterio enDia+
    // _tsVetAct que Altas hoy) — cierran el hueco: antes solo "Altas hoy" tenía
    // tarjeta y los otros desenlaces posibles del vet quedaban invisibles.
    const vetReferidosEgresoHoy=DB.pacientesVet.filter(p=>p.estado===VETESTADO.REFERIDO && enDia(_tsVetAct(p))).length;
    const vetEutanasiaEgresoHoy=DB.pacientesVet.filter(p=>p.estado===VETESTADO.EUTANASIA && enDia(_tsVetAct(p))).length;
    const vetDefuncionEgresoHoy=DB.pacientesVet.filter(p=>p.estado===VETESTADO.DEFUNCION && enDia(_tsVetAct(p))).length;
    // Headline de "Altas hoy" = suma de TODOS los desenlaces de hoy mostrados en
    // la tarjeta (no solo Alta). "De días previos" queda como dato informativo
    // aparte (ya viene incluido dentro de Por consulta/Por estabilización).
    const vetAltasHoyTotal = vetAltasPorConsulta + vetAltasPorEstab + vetReferidosEgresoHoy + vetEutanasiaEgresoHoy + vetDefuncionEgresoHoy;
    const VNODOS=[
      {id:"VREC", nombre:"Recepción vet", ic:"🐾", vet:true, n:vetRegHoy.length, cap:"ingresos hoy", al:false,
       filas:[["Total histórico", DB.pacientesVet.length],["Sin propietario", DB.pacientesVet.filter(r=>!r.propietario||/no identificado/i.test(r.propietario)).length]],
       lista:()=>vetRegHoy},
      {id:"VING", nombre:"Ingresado", ic:"🐾", vet:true, n:vetEsperando, cap:"esperando consulta", al:false,
       filas:[["Ingresos hoy", vetRegHoy.length]].concat(vetEnConsulta>0?[["En consulta (rezagados)", vetEnConsulta]]:[]),
       lista:()=>vetIngresados},
      {id:"VCON", nombre:"Consultas y altas vet", ic:"🩺", vet:true, n:vetConsultadosHoy, cap:"consultados hoy", al:false,
       filas:[["Altas vet hoy", altasVetHoy]].concat(vetReferidosHoy>0?[["Referidos hoy", vetReferidosHoy]]:[]),
       lista:()=>vetRegHoy.filter(p=>p.estado!==VETESTADO.INGRESADO).sort((a,b)=>(a.tsMs||0)-(b.tsMs||0))},
      {id:"VEST", nombre:"Estab. vet", ic:"🩹", vet:true, n:vetEstabHoy, cap:"estabilización hoy", al:false,
       filas:[["En tratamiento ahora", vetEnEstab]],
       lista:()=>DB.pacientesVet.filter(p=>p.estado===VETESTADO.ESTABILIZACION)}
    ];
    const pipeVet = VNODOS.map(f=>nodo(f)).join("");

    let detalle="";
    if(zoom){
      const todos=[...NODOS,...VNODOS];
      const f=todos.find(x=>x.id===zoom);
      const lista=f?f.lista().sort((a,b)=>(a.tsMs||0)-(b.tsMs||0)):[];
      const esVet=zoom.charAt(0)==="V";
      detalle='<div class="caja pipe-zoom"><h3>'+f.ic+' '+f.nombre+' · '+lista.length+'</h3>'+
        (lista.length? lista.map((p,i)=>{
          const tarde=p.estado===ESTADO.SUERO_EN_CURSO && p.estabUltAct && (Date.now()-p.estabUltAct)>3600000;
          const nom= esVet? ('🐾 '+esc(p.nombreAnimal||"(sin nombre)")+' · '+esc(p.especie||"")) : esc(etiquetaPaciente(p));
          const est= esVet? "" : ' <small style="display:inline">· '+esc(ESTADO_LABEL[p.estado]||p.estado)+'</small>';
          return '<div class="zoom-fila'+(tarde?" tarde":"")+'"><span class="la-pos">'+(i+1)+'</span><div class="zoom-main">'+nom+est+(tarde?' <b style="color:var(--rojo)">· +1 h sin actualización</b>':'')+'<small>'+(esVet?"":"ingresó "+esc(horaVEcorta(p.tsMs, p.hora)))+((p.descripcion||"").trim()?' · 📝 '+esc((p.descripcion||"").split(" | ").pop()):'')+'</small></div></div>';
        }).join("") : '<div class="vacio">Sin registros en esta etapa.</div>')+
        '</div>';
    }

    const alertasExtra=[...d.alertas];
    // v8.91: reactivaciones que abarcan MÁS DE UN DÍA. Una reactivación legítima
    // deshace un alta del mismo turno; si el paciente reaparece 2+ días calendario
    // después, no es reactivación sino un NUEVO episodio unido al mismo ID por
    // cédula (upsertById). Se compara el día del ID de ingreso (P-YYYYMMDD) contra
    // el día de cada marca "DD/MM/YYYY … REACTIVADO" (ambos en hora local del
    // operativo, sin ruido de huso). Umbral: gap > 1 día.
    const _reactLargas=(()=>{ const out=[];
      DB.pacientes.forEach(p=>{ const desc=String(p.descripcion||""); if(desc.indexOf("REACTIVADO")<0) return;
        const idm=String(p.id||"").match(/^[A-Za-z]*-?(\d{4})(\d{2})(\d{2})/); if(!idm) return;
        const ing=Date.UTC(+idm[1],+idm[2]-1,+idm[3]); let peor=0;
        const re=/(\d{2})\/(\d{2})\/(\d{4})\s+\d{1,2}:\d{2}:\d{2}\s+REACTIVADO/g; let m;
        while((m=re.exec(desc))!==null){ const rd=Date.UTC(+m[3],+m[2]-1,+m[1]); const dias=Math.round((rd-ing)/86400000); if(dias>peor) peor=dias; }
        if(peor>1) out.push({p,dias:peor});
      }); return out; })();
    if(_reactLargas.length) alertasExtra.unshift("♻️ "+_reactLargas.length+" reactivación(es) de MÁS DE UN DÍA (probable nuevo episodio unido al mismo ID por cédula, no una reactivación): "+_reactLargas.slice(0,5).map(x=>(nombreCompleto(x.p)||x.p.id)+" ("+x.dias+" días)").join(", ")+(_reactLargas.length>5?"…":"")+". Revisa en registro si debe separarse como consulta nueva.");
    if(sinAct.length) alertasExtra.unshift("🔔 "+sinAct.length+" paciente(s) en estabilización con MÁS DE 1 HORA sin actualización: "+sinAct.map(p=>nombreCompleto(p)||p.id).join(", "));
    /* v8.39: DETECTOR DE REGRESIONES. Si un paciente tiene consulta con ALTA
       pero su estado no es final, algo lo revirtió (cola offline rezagada que
       pisó la fila, o guard del backend inactivo). Es la señal inequívoca del
       problema: el tablero la vigila SIEMPRE y avisa apenas aparece, en vez de
       descubrirlo días después. Se corrige con la reconciliación. */
    const _altasRev=(()=>{ const alta={}; DB.consulta.forEach(c=>{ if(c.id && /alta/i.test(c.desenlace||"")) alta[c.id]=1; }); return DB.pacientes.filter(p=>alta[p.id] && !ESTADOS_FINALES.includes(p.estado)); })();
    if(_altasRev.length) alertasExtra.unshift("🛑 "+_altasRev.length+" paciente(s) con ALTA médica pero estado revertido (sincronización rezagada): "+_altasRev.slice(0,5).map(p=>nombreCompleto(p)||p.id).join(", ")+(_altasRev.length>5?"…":"")+". Corre la reconciliación y verifica que el backend desplegado sea el actual.");
    // v8.43: detector de reversiones de TRIAGE. Paciente con triage registrado
    // (hoja Triage, append-only) pero estado revertido a INGRESADO → reaparece
    // en la lista de triage. Es el síntoma que reporta el personal: "completo el
    // triage y vuelve a salir". Señal de que una cola rezagada pisó el color y/o
    // el guard del backend no está desplegado.
    const _triageRev=(()=>{ const tri={}; DB.triage.forEach(t=>{ if(t.id) tri[t.id]=1; }); return DB.pacientes.filter(p=>tri[p.id] && p.estado===ESTADO.INGRESADO); })();
    if(_triageRev.length) alertasExtra.unshift("🛑 "+_triageRev.length+" paciente(s) con TRIAGE hecho pero estado revertido a «sin clasificar» (reaparecen en la lista de triage): "+_triageRev.slice(0,5).map(p=>nombreCompleto(p)||p.id).join(", ")+(_triageRev.length>5?"…":"")+". Corre la reconciliación y verifica que el backend desplegado sea el actual (banner de versión).");
    // v8.42: detector de reversiones VETERINARIAS (espejo del humano). Animal
    // con consulta registrada (por ID VET) pero atascado en INGRESADO VET.
    if(vetRevertidos.length) alertasExtra.unshift("🛑 "+vetRevertidos.length+" animal(es) con consulta veterinaria pero estado revertido a «esperando» (sincronización rezagada): "+vetRevertidos.slice(0,5).map(p=>(p.especie?p.especie+" ":"")+(p.nombreAnimal||p.id)).join(", ")+(vetRevertidos.length>5?"…":"")+". Corre la reconciliación vet.");

    // Card aparte: Inventario (no es fase del recorrido)

/* ---- Médicos y veterinarios (catálogo para desplegables) ----
   Una sola tabla `medicos` con campo `tipo` ('medico' | 'veterinario').
   Filas antiguas sin tipo se tratan como 'medico' (compatibilidad). */
function tipoDe(m){ return String(m.tipo||"medico").toLowerCase()==="veterinario"?"veterinario":"medico"; }
function medicosActivos(tipo){ return DB.medicos.filter(m=>m.activo!==false && (!tipo||tipoDe(m)===tipo)).sort((a,b)=>String(a.nombre).localeCompare(String(b.nombre),"es")); }
/* Desplegable con búsqueda: usa <datalist>. tipo opcional filtra el catálogo
   ('medico' para Consulta, 'veterinario' para Veterinaria). */
function selectorMedicoHTML(id, valor, tipo){
  const lista=medicosActivos(tipo);
  const etq=tipo==="veterinario"?"veterinario":"médico";
  if(!lista.length) return '<input id="'+id+'" list="'+id+'_dl" autocomplete="off" placeholder="No hay '+etq+'s cargados — pídele al admin que los agregue" value="'+esc(valor||"")+'"><datalist id="'+id+'_dl"></datalist>';
  return '<input id="'+id+'" list="'+id+'_dl" autocomplete="off" placeholder="Escribe o elige un '+etq+'…" value="'+esc(valor||"")+'">'+
    '<datalist id="'+id+'_dl">'+lista.map(m=>'<option value="'+esc(m.nombre)+'">'+(m.especialidad?esc(m.especialidad):'')+'</option>').join("")+'</datalist>';
}

let pacFiltro={txt:"", tipo:"hum", est:"activos", emb:false, finDia:"todos"};
/* Formatea la marca temporal de un evento del historial para que se lea claro:
   devuelve {hora:"HH:MM", fecha:"DD/MM/AAAA"}. Acepta el string "DD/MM/AAAA
   HH:MM:SS" (quita segundos) y, si falta o no se puede leer, usa el ts numérico. */
function fmtHoraEvento(horaStr, ts){
  let f="", h="";
  const s=String(horaStr||"").trim();
  if(s){
    // Admite "AAAA-MM-DD HH:MM", ISO "AAAA-MM-DDTHH:MM", "DD/MM/AAAA HH:MM".
    s.split(/[ T]/).forEach(x=>{
      x=x.trim(); if(!x) return;
      if(/^\d{4}-\d{2}-\d{2}$/.test(x)){                 // fecha ISO AAAA-MM-DD
        if(x!=="1899-12-30"){ const p=x.split("-"); f=p[2]+"/"+p[1]+"/"+p[0]; } // ignora epoch basura de Sheets
      } else if(x.indexOf("/")>=0){ f=x; }               // fecha DD/MM/AAAA
      else if(x.indexOf(":")>=0){ h=x.split(":").slice(0,2).join(":"); } // hora HH:MM (sin segundos)
    });
  }
  if((!h||!f) && ts){                                     // completa lo que falte desde el epoch confiable
    try{ const d=new Date(Number(ts)); if(!isNaN(d.getTime())){ if(!f) f=pad(d.getDate())+"/"+pad(d.getMonth()+1)+"/"+d.getFullYear(); if(!h) h=pad(d.getHours())+":"+pad(d.getMinutes()); } }catch(e){}
  }
  if(h) h=h+" h"; // hora militar (24h) con sufijo, para diferenciar mañana/tarde
  return {hora:h, fecha:f};
}
/* --- Hora en un huso fijo a partir del epoch (tsMs), sin depender del reloj del
   dispositivo. offH = horas de diferencia con UTC (Venezuela=4, El Salvador=6). --- */
function horaEnHuso(ts, offH){ const d=new Date(Number(ts)-offH*3600000); return {h:pad(d.getUTCHours())+":"+pad(d.getUTCMinutes()), f:pad(d.getUTCDate())+"/"+pad(d.getUTCMonth()+1)+"/"+d.getUTCFullYear()}; }
/* Epoch confiable desde tsMs, o parseando la cadena (ISO con Z, "AAAA-MM-DD HH:MM",
   "DD/MM/AAAA HH:MM"). 0 si no se puede. */
function tsDe(tsMs, str){ const t=Number(tsMs); if(t) return t; if(str){ const p=parseFechaHoraStr(str); if(p) return p; const d=Date.parse(str); if(!isNaN(d)) return d; } return 0; }
/* Para el historial: hora Venezuela + hora El Salvador + fecha (VE). */
function fmtHoraDual(ts, horaStr){
  const t=tsDe(ts,horaStr);
  if(t){ const ve=horaEnHuso(t,4), sv=horaEnHuso(t,6); return {hora:ve.h, sub:sv.h, fecha:ve.f, dual:true}; }
  const b=fmtHoraEvento(horaStr,0); return {hora:b.hora, sub:"", fecha:b.fecha, dual:false};
}
/* Para celdas de tablas: fecha + ambas horas en dos líneas. Se usa SIN esc(). */
function horaDualCelda(ts, fallback){
  const t=tsDe(ts,fallback); if(!t) return esc(fallback||"");
  const ve=horaEnHuso(t,4), sv=horaEnHuso(t,6);
  return esc(ve.f)+'<br><small class="mut">'+esc(ve.h)+' VE · '+esc(sv.h)+' SV</small>';
}
/* Compacto en una línea: "DD/MM/AAAA · HH:MM VE · HH:MM SV". Devuelve texto ya escapado. */
function fhDualTexto(tsMs, str){ const t=tsDe(tsMs,str); if(!t) return esc(str||""); const ve=horaEnHuso(t,4), sv=horaEnHuso(t,6); return esc(ve.f+" · "+ve.h+" VE · "+sv.h+" SV"); }
/* Solo hora de Venezuela (compacto), para tarjetas de lista. */
function horaVEcorta(tsMs, str){ const t=tsDe(tsMs,str); if(!t) return ""; return horaEnHuso(t,4).h+" VE"; }
/* Epoch (ms) del EGRESO de un paciente finalizado. Prioridad robusta:
   cierreTsMs (numérico) → ULTIMA ACTUALIZACION (dd/MM/yyyy HH:mm:ss) → ISO del
   Sheet → tsMs de ingreso. Mismo criterio que el dashboard y la ficha. */
function egresoPacienteMs(p){ return Number(p.cierreTsMs)||parseFechaHoraStr(p.actualizado)||(Date.parse(p.actualizado)||0)||(p.tsMs||0); }

      '<button class="btn" id="aGuardar">Agregar observación</button>'

    (!ESTADOS_FINALES.includes(p.estado)?

      '<label>Cambiar estado a <small class="mut">(los estados de triage se asignan solo desde Triage)</small></label><select id="fSel">'+Object.keys(ESTADO_LABEL).filter(k=>ESTADOS_MANUALES.includes(k)||k===p.estado).map(k=>'<option value="'+k+'"'+(k===p.estado?" selected":"")+'>'+ESTADO_LABEL[k]+'</option>').join("")+'</select>'+
      '<label>Comentario (obligatorio al cambiar de estado)</label><textarea id="fObs" placeholder="Explica por qué cambia el estado de este paciente"></textarea>'+
      '<button class="btn" id="fGuardar">Guardar cambio de estado</button>'+avisoHTML()

function renderPacientes(c, contexto){
  // Etapas del flujo (igual que el tablero): cada una agrupa uno o más estados
  // internos. Así la lista de Pacientes refleja el mismo recorrido del tablero.
  const ETAPAS=[
    {et:"🚪 Recepción", estados:[ESTADO.INGRESADO]},
    {et:"🩺 Consulta", estados:[ESTADO.ESPERA_ROJO,ESTADO.ESPERA_AMARILLO,ESTADO.ESPERA_VERDE]},
    {et:"🛏️ Estabilización", estados:[ESTADO.ESPERA_ESTABILIZACION,ESTADO.SUERO_EN_CURSO]},
    {et:"🧠 Salud mental", estados:[ESTADO.SALUD_MENTAL]},
    {et:"🚑 Traslados", estados:[ESTADO.TRASLADO_PENDIENTE]}
  ];
  function chip(g,v,txt){ return '<button class="chipf'+(pacFiltro[g]===v?" activa":"")+'" data-g="'+g+'" data-v="'+v+'">'+txt+'</button>'; }

    const n=normalizar(pacFiltro.txt);
    if(pacFiltro.tipo==="vet"){
      // Fuente: pacientesVet (tiene estado y abre ficha). Etapas similares a humanos:
      //   🩺 Consulta vet = TODOS los animales atendidos hoy/activos
      //   🛏️ Estabilización vet = los que siguen en sala (VETESTADO.ESTABILIZACION)
      //   ✔ Finalizados = alta / referido
      let av=DB.pacientesVet.filter(p=>!n||normalizar([p.nombreAnimal,p.propietario,p.especie,p.cedulaPropietario,p.diagnostico].join(" ")).includes(n));
      const enSala=p=>p.estado===VETESTADO.ESTABILIZACION;
      const finalizado=p=>VETESTADOS_FINALES.includes(p.estado);
      // v8.46 FIX: "activos" para vet debe ser TODO lo no-finalizado (igual que
      // humanos), no solo los que están en sala. Antes filtraba a
      // VETESTADO.ESTABILIZACION, así que los animales ESPERANDO CONSULTA
      // (INGRESADO VET) — que son la mayoría — desaparecían del filtro "activos".
      if(pacFiltro.est==="activos") av=av.filter(p=>!VETESTADOS_FINALES.includes(p.estado));
      else if(pacFiltro.est==="finalizados") av=av.filter(p=>finalizado(p));
      if(!av.length) return '<div class="tarjeta"><div class="vacio">Sin registros veterinarios'+(pacFiltro.est==="activos"?" en sala":pacFiltro.est==="finalizados"?" finalizados":"")+'.</div></div>';
      function cardV(p){
        const sit=String(p.descripcion||"").split(" | ").filter(Boolean).pop();
        const estLbl=VETESTADO_LABEL[p.estado]||p.estado;
        return '<div class="pc-card pc-click" data-vid="'+esc(p.id)+'"><div class="pc-top"><div class="pc-nom">🐾 '+esc(p.nombreAnimal||"(sin nombre)")+' · '+esc(p.especie||"")+'</div><div class="pc-hora">'+esc(horaVEcorta(p.tsMs, p.hora))+'</div></div>'+
          '<div class="mut" style="font-size:11.5px">'+esc(estLbl)+(p.propietario?' · '+esc(p.propietario):'')+(p.diagnostico?' · Dx: '+esc(p.diagnostico):'')+'</div>'+
          (sit&&!/^DEMO$/i.test(sit)?'<div class="pc-sit">📝 '+esc(sit)+'</div>':'')+'</div>';
      }
      const grupoV=(titulo,arr,abierto)=>'<details class="pc-grupo"'+(abierto?" open":"")+'><summary><span class="pcg-t">'+titulo+'</span><span class="pcg-n">'+arr.length+'</span></summary>'+arr.map(cardV).join("")+'</details>';
      if(pacFiltro.est==="finalizados"){
        av.sort((a,b)=>(b.tsMs||0)-(a.tsMs||0));
        return '<div class="tarjeta">'+av.map(cardV).join("")+'</div>';
      }
      let htmlV="";
      const espera=av.filter(p=>p.estado===VETESTADO.INGRESADO).sort((a,b)=>(a.tsMs||0)-(b.tsMs||0)); // esperando consulta
      const sala=av.filter(enSala).sort((a,b)=>(a.tsMs||0)-(b.tsMs||0));                                 // en estabilización
      if(espera.length) htmlV+='<div class="tarjeta pc-seccion">'+grupoV("🩺 Esperando consulta veterinaria",espera,true)+'</div>';
      if(sala.length) htmlV+='<div class="tarjeta pc-seccion">'+grupoV("🛏️ Estabilización veterinaria",sala,true)+'</div>';
      if(pacFiltro.est==="todos"){ const fin=av.filter(finalizado).sort((a,b)=>(b.tsMs||0)-(a.tsMs||0)); if(fin.length) htmlV+='<div class="tarjeta pc-seccion">'+grupoV("✔ Finalizados",fin,false)+'</div>'; }
      return htmlV||'<div class="tarjeta"><div class="vacio">Sin registros veterinarios.</div></div>';
    }
    let pac=DB.pacientes.filter(p=>{
      const act=!ESTADOS_FINALES.includes(p.estado);
      if(pacFiltro.est==="activos"&&!act) return false;
      if(pacFiltro.est==="finalizados"&&act) return false;
      // Sub-filtro por DÍA DE EGRESO (solo en Finalizados): hoy / ayer, por
      // medianoche de El Salvador usando el epoch de egreso (fiable).
      if(pacFiltro.est==="finalizados" && pacFiltro.finDia && pacFiltro.finDia!=="todos"){
        const _m0=_medianocheHoy(), _t=egresoPacienteMs(p);
        if(pacFiltro.finDia==="hoy" && !(_t>=_m0)) return false;
        if(pacFiltro.finDia==="ayer" && !(_t>=_m0-86400000 && _t<_m0)) return false;
      }
      if(pacFiltro.emb && !p.embarazada) return false;
      if(n && !normalizar([p.nombre,p.apellido,p.cedula,p.repCedula,p.descripcion,p.id].join(" ")).includes(n)) return false;
      return true;
    });
    if(!pac.length) return '<div class="tarjeta"><div class="vacio">Sin pacientes con ese filtro.</div></div>';
    function card(p){
      const sit=String(p.descripcion||"").split(" | ").pop();
      return '<div class="pc-card pc-click" data-id="'+p.id+'"><div class="pc-top"><div class="pc-nom">'+esc(etiquetaPaciente(p))+(p.embarazada?' <span class="tag-emb">🤰 Embarazada</span>':'')+(p.sospechaInfeccion?' <span class="tag-infec">🦠 Infección</span>':'')+'</div><div class="pc-hora">'+esc(horaVEcorta(p.tsMs, p.hora))+'</div></div>'+
        (ESTADOS_FINALES.includes(p.estado)?'<div class="mut" style="font-size:11.5px">'+esc(ESTADO_LABEL[p.estado]||p.estado)+'</div>':'<div class="mut" style="font-size:11.5px">'+esc(ESTADO_LABEL[p.estado]||p.estado)+'</div>')+
        (sit&&!p.noIdentificado?'<div class="pc-sit">📝 '+esc(sit)+'</div>':'')+'</div>';
    }
    if(pacFiltro.est==="finalizados"){
      pac.sort((a,b)=>(b.tsMs||0)-(a.tsMs||0));
      return '<div class="tarjeta">'+pac.map(card).join("")+'</div>';
    }
    const grupo=(titulo,arr,abierto)=>'<details class="pc-grupo"'+(abierto?" open":"")+'><summary><span class="pcg-t">'+titulo+'</span><span class="pcg-n">'+arr.length+'</span></summary>'+arr.map(card).join("")+'</details>';
    let html="";
    // Agrupar por etapa del flujo (en el orden del tablero)
    ETAPAS.forEach(fase=>{
      const g=pac.filter(p=>fase.estados.includes(p.estado)).sort((a,b)=>(a.tsMs||0)-(b.tsMs||0));
      if(g.length) html+='<div class="tarjeta pc-seccion">'+grupo(fase.et,g,true)+'</div>';
    });
    if(pacFiltro.est==="todos"){ const fin=pac.filter(p=>ESTADOS_FINALES.includes(p.estado)).sort((a,b)=>(b.tsMs||0)-(a.tsMs||0)); if(fin.length) html+='<div class="tarjeta pc-seccion">'+grupo("✔ Finalizados",fin,false)+'</div>'; }
    return html||'<div class="tarjeta"><div class="vacio">Sin pacientes.</div></div>';
  }
  function pintarLista(){
