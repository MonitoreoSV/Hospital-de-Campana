<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light">
<meta name="theme-color" content="#111E60">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Misión Humanitaria — Hospital de Campaña</title>
<style>
:root{
  /* Línea gráfica: marino institucional (P.2748) + cobalto de bandera +
     arena (P.7604) + gris pizarra (P.432) — Misión Humanitaria SV·VE */
  --marino:#111E60; --marino2:#0d1746; --cobalto:#0F47AF; --arena:#C9A992;
  --tinta:#313945; --panel:#ffffff; --fondo:#F2F4F7; --linea:#E1E6EC;
  --azul:#0F47AF; --rojo:#c62828; --amarillo:#e8a000; --verde:#2e7d32;
  --morado:#5e35b1; --saludmental:#8e44ad; --gris:#66707C; --naranja:#ef6c00;
  color-scheme:light; /* la app tiene su propia paleta clara; ignora el dark mode del sistema */
}
*{box-sizing:border-box; margin:0; -webkit-tap-highlight-color:rgba(20,96,148,.15)}
html{color-scheme:light}
html,body{margin:0; background:var(--fondo)}
body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; color:var(--tinta); -webkit-text-size-adjust:100%; text-size-adjust:100%}
/* Campos de formulario con colores EXPLÍCITOS: en dark mode del sistema el
   navegador podría pintarlos con fondo/tinta oscuros e ilegibles. Fijarlos
   garantiza el mismo aspecto claro en cualquier teléfono. */
input,select,textarea{background:var(--panel); color:var(--tinta)}
input::placeholder,textarea::placeholder{color:#9aa5b1; opacity:1}
input,select,textarea,button{font-family:inherit}
button{touch-action:manipulation}

/* Login */
.login-wrap{min-height:100vh; background:radial-gradient(circle at 50% -10%,#1d2f8a 0%,var(--marino) 45%,var(--marino2) 100%); display:flex; align-items:center; justify-content:center; padding:20px}
.login-card{background:var(--panel); border-radius:16px; padding:30px 26px; width:100%; max-width:360px; box-shadow:0 20px 60px rgba(0,0,0,.35); text-align:center}
.login-cruz{width:52px; height:52px; margin:0 auto 10px; border-radius:14px; background:var(--rojo); color:#fff; font-size:30px; font-weight:800; display:flex; align-items:center; justify-content:center}
.login-card h1{font-size:19px}
.login-sub{font-size:12px; color:var(--gris); margin-top:2px}
.login-ver{font-size:11px; color:var(--gris); text-align:center; margin-top:16px; opacity:.7}
.login-card form{margin-top:18px; text-align:left}
.login-hint{margin-top:18px; font-size:11px; color:var(--gris); line-height:1.7; border-top:1px solid var(--linea); padding-top:12px}
.conn{margin-top:12px; font-size:11px; padding:7px 9px; border-radius:7px}
.conn.local{background:#fff7e6; color:#8a6100; border:1px solid #f0dcae}
.conn.sheet{background:#e6f4e8; color:#1d5622; border:1px solid #bfe0c3}

/* Topbar */
/* Topbar minimalista: una sola barra clara, fija arriba. Logo + módulos +
   acciones. Colores GOES (marino/cobalto/arena) sobre fondo claro. */
.topbar{background:var(--panel); color:var(--tinta); display:flex; align-items:center; gap:14px; padding:0 16px; min-height:56px; border-bottom:1px solid var(--linea); position:sticky; top:0; z-index:20}
.brand{display:flex; align-items:center; gap:9px; min-width:0; flex:0 0 auto}
.brand-logo{height:34px; width:auto; display:block; flex:0 0 auto}
.brand-txt{display:flex; flex-direction:column; line-height:1.1; min-width:0}
.brand-t{font-weight:800; font-size:14px; color:var(--marino); letter-spacing:.1px; white-space:nowrap}
.brand-s{font-size:9.5px; color:var(--gris); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
/* Los módulos viven ahora DENTRO de la topbar */
.modtabs{display:flex; align-items:center; gap:2px; flex:1 1 auto; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:thin}
.modtabs::-webkit-scrollbar{height:0}
.modtabs button{flex:0 0 auto; border:0; background:none; padding:8px 11px; font-size:13px; font-weight:600; color:var(--tinta); cursor:pointer; white-space:nowrap; display:flex; align-items:center; gap:6px; border-radius:8px; position:relative}
.modtabs button:hover{background:var(--fondo)}
.modtabs button.activa{color:var(--marino); font-weight:800}
.modtabs button.activa:after{content:""; position:absolute; left:11px; right:11px; bottom:-1px; height:2.5px; background:var(--marino); border-radius:2px}
.mt-ic{font-size:15px}
.topbar-der{display:flex; align-items:center; gap:10px; flex:0 0 auto}
.user{text-align:right; display:flex; flex-direction:column; gap:0; line-height:1.15}
.user-n{font-weight:700; font-size:12px; color:var(--marino)}
.user-r{font-size:10px; color:var(--gris)}
.topbar-acciones{display:flex; align-items:center; gap:8px}
.sync-pill{display:inline-flex; align-items:center; justify-content:center; min-width:30px; height:30px; padding:0 8px; border-radius:999px; font-size:12px; font-weight:800; cursor:pointer; border:1px solid transparent}
.sync-pill.ok{background:#e6f4e8; color:#1d5622; border-color:#bfe0c3}
.sync-pill.subiendo{background:#e8f1f8; color:var(--azul); border-color:#c3d9ea}
.sync-pill.reintento{background:#fff7e6; color:#8a6100; border-color:#f0dcae}
.sync-pill.error{background:#fdecec; color:#8c1c1c; border-color:#f2c4c4}
.btn-buscar{border:1px solid var(--linea); background:var(--panel); color:var(--marino); border-radius:8px; width:34px; height:34px; font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex:0 0 auto}
.btn-buscar:hover{background:var(--fondo)}
.salir{border:1px solid var(--linea); background:var(--panel); color:var(--tinta); border-radius:8px; padding:7px 12px; font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap}
.salir:hover{background:var(--fondo)}

/* Contenido */
.contenido{max-width:680px; margin:0 auto; padding:14px 12px}
.tarjeta{background:var(--panel); border:1px solid var(--linea); border-radius:12px; padding:16px; margin-bottom:14px}
.tarjeta h2{font-size:15px; margin-bottom:4px}
.tarjeta h3{font-size:15px; margin-bottom:4px; color:var(--tinta)}
.modal h3{font-size:16px; margin-bottom:10px; color:var(--marino); font-weight:800}
.desc{font-size:12px; color:var(--gris); margin-bottom:12px}
.mut{color:var(--gris); font-weight:400}
label{display:block; font-size:12px; font-weight:600; margin:12px 0 4px}
input,select,textarea{width:100%; padding:12px 10px; font-size:16px; border:1px solid var(--linea); border-radius:8px; background:#fbfcfd}
textarea{min-height:60px; resize:vertical}
input:focus,select:focus,textarea:focus{outline:2px solid var(--azul); border-color:var(--azul)}
.cant,.kpi b,.tiempo b,.stock-fila .cant{font-variant-numeric:tabular-nums}
.fila{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.fila3{display:grid; grid-template-columns:repeat(3,1fr); gap:8px}
.btn{width:100%; margin-top:18px; padding:14px; font-size:15px; font-weight:700; color:#fff; background:var(--azul); border:0; border-radius:8px; cursor:pointer}
.btn:hover{filter:brightness(1.06)}
.btn-refrescar{width:auto; padding:9px 13px; font-size:13px; background:#e8edf1; color:var(--azul); border:1px solid var(--linea); border-radius:8px; font-weight:700; cursor:pointer}
.btn-mini{width:auto; padding:6px 12px; font-size:12px; font-weight:700; border-radius:999px; border:1px solid var(--linea); background:#eef4f9; color:var(--azul); cursor:pointer}
#toasts{position:fixed; top:14px; left:0; right:0; z-index:200; display:flex; flex-direction:column; align-items:center; gap:10px; pointer-events:none; padding:0 12px}
.toast{pointer-events:auto; width:100%; max-width:560px; display:flex; align-items:flex-start; gap:11px; padding:16px 16px; border-radius:12px; font-size:15px; line-height:1.45; font-weight:600; box-shadow:0 12px 34px rgba(8,18,26,.30); border:1px solid; opacity:0; transform:translateY(-12px); transition:opacity .18s ease, transform .18s ease}
.toast.visible{opacity:1; transform:none}
.toast.saliendo{opacity:0; transform:translateY(-12px)}
.toast-ic{font-size:22px; line-height:1.15; flex:0 0 auto}
.toast-msg{flex:1; padding-top:1px}
.toast-x{flex:0 0 auto; background:transparent; border:0; font-size:17px; cursor:pointer; color:inherit; opacity:.55; padding:0 2px; line-height:1}
.toast-x:hover{opacity:1}
.toast-ok{background:#e6f4e8; color:#1d5622; border-color:#bfe0c3}
.toast-info{background:#e8f1f8; color:#0f3a5c; border-color:#c3d9ea}
.toast-warn{background:#fff4d6; color:#7a5600; border-color:#eecb7a}
.toast-error{background:#fdeaea; color:#8c1c1c; border-color:#f2c4c4}
.aviso{margin-top:14px; padding:12px; border-radius:8px; font-size:13px; display:none}
.aviso.ok{display:block; background:#e6f4e8; color:#1d5622; border:1px solid #bfe0c3}
.aviso.error{display:block; background:#fdeaea; color:#8c1c1c; border:1px solid #f2c4c4}
.aviso.info{display:block; background:#e8f1f8; color:#0f3a5c; border:1px solid #c3d9ea}

/* Sub-pestañas */
.subtabs{display:flex; gap:4px; margin-bottom:12px; overflow-x:auto}
.subtabs button{flex:0 0 auto; border:1px solid var(--linea); background:var(--panel); padding:9px 13px; font-size:12.5px; font-weight:600; color:var(--gris); cursor:pointer; border-radius:8px; white-space:nowrap}
.subtabs button.activa{color:#fff; background:var(--azul); border-color:var(--azul)}

/* Checks ingreso */
.check{display:flex; align-items:center; gap:10px; margin-top:10px; padding:12px; border-radius:8px; font-size:14px; cursor:pointer; font-weight:500}
.check b{font-weight:800}
.check input{width:20px; height:20px}
.check.amarilla{background:#fff7e6; border:1px solid #f0dcae}
.check.rosa{background:#fce4ec; border:1px solid #f8bbd0}
.check.naranja{background:#fff3e0; border:1px solid #ffcc80}
.repbox{margin-top:14px; padding:14px; border:2px dashed var(--azul); border-radius:10px; background:#f4f8fb}

/* Buscador */
.buscador{position:relative}
.buscador .selector{display:flex}
.buscador .selector>input{flex:1}
.sugerencias{position:absolute; left:0; right:0; top:100%; z-index:20; background:#fff; border:1px solid var(--linea); border-radius:0 0 10px 10px; box-shadow:0 8px 18px rgba(15,34,47,.15); max-height:260px; overflow-y:auto}
.sugerencias div{padding:12px 10px; font-size:14px; border-bottom:1px solid #f0f2f4; cursor:pointer}
.sugerencias div:hover{background:#eef4f9}
.prioridad{font-size:11px; font-weight:700; margin-right:6px}
.seleccionado{margin-top:8px; font-size:16px; padding:14px 14px; border-radius:10px; background:#e8f1f8; color:#0f3a5c; border:2px solid #9cc2e0; font-weight:600}
.bp-chips{display:flex; gap:6px; flex-wrap:wrap; margin-top:8px}
.bp-chip{border:1px solid var(--linea); background:var(--panel); color:var(--gris); border-radius:20px; padding:6px 12px; font-size:12px; font-weight:700; cursor:pointer}
.bp-chip.sel{background:var(--marino); color:#fff; border-color:var(--marino)}
.bp-chip-orden{margin-left:auto; background:#eef4fb; color:var(--marino)}
.bp-chip-infec.sel{background:#b8730a; color:#fff; border-color:#b8730a}

/* Signos vitales */
.vs-verde{border-color:#2e7d32 !important; background:#eafbea !important}
.vs-amarillo{border-color:#e8a000 !important; background:#fff8e6 !important}
.vs-rojo{border-color:#c62828 !important; background:#fdecec !important}

/* Motivos / peligro */
.motivos,.peligro{display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:6px}
.motivos label,.peligro label{display:flex; align-items:flex-start; gap:8px; margin:0; padding:9px 8px; border:1px solid var(--linea); border-radius:8px; background:#fbfcfd; font-weight:500; font-size:12.5px; cursor:pointer}
.motivos input,.peligro input{width:auto; margin-top:1px}
.motivos small,.peligro small{display:block; color:var(--gris); font-weight:400}
.motivos label.marcado{background:#e8f1f8; border-color:var(--azul); font-weight:700}
.peligro label.marcado{background:#fdecec; border-color:var(--rojo); font-weight:700; color:#8c1c1c}
@media(max-width:520px){.motivos,.peligro{grid-template-columns:1fr}}

/* Meds */
.meds{border:1px solid var(--linea); border-radius:8px; overflow:hidden; margin-top:6px}
.meds .med{display:flex; align-items:center; gap:8px; padding:8px 10px; border-bottom:1px solid #f0f2f4; background:#fbfcfd}
.meds .med:last-child{border-bottom:0}
.meds .med span{flex:1; font-size:12.5px}
.meds .med input{width:72px; text-align:center; padding:8px 4px}
.meds .med.con-cantidad{background:#e8f1f8}

/* Sugerencia triage */
.sugerencia{margin-top:12px; padding:12px 14px; border-radius:10px; font-size:13px; border:1px solid var(--linea); background:#f6f8fa}
.sugerencia .cab{font-weight:800; font-size:14px; margin-bottom:6px}
.sugerencia.z-verde{background:#eafbea; border-color:#bfe0c3} .sugerencia.z-verde .cab{color:#1d5622}
.sugerencia.z-amarillo{background:#fff8e6; border-color:#f0dcae} .sugerencia.z-amarillo .cab{color:#8a6100}
.sugerencia.z-rojo{background:#fdecec; border-color:#f2c4c4} .sugerencia.z-rojo .cab{color:#8c1c1c}
.sugerencia.z-traslado{background:#efeaf9; border-color:#d3c5ee} .sugerencia.z-traslado .cab{color:var(--morado)}
.sugerencia.z-descartar{background:#eef1f3; border-color:#d4dade} .sugerencia.z-descartar .cab{color:#455563}
.sugerencia ul{margin:4px 0 0 18px; padding:0} .sugerencia li{margin:2px 0}
.sugerencia .flag{margin-top:8px; padding:8px; border-radius:8px; background:#fff3e0; color:#7a4a00; font-size:12px; font-weight:600}
.sugerencia .captopril{margin-top:8px; padding:8px; border-radius:8px; background:#f3eefb; color:#3d1f6e; font-size:12px; font-weight:600}
.sugerencia .pediatria{margin-top:8px; padding:8px; border-radius:8px; background:#eef4f9; color:#0f3a5c; font-size:12px}
.sugerencia .nota{margin-top:8px; font-size:11px; color:var(--gris)}

/* Códigos triage */
.codigos{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:6px}
.codigos button{padding:14px 8px; border-radius:8px; border:2px solid transparent; font-weight:700; font-size:13px; cursor:pointer; color:#fff}
.codigos small{font-weight:600; opacity:.9}
.cod-TRASLADO{background:var(--morado)} .cod-ROJO{background:var(--rojo)}
.cod-AMARILLO{background:#f5c518; color:#4a3600} .cod-VERDE{background:var(--verde)}
.cod-SALUDMENTAL{background:var(--saludmental)} .cod-SALUDMENTAL small{color:#f0e2f7}
.cod-ESTAB{background:#0f6e4f} .cod-ESTAB small{color:#d5efe6}
.cod-DESCARTADO{background:var(--gris); grid-column:1/-1}
.codigos button.sel{border-color:var(--tinta); box-shadow:0 0 0 3px rgba(15,34,47,.22)}
@keyframes parpadeo{0%,100%{opacity:1; transform:scale(1)} 50%{opacity:.45; transform:scale(.97)}}
.codigos button.parpadeo{animation:parpadeo .85s ease-in-out infinite}

/* Inventario */
.stock-tabla{border:1px solid var(--linea); border-radius:10px; overflow:hidden; margin-top:4px}
.stock-fila{display:flex; align-items:center; gap:8px; padding:10px 12px; border-bottom:1px solid #f0f2f4; background:#fff; font-size:13.5px}
.bo-tabs{display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap}
.bo-acc{border:1px solid var(--linea); border-radius:10px; margin-bottom:8px; overflow:hidden; background:#fff}
.bo-acc-h{width:100%; display:flex; justify-content:space-between; align-items:center; gap:10px; padding:12px 14px; background:#f7f9fc; border:0; cursor:pointer; font-size:13.5px; font-weight:700; color:var(--tinta); text-align:left}
.bo-acc-h.abierta{background:#eef2f8; border-bottom:1px solid var(--linea)}
.bo-acc-h .bo-acc-ic{color:var(--gris); font-size:12px; flex:0 0 auto}
.bo-acc-b{padding:12px 14px}
.bo-tab{padding:8px 16px; border:1px solid var(--linea); background:#fff; border-radius:8px; font-size:13px; font-weight:700; color:var(--gris); cursor:pointer}
.bo-tab.activa{background:var(--marino); color:#fff; border-color:var(--marino)}
.cat-fila{display:flex; gap:8px; align-items:center; margin-bottom:6px}
.cat-fila input{flex:1; min-width:0}
.cat-del{flex:0 0 auto; color:var(--rojo); border-color:#f2c4c4}
.reingreso-box{border:1.5px solid var(--cobalto,#0F47AF); background:rgba(15,71,175,0.05); border-radius:10px; padding:12px; margin:8px 0}
.reingreso-box.ok{border-color:var(--verde); background:rgba(46,125,50,0.06)}
.hist-lista{max-height:60vh; overflow:auto}
.hist-ep{border:1px solid var(--linea); border-radius:8px; padding:10px; margin-bottom:8px}
.hist-ep-h{font-size:13px; margin-bottom:4px}
.hist-ep-b{font-size:12.5px; color:var(--tinta)}
.stock-fila:last-child{border-bottom:0}
.stock-fila .nom{flex:1}
.stock-fila .nom small{display:block; color:var(--gris); font-weight:400; font-size:11px}
.stock-fila .cant{font-weight:800; font-size:15px; min-width:64px; text-align:right}
.stock-fila.niv-sin{background:#fdecec} .stock-fila.niv-sin .cant{color:var(--rojo)}
.stock-fila.niv-poco{background:#fff7e6} .stock-fila.niv-poco .cant{color:#b8730a}
.stock-fila.niv-agotarse{background:#fffdf5} .stock-fila.niv-agotarse .cant{color:#a07500}
.stock-fila.niv-ok .cant{color:var(--verde)}
.badge-nivel{display:inline-block; margin-left:6px; padding:2px 7px; border-radius:999px; color:#fff; font-size:10px; font-weight:700; vertical-align:middle}
.badge-nivel.sin{background:var(--rojo)}
.badge-nivel.poco{background:#b8730a}
.badge-nivel.agotarse{background:#d9a300}
.badge-nivel.ok{background:var(--verde)}
.resumen-inv{display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap}
.resumen-inv .chip{flex:1; min-width:110px; background:#fff; border:1px solid var(--linea); border-radius:8px; padding:10px; text-align:center}
.resumen-inv .chip b{display:block; font-size:20px}
.resumen-inv .chip span{font-size:11px; color:var(--gris)}
.resumen-inv .chip.alerta b{color:var(--rojo)}
.resumen-inv .chip.alerta-poco b{color:#b8730a}
.vacio-inv{padding:16px; text-align:center; color:var(--gris); font-size:13px}
.mov-fila{display:flex; gap:8px; padding:9px 10px; border-bottom:1px solid #f0f2f4; font-size:12.5px; background:#fff}
.mov-fila:last-child{border-bottom:0}
.mov-fila .tipo{font-weight:800; min-width:56px}
.mov-fila .tipo.ENTRADA{color:var(--verde)} .mov-fila .tipo.SALIDA{color:var(--rojo)}
.mov-fila .detalle{flex:1; color:var(--gris)}
.mov-fila .detalle b{color:var(--tinta)}

/* Dashboard */
.dash{background:#0d1922; min-height:calc(100vh - 120px); margin:0; padding:16px 14px 40px}
.dash-top{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:20px}
.dash-titulo h2{margin:0; font-size:19px; color:var(--marino); line-height:1.2}
.dash-top-acc{display:flex; align-items:center; gap:22px; flex-wrap:wrap}
.dash-top-acc .dash-filtros{margin:0}
.dash-botones{display:flex; gap:14px}
.dash .estado{font-size:11px; color:#8aa0b3}
.dash .btn-refrescar{background:#1c2f3d; color:#e8eef3; border:1px solid #22384a}
.dash-h{font-size:15px; font-weight:800; text-transform:uppercase; letter-spacing:.6px; color:var(--marino); margin:38px 0 16px; padding:9px 0 9px 12px; border-left:4px solid var(--arena); background:linear-gradient(90deg,rgba(201,169,146,.14),transparent); border-radius:0 8px 8px 0}
.dash-h small{font-weight:600; color:var(--gris); letter-spacing:0}
.dash .kpis-macro{margin-bottom:8px}
.dash .dash-h:first-of-type{margin-top:18px}
.tl-wrap{margin-bottom:6px}
.grid3{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:6px}
.resumen-story{background:linear-gradient(90deg,rgba(15,71,175,.06),rgba(201,169,146,.08)); border:1px solid var(--linea); border-left:4px solid var(--cobalto); border-radius:0 10px 10px 0; padding:14px 16px; font-size:14px; line-height:1.5; color:var(--tinta); margin-bottom:14px}
.stv-wrap{background:#f2f7fc; border:1px solid var(--linea); border-left:4px solid var(--cobalto); border-radius:0 10px 10px 0; padding:10px 12px; margin:8px 0}
.stv-tit{font-size:11.5px; font-weight:700; color:var(--marino); margin-bottom:6px}

/* Pie */
.pie{text-align:center; font-size:11px; color:var(--gris); padding:16px}

/* Campo de solo lectura (ej. responsable del triage = usuario activo) */
.campo-fijo{background:var(--fondo); border:1px solid var(--linea); border-radius:9px; padding:11px 12px; font-size:14px; font-weight:600; color:var(--tinta); margin-top:2px}

.st-det-cab b{font-size:15px}
.st-ctx{background:#f7f9fb;border:1px solid var(--linea);border-left:4px solid var(--arena);border-radius:10px;padding:12px 13px;margin-top:4px}
.st-ctx-lbl{font-size:10.5px;font-weight:800;color:var(--gris);text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px}
.st-ro{margin-left:8px;background:#eceff2;color:var(--gris);font-weight:800;border-radius:999px;padding:2px 8px;font-size:9.5px}
.st-facts{display:flex;flex-wrap:wrap;gap:6px}
.st-fact{background:#fff;border:1px solid var(--linea);border-radius:999px;padding:4px 10px;font-size:11.5px}
.st-fact b{color:var(--marino)}
.st-prev{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.st-prev-nota{background:#fff;border:1px solid var(--linea);border-radius:8px;padding:8px 10px;font-size:12.5px;line-height:1.4}
.st-prev-nota .meta{font-size:10.5px;color:var(--gris);font-weight:700;margin-bottom:2px}
.st-src{font-size:11px;color:var(--gris);font-style:italic;margin-top:7px}
.st-div{height:1px;background:var(--linea);margin:16px 0 2px}
.st-evo{display:flex;flex-direction:column;gap:8px}
.st-evo-nota{background:#fbfcfd;border:1px solid var(--linea);border-radius:8px;padding:9px 11px;font-size:13px;line-height:1.4}
.st-evo-nota .meta{font-size:11px;color:var(--gris);font-weight:700;margin-bottom:2px}
.st-row2{display:flex;gap:8px;align-items:flex-end}
.st-chk{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;margin-top:8px}
.st-chk input{width:18px;height:18px}
.st-mini-add{font-size:12px;color:var(--azul);font-weight:700;border:1px dashed var(--linea);border-radius:8px;padding:8px;text-align:center;background:#fbfcfd;margin-top:8px;cursor:pointer}
.st-acts{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.st-acts .btn{margin-top:0;flex:1;min-width:150px}
.btn.st-sec{background:#fff;color:var(--azul);border:1px solid var(--azul)}
.btn.st-gris{background:#5c6672}
.st-out{margin-top:14px;background:#0f1e2b;color:#e8eef3;border-radius:10px;padding:14px;font-size:12.5px;line-height:1.5;white-space:pre-wrap;font-family:ui-monospace,Menlo,Consolas,monospace;position:relative}
.st-out .cp{position:absolute;top:9px;right:9px;font-size:11px;font-weight:800;background:#1f3547;color:#cfe0ee;border:0;border-radius:6px;padding:5px 9px;cursor:pointer}
.st-evo-acts{float:right;display:inline-flex;gap:10px;margin-left:8px}
.st-evo-ed,.st-evo-del{border:0;background:transparent;cursor:pointer;font-size:13px;line-height:1;padding:0 2px}
.st-evo-del{color:#c0392b}
</style>
</head>

/* ---- Normalización de motivos (Paso estructural) ----
   El motivo se guarda con el CÓDIGO al frente ("COD – nombre") y en TODA la app
   se MUESTRA el nombre resuelto desde el catálogo. Así renombrar/agregar no
   fractura el histórico: los reportes agrupan por código, no por texto.
   Retro-compatible con lo que ya existe en el Sheet: "COD – nombre", código
   suelto, o nombre suelto (incluye nombres heredados). */
const MOTIVO_ALIAS = {
  "heridas y traumatismos":"TRAUMA","dolor y fiebre":"DOLFIE","dolor y/o fiebre":"DOLFIE",
  "infección respiratoria":"RESP","infeccion respiratoria":"RESP",
  "crisis asmática / dificultad respiratoria":"ASMA","crisis asmatica / dificultad respiratoria":"ASMA",
  "alergias":"ALERG","gastrointestinal":"GASTRO","parasitosis intestinal":"PARASIT",
  "piel: infecciones y micosis":"DERMA","hipertensión crónica":"HTA","hipertension cronica":"HTA",
  "diabetes crónica":"DM","diabetes cronica":"DM","afecciones oculares":"OCULAR",
  "salud mental / apoyo psicosocial":"MHPSS","otro motivo":"OTRO"
};
function _codMotivo(pieza){
  const s=String(pieza||"").trim(); if(!s) return "";
  const m=s.match(/^([A-Za-z]+)\s*[–-]\s*/);           // "COD – ..."
  if(m){ const c=m[1].toUpperCase(); if(MOTIVOS_TRIAGE.some(x=>x.cod===c)||c==="OTRO") return c; }
  const up=s.toUpperCase();                              // ¿código suelto?
  if(MOTIVOS_TRIAGE.some(x=>x.cod===up)||up==="OTRO") return up;
  const porNom=MOTIVOS_TRIAGE.find(x=>x.nombre.toLowerCase()===s.toLowerCase()); // ¿nombre actual?
  if(porNom) return porNom.cod;
  if(MOTIVO_ALIAS[s.toLowerCase()]) return MOTIVO_ALIAS[s.toLowerCase()]; // ¿nombre heredado?
  return "";                                             // texto libre / desconocido
}
function codigosDeMotivos(raw){ return String(raw||"").split(";").map(_codMotivo).filter(Boolean); }
function nombreDeCodigo(cod){ const m=MOTIVOS_TRIAGE.find(x=>x.cod===cod); return m?m.nombre:(cod==="OTRO"?"Otro motivo":cod); }
/* Convierte cualquier string de motivos a nombres legibles para MOSTRAR.
   Para "OTRO – texto" conserva el texto específico (no lo aplasta a "Otro motivo"). */
function _piezaLegible(pieza){
  const s=String(pieza||"").trim(); if(!s) return "";
  const m=s.match(/^([A-Za-z]+)\s*[–-]\s*(.*)$/);
  if(m){ const c=m[1].toUpperCase(), txt=m[2].trim();
    if(c==="OTRO") return txt||"Otro motivo";
    const cat=MOTIVOS_TRIAGE.find(x=>x.cod===c); if(cat) return cat.nombre; }
  const cod=_codMotivo(s); return cod?nombreDeCodigo(cod):s;
}
function motivosLegibles(raw){ return String(raw||"").split(";").map(_piezaLegible).filter(Boolean).join(", "); }
/* Arma el string a GUARDAR desde los códigos seleccionados (+ texto libre OTRO). */
function motivosParaGuardar(codigos, otroTexto){
  return [ (codigos||[]).map(cd=>cd+" – "+nombreDeCodigo(cd)).join("; "),
           (otroTexto&&otroTexto.trim())?("OTRO – "+otroTexto.trim()):"" ].filter(Boolean).join("; ");
}

// Aplica un objeto de config (parseado) a los catálogos en memoria. Cada clave
// es opcional: si falta o es inválida, se conserva lo que haya (default).
function aplicarConfig(cfg){
  if(!cfg||typeof cfg!=="object") return;
  try{ if(Array.isArray(cfg.motivosTriage)&&cfg.motivosTriage.length) MOTIVOS_TRIAGE=cfg.motivosTriage.filter(x=>x&&x.cod&&x.nombre); }catch(e){}
  try{ if(Array.isArray(cfg.signosPeligro)&&cfg.signosPeligro.length) SIGNOS_PELIGRO=cfg.signosPeligro.filter(x=>x&&x.cod&&x.nombre); }catch(e){}
  try{ if(Array.isArray(cfg.especiesVet)&&cfg.especiesVet.length) ESPECIES_VET=cfg.especiesVet.filter(Boolean); }catch(e){}
  try{ if(Array.isArray(cfg.vehiculosEscalamiento)&&cfg.vehiculosEscalamiento.length) VEHICULOS_ESCALAMIENTO=cfg.vehiculosEscalamiento.filter(Boolean); }catch(e){}
  try{ if(Array.isArray(cfg.categoriasInv)&&cfg.categoriasInv.length) CATEGORIAS_INV=cfg.categoriasInv.filter(Boolean); }catch(e){}
}
// Lee la hoja Config una sola vez. Los valores llegan como texto (JSON), se
// parsean y se aplican. Se cachea también en localStorage por si se abre sin red.
function cargarConfigSiFalta(){
  if(_configCargada) return Promise.resolve(true);
  if(_configPromesa) return _configPromesa;
  if(MODO!=="sheet"){
    // Modo local: intenta leer la copia en localStorage.
    try{ const raw=localStorage.getItem("hcConfig"); if(raw) aplicarConfig(JSON.parse(raw)); }catch(e){}
    _configCargada=true; return Promise.resolve(true);
  }
  const url = API_URL + (API_URL.indexOf("?")>=0?"&":"?") + "action=getConfig" + (CLAVE_API?"&k="+encodeURIComponent(CLAVE_API):"");
  _configPromesa = fetch(url,{method:"GET"}).then(r=>r.text()).then(txt=>{
    _configPromesa=null;
    let j; try{ j=JSON.parse(txt); }catch(e){ return false; }
    if(j&&j.ok&&j.config){
      const cfg={};
      Object.keys(j.config).forEach(k=>{ try{ cfg[k]=JSON.parse(j.config[k]); }catch(e){ cfg[k]=j.config[k]; } });
      aplicarConfig(cfg);
      try{ localStorage.setItem("hcConfig", JSON.stringify(cfg)); }catch(e){}
      _configCargada=true; return true;
    }
    return false;
  }).catch(()=>{ _configPromesa=null; return false; });
  return _configPromesa;
}
// Guarda un catálogo (clave->lista) en la hoja Config. Actualiza memoria y cache.
async function guardarConfig(clave, valor){
  const txt=JSON.stringify(valor);
  if(MODO==="sheet"){
    const j=await apiPost({op:"setConfig", clave, valor:txt});
    if(!j||!j.ok) throw new Error((j&&j.error)||"No se pudo guardar la configuración.");
  }
  // Actualiza cache local siempre.
  try{ const raw=localStorage.getItem("hcConfig"); const cache=raw?JSON.parse(raw):{}; cache[clave]=valor; localStorage.setItem("hcConfig", JSON.stringify(cache)); }catch(e){}
  aplicarConfig({[clave]:valor});
  return true;
}

/* ------------------------ HELPERS ------------------------- */
const pad=(n,l=2)=>String(n).padStart(l,"0");
function fechaHoy(d=new Date()){return pad(d.getDate())+"/"+pad(d.getMonth()+1)+"/"+d.getFullYear();}
function horaAhora(d=new Date()){return pad(d.getHours())+":"+pad(d.getMinutes());}
function _hNota(){ return horaEnHuso(Date.now(),4).h+" VE"; } /* hora Venezuela para notas nuevas en descripcion */
function ahoraStr(d=new Date()){return fechaHoy(d)+" "+horaAhora(d)+":"+pad(d.getSeconds());}
function parseFechaHoraStr(s){ const str=String(s||""); const m=str.match(/^(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2}):(\d{2})/); if(m) return new Date(+m[3],+m[2]-1,+m[1],+m[4],+m[5],+m[6]).getTime(); const t=Date.parse(str); return isNaN(t)?0:t; }
function isoHoy(){const d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
const RE_LETRAS=/[^A-Za-zÁÉÍÓÚÜÑáéíóúüñ'’\- ]/g;
function limpiarCedula(c){return String(c||"").replace(/[^0-9A-Za-z]/g,"").toUpperCase();}
function normalizar(s){return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
function calcularEdad(iso){ if(!iso) return ""; const fn=new Date(iso+"T00:00:00"); if(isNaN(fn)) return ""; const h=new Date(); let e=h.getFullYear()-fn.getFullYear(); const m=h.getMonth()-fn.getMonth(); if(m<0||(m===0&&h.getDate()<fn.getDate()))e--; return e; }
function pacientePorId(db,id){ for(let i=db.pacientes.length-1;i>=0;i--){const p=db.pacientes[i]; if(p.id===id&&!ESTADOS_FINALES.includes(p.estado)) return p;} return null; }
/* Mapa de estado interno → etiqueta de la ETAPA de la que viene el paciente,
   para deducir automáticamente el origen de un escalamiento/traslado. */
function etapaDeEstado(estado){
  if(estado===ESTADO.INGRESADO) return "Triage";
  if([ESTADO.ESPERA_ROJO,ESTADO.ESPERA_AMARILLO,ESTADO.ESPERA_VERDE].includes(estado)) return "Consulta";
  if([ESTADO.ESPERA_ESTABILIZACION,ESTADO.SUERO_EN_CURSO].includes(estado)) return "Estabilización";
  if(estado===ESTADO.SALUD_MENTAL) return "Salud mental";
  return "";
}
/* v8.80: contador MONOTÓNICO de movimientos deliberados. Sube +1 SOLO en un
   toque real de cambio de estado (no en notas, vitales ni sync). El backend
   v7.37 lo usa como "versión" sin relojes: un retroceso solo gana si su contador
   supera al guardado; un push rezagado trae menos y se ignora. */
function _bumpMov(p){ if(p) p.movDeliberado=(Number(p.movDeliberado)||0)+1; }
function actualizarEstado(db,id,estado){ const p=pacientePorId(db,id); if(!p) throw new Error("No se encontró un paciente activo con el ID "+id);
  // Al escalar/trasladar, recordamos de qué etapa venía (para prellenar el origen).
  if(estado===ESTADO.TRASLADO_PENDIENTE && p.estado!==ESTADO.TRASLADO_PENDIENTE){ p.origenTraslado=etapaDeEstado(p.estado)||"Triage"; }
  p.estado=estado; _bumpMov(p); p.actualizado=ahoraStr(); p.actualizadoMs=Date.now(); if(ESTADOS_FINALES.includes(estado) && !p.cierreTsMs) p.cierreTsMs=Date.now(); }
/* Reactiva a un paciente que fue cerrado por error (alta/escalado/descartado/
   no se presentó). Busca entre TODOS los pacientes (incluidos los finales),
   revierte su estado a uno activo y limpia la marca de cierre para que vuelva a
   contar como paciente en proceso. El comentario del motivo es obligatorio y
   queda en la descripción (bitácora) del paciente. */
function reactivarPaciente(db,id,nuevoEstado,motivo){
  const mot=String(motivo||"").trim();
  if(!mot) throw new Error("El motivo de la reactivación es obligatorio.");
  // Busca el registro del paciente por id (el más reciente), esté cerrado o no.
  let p=null; for(let i=db.pacientes.length-1;i>=0;i--){ if(db.pacientes[i].id===id){ p=db.pacientes[i]; break; } }
  if(!p) throw new Error("No se encontró al paciente con el ID "+id);
  if(!ESTADOS_FINALES.includes(p.estado)) throw new Error("Este paciente no está egresado; ya está activo.");
  const dest = nuevoEstado || ESTADO.INGRESADO;
  if(ESTADOS_FINALES.includes(dest)) throw new Error("El estado de reactivación debe ser un estado activo.");
  const estadoPrevio=p.estado;
  p.estado=dest;
  p.cierreTsMs=""; // deja de ser un egreso: vuelve a estar en proceso
  _bumpMov(p); p.actualizado=ahoraStr(); p.actualizadoMs=Date.now();
  p.descripcion=(p.descripcion?p.descripcion+" | ":"")+ahoraStr()+" REACTIVADO (era "+estadoPrevio+"): "+mot;
  return {ok:true, mensaje:nombreCompleto(p)+" fue reactivado.", estadoPrevio};
}
/* Confirma o descarta la sospecha de infección de un paciente. Al descartar, se

/* ==================== LÓGICA DE NEGOCIO ==================== */
function registrarPaciente(db,d){
  const esMenor=d.menor===true, noId=d.noIdentificado===true, sinCed=d.sinCedula===true, sinRep=d.sinRepresentante===true;
  let nombre=(d.nombre||"").trim().toUpperCase(), apellido=(d.apellido||"").trim().toUpperCase();
  const sexo=(d.sexo||""), tipoDoc=(d.tipoDocumento||""), descripcion=(d.descripcion||"").trim();
  let cedula="", repCedula="";
  if(!noId && !sexo) throw new Error("Selecciona el sexo (femenino o masculino).");
  if(sexo==="MASCULINO" && d.embarazada===true) throw new Error("Inconsistencia: un paciente masculino no puede estar embarazada.");
  if(noId){
    const tag="NN-"+pad(contarNN(db)+1,3);
    if(!descripcion) throw new Error("Como el paciente es NO IDENTIFICADO, escribe una seña o descripción que permita reconocerlo.");
    nombre="NO IDENTIFICADO"; apellido=tag; cedula=tag;
  } else if(esMenor){
    if(!nombre||!apellido) throw new Error("Nombre y apellido del menor son obligatorios.");
    if(sinRep){
      if(!descripcion) throw new Error("El representante también es menor de edad: describe la situación y quién acompaña al menor.");
      repCedula="SIN REPRESENTANTE";
    } else {
      repCedula=(d.repCedula||"").trim().toUpperCase();
      if(!d.repNombre||!d.repApellido) throw new Error("Nombre y apellido del representante son obligatorios.");
      if(!repCedula){ if(d.repSinCedula) repCedula="SIN DOCUMENTO"; else throw new Error("El documento del representante es obligatorio (o marca que no lo proporciona)."); }
      if(d.repFechaNac){ const re=calcularEdad(d.repFechaNac); if(re!=="" && re<18) throw new Error("El representante debe ser mayor de edad ("+re+" años). Marca la opción de que no hay representante válido."); }
    }
  } else {
    if(!nombre||!apellido) throw new Error("Nombre y apellido son obligatorios.");
    cedula=(d.cedula||"").trim().toUpperCase();
    if(!cedula){ if(sinCed) cedula="SIN DOCUMENTO"; else throw new Error("El documento de identidad es obligatorio (o marca que no lo proporciona)."); }
  }
  const docReal = cedula && cedula!=="SIN DOCUMENTO" && cedula.indexOf("NN-")!==0;
  const repReal = repCedula && repCedula!=="SIN DOCUMENTO" && repCedula!=="SIN REPRESENTANTE";
  for(const p of db.pacientes){
    if(ESTADOS_FINALES.includes(p.estado)) continue;
    if(!esMenor && !noId && docReal && limpiarCedula(p.cedula)===limpiarCedula(cedula)) throw new Error("El documento "+cedula+" ya tiene un ingreso activo en la jornada.");
    if(esMenor && p.menor && repReal && limpiarCedula(p.repCedula)===limpiarCedula(repCedula) && String(p.nombre)===nombre && String(p.apellido)===apellido) throw new Error("Este menor ya tiene un ingreso activo con ese representante.");
  }
  const now=new Date();
  // Código único y estable. El contador da legibilidad; el sufijo base36 del
  // tiempo evita colisiones si dos equipos registran a la vez (offline) y luego
  // sincronizan — sin él, dos "P-...-0001" distintos se pisarían en el upsert.
  const seq=pad(db.pacientes.length+1,4);
  const sufijo=now.getTime().toString(36).slice(-3).toUpperCase();
  const id="P-"+now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+"-"+seq+"-"+sufijo;
  db.pacientes.push({ id, fecha:fechaHoy(now), hora:horaAhora(now), tsMs:now.getTime(),
    nombre, apellido, sexo, fechaNacimiento:d.fechaNacimiento||"", edad:calcularEdad(d.fechaNacimiento), tipoDocumento:tipoDoc,
    cedula:esMenor?"":cedula, menor:esMenor, repNombre:(esMenor&&!sinRep)?(d.repNombre||"").trim().toUpperCase():"", repApellido:(esMenor&&!sinRep)?(d.repApellido||"").trim().toUpperCase():"",
    repFechaNac:(esMenor&&!sinRep)?(d.repFechaNac||""):"", repCedula:esMenor?repCedula:"", embarazada:d.embarazada===true, noIdentificado:noId, descripcion, observacionIngreso:(d.observacionIngreso||"").trim(), sospechaInfeccion:d.sospechaInfeccion===true, contacto:(d.contacto||"").trim(), medPermanentes:(d.medPermanentes||"").trim(), estado:ESTADO.INGRESADO, actualizado:ahoraStr(now), actualizadoMs:now.getTime(), movDeliberado:1 });
  const etq = noId ? ("NO IDENTIFICADO — "+descripcion) : (nombre+" "+apellido+(esMenor?" (menor)":""));
  return {ok:true, mensaje:"Paciente "+etq+" ingresado ("+id+"). Pasa a TRIAGE."};
}
function buscarRepresentante(db,cedulaRep){ const ced=limpiarCedula(cedulaRep); if(!ced) return null; for(let i=db.pacientes.length-1;i>=0;i--){const p=db.pacientes[i]; if(p.menor&&limpiarCedula(p.repCedula)===ced) return {repNombre:p.repNombre,repApellido:p.repApellido,repFechaNac:p.repFechaNac||"",repCedula:p.repCedula};} return null; }
/* Busca visitas ANTERIORES de una persona por su documento. Devuelve:
   - activo:   registro con ingreso activo hoy (mismo documento) si existe → bloqueo
   - previas:  lista de registros EGRESADOS con ese documento (episodios pasados)
   - ultima:   el registro egresado más reciente (para prellenar datos)
   Solo aplica a documentos reales (no NN, no SIN DOCUMENTO). */
function buscarVisitasPorDocumento(db, cedula){
  const doc=limpiarCedula(cedula);
  if(!doc) return {activo:null, previas:[], ultima:null};
  const cedReal = cedula && cedula!=="SIN DOCUMENTO" && String(cedula).indexOf("NN-")!==0;
  if(!cedReal) return {activo:null, previas:[], ultima:null};
  let activo=null; const previas=[];
  db.pacientes.forEach(p=>{
    if(p.menor) return; // los menores se ligan por representante, no por su propio doc
    if(limpiarCedula(p.cedula)!==doc) return;
    if(ESTADOS_FINALES.includes(p.estado)) previas.push(p);
    else activo=p;
  });
  previas.sort((a,b)=>(b.tsMs||0)-(a.tsMs||0));
  return {activo, previas, ultima:previas[0]||null};
}
/* Reúne el historial clínico completo de TODAS las visitas de una persona
   (por documento): para cada episodio, sus triages, consultas, estabilizaciones
   y escalamientos, ordenados. Se usa para mostrar la historia al reingresar y
   en la ficha. Cada episodio se identifica por el id del registro de paciente. */
function historialPorDocumento(db, cedula){
  const doc=limpiarCedula(cedula);
  if(!doc) return [];
  const visitas=db.pacientes.filter(p=>!p.menor && limpiarCedula(p.cedula)===doc).sort((a,b)=>(b.tsMs||0)-(a.tsMs||0));
  return visitas.map(p=>{
    const cons=db.consulta.filter(c=>c.id===p.id);
    const motivo=(cons[0]&&cons[0].motivo)||p.observacionIngreso||p.descripcion||"";
    const diag=(cons[0]&&cons[0].diagnostico)||"";
    return {
      id:p.id, fecha:p.fecha, tsMs:p.tsMs||0, estado:p.estado,
      motivo:String(motivo).trim(), diagnostico:String(diag).trim(),
      nConsultas:cons.length,
      nEstab:db.estabilizacion.filter(e=>e.id===p.id).length,
      nEscal:db.traslados.filter(t=>t.id===p.id).length
    };
  });
}
function getPacientesActivos(db,estados,orden){
  const out=[];
  for(const p of db.pacientes){
    if(!estados.includes(p.estado)) continue;
    const nombre=nombreCompleto(p); const edad=p.edad!==""?p.edad+" años":"";
    let etiqueta,busqueda;
    if(p.noIdentificado){ etiqueta="NO IDENTIFICADO — "+(p.descripcion||"")+(edad?" ("+edad+")":""); busqueda=["no identificado",p.descripcion,p.cedula].join(" "); }
    else if(p.menor){ const rep=p.repCedula==="SIN REPRESENTANTE"?"sin representante":("Rep: "+(p.repNombre+" "+p.repApellido).trim()+" · "+p.repCedula); etiqueta=nombre+(edad?" ("+edad+", menor)":" (menor)")+" — "+rep; busqueda=[nombre,p.repNombre,p.repApellido,p.repCedula,p.descripcion].join(" "); }
    else { etiqueta=(p.cedula?p.cedula+" — ":"")+nombre+(edad?" ("+edad+")":""); busqueda=[p.cedula,nombre].join(" "); }
    out.push({id:p.id,etiqueta,busqueda,estado:p.estado,edad:p.edad!==""?Number(p.edad):null,esMenor:p.menor,embarazada:p.embarazada,sospechaInfeccion:p.sospechaInfeccion,sexo:p.sexo||"",tsMs:p.tsMs||0,hora:p.hora||""});
  }
  const prio=[ESTADO.ESPERA_ROJO,ESTADO.ESPERA_AMARILLO,ESTADO.ESPERA_VERDE];
  if(orden==="fifo"){ out.sort((a,b)=>a.tsMs-b.tsMs); }
  else { out.sort((a,b)=>{const ia=prio.indexOf(a.estado),ib=prio.indexOf(b.estado); const da=(ia===-1?99:ia)-(ib===-1?99:ib); return da!==0?da:(a.tsMs-b.tsMs);}); }
  return out;
}

    case "TRASLADO": case "ESCALAMIENTO": actualizarEstado(db,d.id,ESTADO.TRASLADO_PENDIENTE); mensaje=nom+" → ESCALAMIENTO. Completar en Escalamiento."; break;
    case "SALUDMENTAL": actualizarEstado(db,d.id,ESTADO.SALUD_MENTAL); mensaje=nom+" → SALUD MENTAL (apoyo psicosocial)."; break;

function ajustarStock(db,item,delta,tipo,origen,referencia,responsable){
  item=String(item||"").trim(); if(!item||!delta) return null;
  let row=db.inventario.find(r=>r.item.trim().toLowerCase()===item.toLowerCase());
  if(!row){ row={item,categoria:"Medicamento/Insumo",unidad:"",stock:0,minimo:0,actualizado:ahoraStr(),area:"Ambos"}; db.inventario.push(row); }
  row.stock=(Number(row.stock)||0)+delta; row.actualizado=ahoraStr();
  db.movimientos.push({fechaHora:ahoraStr(),tsMs:Date.now(),item,tipo,cantidad:Math.abs(delta),saldo:row.stock,origen:origen||"",referencia:referencia||"",responsable:responsable||""});
  return row.stock;
}
function descontarInsumos(db,cadena,origen,referencia,responsable){ if(!cadena) return; String(cadena).split(";").forEach(parte=>{const mm=parte.trim().match(/^(.*)\sx\s(\d+)$/); if(mm){const nombre=mm[1].trim(),cant=+mm[2]; if(nombre&&cant>0) ajustarStock(db,nombre,-cant,"SALIDA",origen,referencia,responsable);}}); }
function actualizarMetaItem(db,item,meta){ const row=db.inventario.find(r=>r.item.trim().toLowerCase()===String(item).trim().toLowerCase()); if(!row) return; if(meta.categoria)row.categoria=meta.categoria; if(meta.unidad)row.unidad=meta.unidad; if(meta.minimo!==undefined&&meta.minimo!==""&&!isNaN(Number(meta.minimo)))row.minimo=Number(meta.minimo); if(meta.area)row.area=meta.area; }
/* Antes bloqueaba si no había existencias. Ahora SOLO informa el estado del
   stock (hay / queda poco / no hay), porque en el sitio no se puede garantizar
   el control exacto del inventario: el medicamento se puede registrar igual.
   Devuelve {nivel, avisos[]} donde nivel es "ok" | "poco" | "sin". */
function evaluarStockMedicamentos(db,cadena){
  const avisos=[]; let peor="ok";
  const rank={ok:0, poco:1, sin:2};
  if(!cadena) return {nivel:"ok", avisos};
  String(cadena).split(";").forEach(parte=>{
    const mm=parte.trim().match(/^(.*)\sx\s(\d+)$/); if(!mm) return;
    const nombre=mm[1].trim(), cant=+mm[2];
    const row=db.inventario.find(r=>String(r.item).trim().toLowerCase()===nombre.toLowerCase());
    if(!row){ avisos.push({nivel:"sin", txt:nombre+": no está en inventario"}); if(rank.sin>rank[peor])peor="sin"; return; }
    const stock=Number(row.stock)||0, min=Number(row.minimo)||0;
    if(stock<=0){ avisos.push({nivel:"sin", txt:nombre+": sin existencias (0)"}); if(rank.sin>rank[peor])peor="sin"; }
    else if(stock<cant){ avisos.push({nivel:"sin", txt:nombre+": quedan "+stock+", se piden "+cant}); if(rank.sin>rank[peor])peor="sin"; }
    else if(stock-cant<=min){ avisos.push({nivel:"poco", txt:nombre+": quedará poco ("+(stock-cant)+")"}); if(rank.poco>rank[peor])peor="poco"; }
  });
  return {nivel:peor, avisos};
}

function validarStockMedicamentos(db,cadena){ return; }
/* Aviso informativo para el selector de medicamentos: dice si hay / queda poco
   / no hay, pero nunca impide agregar (control de inventario no garantizado). */
function avisoStockItem(nombre, pedido){
  const row=DB.inventario.find(r=>String(r.item).trim().toLowerCase()===nombre.trim().toLowerCase());
  if(!row) return {aviso:nombre+" no está en inventario. Se registra igual.", nivel:"sin"};
  const stock=Number(row.stock)||0, min=Number(row.minimo)||0;
  if(stock<=0) return {aviso:nombre+" sin existencias. Se registra igual.", nivel:"sin"};
  if(stock<pedido) return {aviso:"Quedan "+stock+" de "+nombre+" (se piden "+pedido+"). Se registra igual.", nivel:"sin"};
  if(stock-pedido<=min) return {aviso:"Tras esto quedará poco de "+nombre+" ("+(stock-pedido)+").", nivel:"poco"};
  return null; // hay suficiente → sin aviso
}
function registrarConsulta(db,d){
  const p=pacientePorId(db,d.id); if(!p) throw new Error("Paciente no encontrado o ya cerrado. Refresca la lista.");

  validarStockMedicamentos(db,d.medicamentos);

    case "ESTABILIZACION":
      // El paciente entra DIRECTO a la sala de estabilización (en camilla), sin

/* ---- Tiempos de atención ----
   Estancia = desde el registro del paciente (tsMs) hasta su egreso (cierreTsMs)
   o hasta ahora si sigue activo. */
function tiempoEstancia(p){
  const ini=Number(p.tsMs)||0; if(!ini) return null;
  const fin=(ESTADOS_FINALES.includes(p.estado)&&p.cierreTsMs)?Number(p.cierreTsMs):Date.now();
  return Math.max(0, fin-ini);

function fmtDur(ms){
  if(ms==null||isNaN(ms)) return "—";
  const min=Math.floor(ms/60000);
  if(min<1) return "menos de 1 min";
  if(min<60) return min+" min";
  const h=Math.floor(min/60), m=min%60;
  if(h<24) return h+" h"+(m?" "+m+" min":"");
  const d=Math.floor(h/24), hh=h%24;
  return d+" d"+(hh?" "+hh+" h":"");
}
/* Tiempo que un paciente pasó en una etapa, medido por la diferencia entre el
   evento que la abrió y el siguiente. Devuelve ms o null si no aplica. */
function tsPrimero(arr,id){ for(let i=0;i<arr.length;i++){ if(arr[i].id===id) return Number(arr[i].tsMs)||null; } return null; }
function promedio(arr){ const v=arr.filter(x=>x!=null&&!isNaN(x)); return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length):null; }
/* Promedios de tiempo sobre un período (desde 'desde' en ms; 0 = todo). */
function tiemposPromedio(db, desde){
  desde=desde||0;
  const enRango=p=>(Number(p.tsMs)||0)>=desde;
  const cerrados=db.pacientes.filter(p=>ESTADOS_FINALES.includes(p.estado)&&p.cierreTsMs&&enRango(p));
  const activos=db.pacientes.filter(p=>!ESTADOS_FINALES.includes(p.estado)&&enRango(p));
  // Total registro→egreso (cerrados) y registro→ahora (activos)
  const totalCerr=promedio(cerrados.map(p=>tiempoEstancia(p)));
  const totalActivos=promedio(activos.map(p=>tiempoEstancia(p)));
  // Por etapa: registro→triage, triage→consulta, consulta→estabilización (primer evento de cada uno)
  const ingATriage=[], triAConsulta=[], conAEstab=[];
  cerrados.concat(activos).forEach(p=>{
    const tReg=Number(p.tsMs)||null;
    const tTri=tsPrimero(db.triage,p.id);
    const tCon=tsPrimero(db.consulta,p.id);
    const tEst=tsPrimero(db.estabilizacion,p.id);
    if(tReg&&tTri&&tTri>=tReg) ingATriage.push(tTri-tReg);
    if(tTri&&tCon&&tCon>=tTri) triAConsulta.push(tCon-tTri);
    if(tCon&&tEst&&tEst>=tCon) conAEstab.push(tEst-tCon);
  });
  return {
    nCerrados:cerrados.length, nActivos:activos.length,
    totalCerrados:totalCerr, totalActivos:totalActivos,
    ingATriage:promedio(ingATriage), triAConsulta:promedio(triAConsulta), conAEstab:promedio(conAEstab)
  };
}

      // "De días previos": un alta egresada en este día es "día previo" solo si

      // Fuente del día de ingreso, por fiabilidad:

      //   2) FECHA INGRESO: ISO del Sheet (…T06:00:00Z = medianoche El Salvador)

      const _esPrevio = !enDia(p.tsMs);

    }

    const _md=enDia(p.tsMs); // v8.91: ¿ingresó en el día del tablero? (cohorte)
    if(p.estado===ESTADO.DESCARTADO){ descartados++; descFueraAlcance++; if(_md){descMismoDia++;descFueraMD++;} else descDiasPrevios++; }

  if(_DIAG_ALTAS){ try{ console.log("%c[diagAltas] Altas de HOY: "+_diagAltas.length+" — mismo día: "+altasMismoDia+", días previos: "+altasDiasPrevios+" (refNum="+(_diagAltas[0]?_diagAltas[0].refNum:"?")+")","color:#175a8c;font-weight:bold"); (console.table||console.log)(_diagAltas); }catch(e){} }
  const codigos={TRASLADO:0,ROJO:0,AMARILLO:0,VERDE:0,DESCARTADO:0}; const motivos={},triageTS={}; let triages=0; const espIngTri=[];
  db.triage.forEach(t=>{ if(!enDia(t.tsMs)) return; triages++; if(codigos[t.codigo]!==undefined)codigos[t.codigo]++; codigosDeMotivos(t.motivos).forEach(cod=>{const n=nombreDeCodigo(cod); motivos[n]=(motivos[n]||0)+1;}); if(!triageTS[t.id])triageTS[t.id]=t.tsMs; if(ingresoTS[t.id]){const m=Math.round((t.tsMs-ingresoTS[t.id])/60000); if(m>=0&&m<720)espIngTri.push(m);} });
  let consultas=0; const medicamentos={},espTriCon=[];
  db.consulta.forEach(c=>{ if(!enDia(c.tsMs)) return; consultas++; String(c.medicamentos||"").split(";").forEach(mp=>{const mm=mp.trim().match(/^(.*)\sx\s(\d+)$/); if(mm)medicamentos[mm[1].trim()]=(medicamentos[mm[1].trim()]||0)+ +mm[2]; else if(mp.trim())medicamentos[mp.trim()]=(medicamentos[mp.trim()]||0)+1;}); if(triageTS[c.id]){const m=Math.round((c.tsMs-triageTS[c.id])/60000); if(m>=0&&m<720)espTriCon.push(m);} });
  let sueros=0; const durSuero=[];
  db.estabilizacion.forEach(e=>{ if(!enDia(e.tsMs)) return; sueros++; if(e.horaInicio&&e.horaFin){const a=e.horaInicio.split(":").map(Number),b=e.horaFin.split(":").map(Number); let min=(b[0]*60+b[1])-(a[0]*60+a[1]); if(min<0)min+=1440; if(min>=0&&min<720)durSuero.push(min);} });
  let traslados2=0,refSi=0,refNo=0,refPend=0; const destinos={};
  db.traslados.forEach(r=>{ if(!enDia(r.tsMs)) return; traslados2++; const ref=String(r.referenciaEfectiva||""); if(ref.indexOf("Sí")===0||ref.indexOf("Si")===0)refSi++; else if(ref.indexOf("No")===0)refNo++; else refPend++; const dest=String(r.destino||"").trim(); if(dest)destinos[dest]=(destinos[dest]||0)+1; });
  let consultasVet=0; const especies={};
  db.consultaVet.forEach(v=>{ if(!enDia(v.tsMs)) return; consultasVet++; const esp=String(v.especie||"").trim(); if(esp)especies[esp]=(especies[esp]||0)+1; });
  const sinStock=[], bajoStock=[]; db.inventario.forEach(d=>{if(!String(d.item||"").trim())return; const stock=Number(d.stock)||0,minimo=Number(d.minimo)||0; if(stock<=0)sinStock.push(d.item); else if(minimo>0&&stock<=minimo)bajoStock.push(d.item+" ("+stock+(d.unidad?" "+d.unidad:"")+")");});
  const prom=a=>a.length?Math.round(a.reduce((x,y)=>x+y,0)/a.length):null;
  const alertas=[];

  // Atendidos TOTAL (acumulado de toda la misión): pacientes ÚNICOS que han

  db.pacientes.forEach(p=>{ if(ESTADOS_FINALES.includes(p.estado)) return; if(enDia(p.tsMs)) enProcesoHoy++; else enProcesoPrevios++; });

  db.consulta.forEach(cc=>{ if(cc.id && /estabiliz/i.test(cc.desenlace||"")) idsConEstab[cc.id]=1; });

  else if(signos.includes("S11")) r={codigo:"T",notas:["Síndrome de aplastamiento / rabdomiólisis (S11): riesgo de falla renal."]};
  else if(signos.length>=2) r={codigo:"T",notas:["≥2 signos de peligro simultáneos: inestabilidad multisistémica."]};
  else if(criticos.length>=2) r={codigo:"T",notas:["≥2 signos vitales en zona crítica: inestabilidad multisistémica."]};

  else if(criticos.length===1) r={codigo:"R",notas:["Signo vital en zona crítica ("+nombreVar(criticos[0])+"): atención inmediata."]};

    r={codigo,notas,flags,captopril};

/* Refresco suave: trae datos del Sheet si pasaron >45 s desde el último pull.
   No bloquea la interfaz; al terminar repinta el módulo activo si no hay un
   formulario a medio llenar (solo módulos de lectura). */
async function refrescarSuave(moduloLectura){
  if(MODO!=="sheet" || PULL_EN_CURSO || ocupado) return;
  if(pendientesSync()>0){
    // PUSH-FIRST: con cambios locales aún sin subir, NO se baja nada del Sheet
    // (el pull podría pisar lo pendiente). Se reintenta la subida y se avisa
    // para que nadie vuelva a registrar lo mismo pensando que se perdió.
    avisarPendientesUnaVez();
    lanzarSync();
    return;
  }
  if(Date.now()-ULTIMO_PULL < 45000) return;
  PULL_EN_CURSO=true;
  try{ await pullRemoto(); CONN_OK=true; CONN_ERR=null;
    if(moduloLectura && moduloActual===moduloLectura && !ocupado && (PULL_HUBO_CAMBIOS || moduloLectura==="dashboard")) renderModulo(moduloLectura);
  }catch(e){ CONN_OK=false; CONN_ERR=e.message; }

}
let _avisoPendTs=0;
function avisarPendientesUnaVez(){

  _avisoPendTs=ahora;

/* ---- Sincronización de fondo POR ROL ----
   Cada rol necesita una frescura distinta; espaciar los pulls reduce mucho el
   tráfico en redes de campo sin que nadie vea datos viejos:
   · Monitoreo (admin, coordinación): 60s en el tablero, 3 min en el resto.
   · Flujo clínico (triage, asistente de médico, estabilización, salud mental,
     veterinario): 1 min.
   · Puntuales (recepción, bodega, fila): 3 min — casi solo escriben, y las
     escrituras SIEMPRE van directo al servidor sin esperar este ciclo.
   Además, entrar a los módulos clave ya dispara un refresco (con tope de 45s). */
function intervaloSyncMs(){
  if(!usuarioActual) return 0;
  const rol=usuarioActual.rol;
  if(rol==="admin"||rol==="coordinacion"||rol==="coordinacionVzla"||rol==="tablero") return moduloActual==="dashboard" ? 60000 : 180000;
  if(rol==="recepcion"||rol==="bodega"||rol==="fila") return 180000;
  return 120000; /* v8.78 (2D): flujo clínico 1min → 2min. Baja a la mitad las descargas de todas las tablas por equipo; el guardado sigue yendo directo al servidor al instante, así que nadie ve datos más viejos al registrar. El tablero de monitoreo sigue en 60s. */
}
let syncRolTimer=null;
function _editandoAhora(){ /* v8.78 (2D): ¿el usuario está tecleando en un campo ahora mismo? */

function programarSyncFondo(){

    if(Date.now()-ULTIMO_PULL < cada) return;

    // usuario está tecleando — evita competir por la red y repintar bajo el usuario.
    // (El tablero no tiene campos, así que sigue refrescándose con normalidad.)
    if(ocupado || _editandoAhora()) return;

    // silencio (se ven al interactuar) para no borrar formularios a medio llenar.

const DB = {pacientes:[],triage:[],consulta:[],estabilizacion:[],traslados:[],inventario:[],movimientos:[],consultaVet:[],pacientesVet:[],estabVet:[],usuarios:[],sesiones:[],auditoria:[],medicos:[],fila:[],config:[],seguimientoTraslado:[]};

/* -- almacenamiento local (fallback / modo sin Sheet) -- */
const memoria = {};
let _avisoQuota=false;
/* v8.80: tablas append-only NO clínicas que crecen todo el día (una fila por
   acción / por login). En disco NO se guardan completas: solo la COLA aún no
   sincronizada. Así el respaldo local no desborda el cupo del navegador
   (iOS Safari ≈ 5 MB). El histórico completo vive en el Sheet y se re-baja al
   reconectar. Residuo aceptado (ya conversado): si el equipo muere OFFLINE con
   una de estas filas sin subir y se recarga, puede perderse esa entrada NO
   clínica. Los datos clínicos (pacientes, etc.) SIEMPRE se guardan completos. */

   suelta su clave si ya está toda sincronizada). No toca clínicas. */
/* v8.90: compresión LZ-String del respaldo local (solo cachés de tablas).
   Prefijo "LZ1|" identifica el formato; lo viejo sin comprimir se lee igual
   (migración transparente). Ratio medido en producción: ~9,6x. */
function lzC(s){ try{ return "LZ1|"+LZString.compressToUTF16(s); }catch(e){ return s; } }

function _podarSincronizado(){
  let liberado=false;
  Object.keys(PRUNABLES).forEach(t=>{
    try{
      const json=_colaJson(t), prev=LS_CACHE[t];
      if(json){ LS_CACHE[t]=json; localStorage.setItem("hcrm:"+t, lzC(json)); }
      else { delete LS_CACHE[t]; localStorage.removeItem("hcrm:"+t); }
      if(prev!==(json||undefined)) liberado=true;

function localGet(k){ try{ if(window.localStorage) return localStorage.getItem(k); }catch(e){} return memoria[k]!==undefined?memoria[k]:null; }
function localSet(k,v){

    // que ya está a salvo en el Sheet) y REINTENTA una vez. Solo si aún falla, avisa.
    try{ if(_podarSincronizado()){ localStorage.setItem(k,v); return; } }catch(e2){}
    if(!_avisoQuota){ _avisoQuota=true; try{ mostrarAviso("warn","El respaldo local del navegador está lleno. La app sigue funcionando y guardando en el Sheet. Toca la píldora de sincronización (junto a la lupa 🔍) para liberar espacio, o avisa al administrador."); }catch(_e){} }

   no subido. */
async function liberarEspacioLocal(){

  if(pendientesSync()>0){ mostrarAviso("info","Tienes "+pendientesSync()+" cambio(s) en cola (muchos equipos guardando a la vez). Están guardados aquí y se suben solos; reintentando ahora…"); lanzarSync(); return; }

/* Respaldo local inteligente: escribir a localStorage es sincrónico (bloquea el
   hilo) y con datos grandes cada escritura cuesta. Guardamos en memoria lo
   último escrito por tabla y solo tocamos el disco si algo cambió de verdad —
   elimina ~90% de las escrituras del auto-refresco sin perder ningún respaldo. */
const LS_CACHE = {};
function localSetTabla(t, json){

  // se GUARDA en disco depende de la tabla: completa (clínicas) o solo la cola
  // pendiente (PRUNABLES). LS_CACHE refleja lo que quedó en disco.
  const guardar = PRUNABLES[t] ? _colaJson(t) : json;
  if(LS_CACHE[t]===guardar) return false;
  LS_CACHE[t]=guardar; localSet("hcrm:"+t, lzC(guardar)); return true;

function coerce(tabla,row){
  const o={}; ESQUEMA[tabla].forEach(c=>{o[c]=row[c]!==undefined?row[c]:"";});
  (CAMPOS_BOOL[tabla]||[]).forEach(c=>{const v=o[c]; const s=String(v).trim().toUpperCase(); o[c]=(v===true||s==="TRUE"||s==="SI"||s==="SÍ"||s==="S"||s==="X"||s==="1"||v===1);});
  (CAMPOS_NUM[tabla]||[]).forEach(c=>{ if(o[c]!==""&&o[c]!=null&&!isNaN(Number(o[c]))) o[c]=Number(o[c]); });

function serializa(tabla){ return DB[tabla].map(r=>{const o={}; ESQUEMA[tabla].forEach(c=>{let v=r[c]; if(typeof v==="boolean")v=v?true:false; o[c]=v===undefined?"":v;}); return o;}); }

/* ---- Estrategia de escritura por tabla (segura para muchos usuarios) ----
   · Tablas de EVENTOS (triage, consulta, estabilización, traslados, movimientos,
     consulta vet): solo se AGREGAN filas nuevas (appendRows, dedupe por tsMs).
   · Tablas de ESTADO (pacientes, usuarios, inventario): upsert por clave —
     cada fila se actualiza o agrega sin borrar las de otros usuarios.        */
const ESTRATEGIA = {
  pacientes:{op:"upsertById", key:"id"},
  pacientesVet:{op:"upsertById", key:"id"},
  usuarios:{op:"upsertById", key:"usuario"}, medicos:{op:"upsertById", key:"id"},
  inventario:{op:"upsertById", key:"item"},
  fila:{op:"upsertById", key:"id"},
  config:{op:"upsertById", key:"clave"},
  triage:{op:"appendRows"}, consulta:{op:"appendRows"}, estabilizacion:{op:"appendRows"},
  // traslados es upsert por tsMs: cada traslado es único por su marca de tiempo
  // y así se puede ACTUALIZAR después (confirmar si fue recibido en destino).
  traslados:{op:"upsertById", key:"tsMs"},
  movimientos:{op:"appendRows"}, consultaVet:{op:"appendRows"}, estabVet:{op:"appendRows"}, sesiones:{op:"appendRows"}, auditoria:{op:"appendRows"},
  seguimientoTraslado:{op:"appendRows"}
};
/* Punteros de "ya sincronizado" para append (por tabla). */
const SYNCED = {};
function syncedGet(t){ if(SYNCED[t]!==undefined) return SYNCED[t]; const v=parseInt(localGet("hcrm:sync:"+t)||"0",10); SYNCED[t]=isNaN(v)?0:v; return SYNCED[t]; }
function syncedSet(t,n){ SYNCED[t]=n; localSet("hcrm:sync:"+t, String(n)); }
/* Instantánea de lo último sincronizado en tablas upsert: permite enviar
   SOLO las filas que cambiaron (clave→JSON), no la tabla completa. */
const SNAP = {};
function snapKeyDe(t){ return (ESTRATEGIA[t]||{}).key || "id"; }
function snapActualiza(t, filas){ const k=snapKeyDe(t); SNAP[t]=SNAP[t]||{}; filas.forEach(r=>{ const kv=String(r[k]==null?"":r[k]).toUpperCase(); if(kv) SNAP[t][kv]=JSON.stringify(r); }); }
function filasCambiadas(t, filas){ const k=snapKeyDe(t); const sn=SNAP[t]||{}; return filas.filter(r=>{ const kv=String(r[k]==null?"":r[k]).toUpperCase(); return !kv || sn[kv]!==JSON.stringify(r); }); }
/* Construye la operación pendiente de una tabla (o null si no hay nada). */
function opPendiente(tabla){
  if(!HOJAS[tabla] || !ESQUEMA[tabla]) return null; // nunca enviar una operación sin hoja destino
  const est=ESTRATEGIA[tabla]||{op:"pushTable"};
  const filas=serializa(tabla);
  if(est.op==="appendRows"){
    const desde=Math.min(syncedGet(tabla), filas.length);
    const nuevas=filas.slice(desde);
    if(!nuevas.length) return null;
    return {op:"appendRows", sheet:HOJAS[tabla], rows:nuevas, _tabla:tabla, _total:filas.length};
  }
  if(est.op==="upsertById"){
    const cambiadas=filasCambiadas(tabla, filas);
    if(!cambiadas.length) return null;
    return {op:"upsertById", sheet:HOJAS[tabla], key:est.key, rows:cambiadas, _tabla:tabla};
  }
  return {op:"pushTable", sheet:HOJAS[tabla], rows:filas, _tabla:tabla};
}
function opConfirmada(o){
  if(!o) return;
  if(o.op==="appendRows") syncedSet(o._tabla, Math.max(syncedGet(o._tabla), o._total)); /* v8.96 (1c): el puntero nunca retrocede */
  else if(o.op==="upsertById") snapActualiza(o._tabla, o.rows);
}

async function pushRemoto(tabla){

/* Reescribe por completo las hojas indicadas con el contenido ACTUAL del DB
   local (pushTable). Se usa para eliminaciones (p. ej. limpiar datos demo),
   ya que el upsert normal no borra filas del Sheet. Reajusta snapshots/synced. */
async function reescribirTablas(tablas){
  for(const t of tablas){
    if(!HOJAS[t] || !ESQUEMA[t]) continue;
    const filas=serializa(t);
    await apiPost({op:"pushTable", sheet:HOJAS[t], rows:filas});
    // Reajustar el control de sincronización según la estrategia de la tabla
    const est=(ESTRATEGIA[t]||{}).op;
    if(est==="appendRows"){ syncedSet(t, filas.length); }
    else if(est==="upsertById"){ SNAP[t]={}; snapActualiza(t, filas); }
  }
}

let BATCH_NO_SOPORTADO=false;

  // Guardia PUSH-FIRST: nunca reemplazar los datos locales mientras haya
  // cambios en cola sin subir — primero sube lo pendiente, luego se baja.
  if(pendientesSync()>0){ lanzarSync(); return; }
  const res = await fetch(API_URL + (API_URL.indexOf("?")>=0?"&":"?") + "action=readAll" + (CLAVE_API?"&k="+encodeURIComponent(CLAVE_API):""), {method:"GET"});
  const txt = await res.text();
  let j; try{ j=JSON.parse(txt); }catch(e){ throw new Error("Respuesta no válida (HTTP "+res.status+"). "+_pistaConexion(txt)); }
  if(!j.ok) throw new Error(j.error||"Error al leer el Sheet.");
  let cambios=false;
  TABLAS.forEach(t=>{
    // 'usuarios' no viaja en readAll (el backend la excluye por seguridad); se
    // carga aparte con listaUsuarios. NO la pisamos aquí o borraríamos la lista
    // que el admin ya cargó (y el auto-refresco de 60s la dejaría vacía).
    if(t==="usuarios") return;
    const filas=(j.data&&j.data[HOJAS[t]])||[]; DB[t]=filas.map(f=>coerce(t,f)); const est=(ESTRATEGIA[t]||{}).op; if(est==="appendRows") syncedSet(t, Math.max(syncedGet(t), DB[t].length)); /* v8.96 (1c): el puntero NUNCA retrocede — evita re-subir filas ya guardadas cuando un readAll parcial baja menos filas en pico */ if(est==="upsertById"){ SNAP[t]={}; snapActualiza(t, serializa(t)); } if(localSetTabla(t, JSON.stringify(serializa(t)))) cambios=true;
  });
  PULL_HUBO_CAMBIOS=cambios;
  ULTIMO_PULL = Date.now();
}
/* Pista según el cuerpo recibido cuando NO es JSON */
function _pistaConexion(txt){
  const t=(txt||"").toLowerCase();
  if(t.indexOf("accounts.google.com")>=0 || t.indexOf("iniciar sesión")>=0 || t.indexOf("sign in")>=0)
    return "El servidor pidió inicio de sesión → en el despliegue, 'Quién tiene acceso' debe ser CUALQUIERA.";
  if(t.indexOf("<a class=\"i\"")>=0 || t.indexOf("hospital de campaña — menú")>=0 || t.indexOf("1 · ingreso")>=0)
    return "Respondió la página del menú viejo → falta re-desplegar con Versión: Nueva (para que atienda ?action).";
  if(t.indexOf("<!doctype")>=0 || t.indexOf("<html")>=0)
    return "El servidor devolvió una página HTML en vez de datos → revisa la URL /exec y el acceso 'Cualquiera'.";
  if(t.indexOf("script function not found")>=0 || t.indexOf("doget")>=0)
    return "El proyecto no tiene la función esperada → confirma que pegaste el Codigo.gs actualizado y guardaste.";
  return "Revisa que la URL termine en /exec y que el despliegue sea Aplicación web con acceso 'Cualquiera'.";
}
/* Prueba de conexión: ?action=ping (no escribe nada) */
async function pingRemoto(){
  if(!API_URL) return {ok:false, local:true};
  const url = API_URL + (API_URL.indexOf("?")>=0?"&":"?") + "action=ping";
  let res, txt;
  try{ res = await fetch(url, {method:"GET"}); }
  catch(e){ return {ok:false, error:"No se pudo contactar el servidor (posible URL mal escrita, sin internet o bloqueo CORS). "+e.message}; }
  try{ txt = await res.text(); }catch(e){ txt=""; }
  let j=null; try{ j=JSON.parse(txt); }catch(e){}
  if(j && j.ok) return {ok:true, status:res.status, info:j};
  return {ok:false, status:res.status, error:_pistaConexion(txt), muestra:(txt||"").slice(0,160)};
}
async function diagnoseRemoto(){
  if(!API_URL) return {ok:false, error:"Sin API_URL."};
  const url = API_URL + (API_URL.indexOf("?")>=0?"&":"?") + "action=diagnose" + (CLAVE_API?"&k="+encodeURIComponent(CLAVE_API):"");
  let res, txt;
  try{ res = await fetch(url, {method:"GET"}); }catch(e){ return {ok:false, error:e.message}; }
  try{ txt = await res.text(); }catch(e){ txt=""; }
  let j=null; try{ j=JSON.parse(txt); }catch(e){}
  if(j && j.ok) return {ok:true, info:j};
  return {ok:false, error:_pistaConexion(txt)};
}

async function cargarTodo(){

  else { TABLAS.forEach(t=>{ const raw=lzD(localGet("hcrm:"+t)); if(raw!=null) LS_CACHE[t]=raw; DB[t]=raw?JSON.parse(raw).map(f=>coerce(t,f)):[]; if(PRUNABLES[t]) syncedSet(t,0); }); }
}
async function commit(tabla){

/* commit de varias tablas; devuelve error combinado si alguna falla */
function _pistaBackendViejo(msg){
  // El backend antiguo no conoce las hojas nuevas ni la op batch: devuelve
  // "Hoja no permitida ... undefined" o "Operación no reconocida". Damos una
  // instrucción accionable en vez del error técnico.
  if(/no permitida|no reconocida|undefined/i.test(msg))
    return "El Google Sheet aún corre una versión anterior del script. En Apps Script: ejecuta setup() una vez y vuelve a desplegar (Administrar implementaciones → ✏️ → Versión: Nueva). Detalle: "+msg;
  return msg;
}
/* ==================== COLA DE SINCRONIZACIÓN (outbox) ====================
   Cada guardado queda LOCAL al instante y el usuario sigue trabajando; la
   subida al Sheet ocurre en segundo plano. Si varios guardados se acumulan
   (conexión lenta, ráfaga de trabajo) se agrupan en UN solo POST — menos
   ejecuciones en Google = más usuarios simultáneos. Si el servidor responde
   "busy" o no hay señal, se reintenta con espera creciente. Es seguro
   reintentar: el backend deduplica eventos por tsMs y los upserts son
   idempotentes. La cola sobrevive a recargas (localStorage) y un indicador
   en la barra superior informa siempre el estado. */
const colaTablas = new Map((()=>{ try{ const v=JSON.parse(localGet("hcrm:cola")||"[]"); return Array.isArray(v)? v.map(x=>Array.isArray(x)?x:[x,1]) : []; }catch(e){ return []; } })());
let colaGen=[...colaTablas.values()].reduce((a,b)=>Math.max(a,b||1),0);
let syncEnCurso=false, syncReintentos=0, syncTimer=null, syncUltimoErr="", syncErrPermanente=false;
function colaPersistir(){ localSet("hcrm:cola", JSON.stringify([...colaTablas.entries()])); }
function pendientesSync(){ return colaTablas.size; }

function esReintentable(err){
  if(err && err.busy) return true;
  const m=String(err&&err.message||err||"");
  return /busy|ocupado|Failed to fetch|NetworkError|load failed|timeout|HTTP 429|HTTP 5\d\d/i.test(m);
}

async function commitAll(tablas){
  // 1) Respaldo local SIEMPRE primero: la operación nunca se pierde.
  tablas.forEach(t=>localSetTabla(t, JSON.stringify(serializa(t))));
  if(MODO!=="sheet") return;
  // 2) Encolar (con generación) y disparar la subida en segundo plano.
  colaGen++;
  tablas.forEach(t=>colaTablas.set(t, colaGen)); colaPersistir();
  syncErrPermanente=false;
  actualizarPildoraSync();
  lanzarSync();
}

async function subirTablas(tablas){
  let ops=tablas.map(opPendiente).filter(Boolean);
  const invalidas=ops.filter(o=>!o.sheet);
  ops=ops.filter(o=>o.sheet);
  if(!ops.length){
    if(invalidas.length) throw new Error("Tabla sin hoja destino. Actualiza la app (recarga con caché limpia).");
    return; // nada que subir (sin cambios netos)
  }
  if(ops.length>1 && !BATCH_NO_SOPORTADO){
    try{
      const _rb=await apiPost({op:"batch", ops:ops.map(o=>{const {_tabla,_total,...l}=o; return l;})}); _registrarOmitidas(_rb&&_rb.resultados);
      ops.forEach(opConfirmada);
      return;
    }catch(e){
      if(/Operación no reconocida/i.test(e.message)) BATCH_NO_SOPORTADO=true; // backend viejo → uno por uno
      else throw e;
    }
  }
  for(const o of ops){ const {_tabla,_total,...l}=o; const _r1=await apiPost(l); _registrarOmitidas([_r1]); opConfirmada(o); }
}

/* v8.90: el servidor puede rechazar cambios cuando otro usuario actualizó
   primero (guard anti-regresión → campo "omitidas"). Antes el cliente lo
   ignoraba y el paciente "saltaba" sin explicación en el próximo pull. */
let _omitidasPendientes=0;
function _registrarOmitidas(rs){ try{ (rs||[]).forEach(r=>{ const n=Number(r&&r.omitidas)||0; if(n>0) _omitidasPendientes+=n; }); }catch(e){} }
/* v8.90: al drenar la cola, bajar de inmediato las novedades de otros equipos
   (antes se esperaba el próximo ciclo: hasta 2-3 min ciego). Si hubo omitidas,
   avisa y fuerza el pull; si no, respeta un tope suave de 15 s. */
function _pullTrasDrenaje(){
  if(MODO!=="sheet" || pendientesSync()>0) return;
  if(_omitidasPendientes>0){
    const n=_omitidasPendientes; _omitidasPendientes=0;
    try{ mostrarAviso("info", n+" registro(s) ya los actualizó otro equipo; bajando la versión más reciente. Si no ves el cambio, revisa si el paciente ya aparece en el otro estado o con otro usuario."); }catch(e){}
    ULTIMO_PULL=0;
  } else if(Date.now()-ULTIMO_PULL<15000) return;
  else ULTIMO_PULL=0;
  setTimeout(()=>{ try{ const mod=(!_editandoAhora() && !ocupado)?moduloActual:null; refrescarSuave(mod); }catch(e){} },300);
}
async function lanzarSync(){
  if(syncEnCurso || MODO!=="sheet" || !colaTablas.size) { actualizarPildoraSync(); return; }
  syncEnCurso=true; actualizarPildoraSync();
  const genVuelo=colaGen;               // lo encolado DESPUÉS de aquí no se desmarca
  const lote=[...colaTablas.keys()];
  let exito=false;
  try{
    await subirTablas(lote);
    lote.forEach(t=>{ if((colaTablas.get(t)||0)<=genVuelo) colaTablas.delete(t); });
    colaPersistir();
    syncReintentos=0; syncUltimoErr=""; syncErrPermanente=false; exito=true;
  }catch(e){
    syncUltimoErr=_pistaBackendViejo(e.message||String(e));
    if(esReintentable(e)){
      syncReintentos++;
      const espera=Math.min(60000, 1000*Math.pow(2, Math.min(syncReintentos-1,6)))*(0.7+Math.random()*0.6);
      clearTimeout(syncTimer); syncTimer=setTimeout(lanzarSync, espera);
    }else{
      // Error de configuración (p. ej. backend viejo): no martillar; reintento lento
      syncErrPermanente=true;
      clearTimeout(syncTimer); syncTimer=setTimeout(lanzarSync, 90000);
    }
  }
  syncEnCurso=false; actualizarPildoraSync();
  if(exito && colaTablas.size) lanzarSync(); // se encoló más durante la subida
  else if(exito) _pullTrasDrenaje(); // v8.90: bajar novedades apenas se drena la cola
}

/* Píldora de estado en la barra superior: el usuario siempre sabe qué pasa. */
function actualizarPildoraSync(){
  const el=document.getElementById("syncPill"); if(!el) return;
  if(MODO!=="sheet"){ el.style.display="none"; return; }
  el.style.display="";
  const n=pendientesSync();
  el.classList.remove("ok","subiendo","reintento","error");
  if(n===0){ el.classList.add("ok"); el.innerHTML="✓"; el.title="Todo sincronizado con el Sheet"; }
  else if(syncEnCurso){ el.classList.add("subiendo"); el.innerHTML="⏳ "+n; el.title="Subiendo "+n+" cambio(s) al Sheet…"; }
  else if(syncErrPermanente){ el.classList.add("error"); el.innerHTML="⚠ "+n; el.title="No se pudo sincronizar: "+syncUltimoErr+" — Tus datos están guardados en este equipo."; }
  else { el.classList.add("reintento"); el.innerHTML="🔁 "+n; el.title="Muchos equipos guardando a la vez. Tus "+n+" cambio(s) están guardados en este equipo y se suben solos en unos segundos — no cierres la app."; }
}

/* Guardias: que nadie cierre o salga creyendo que ya subió todo. */
if(typeof window!=="undefined" && window.addEventListener){
  window.addEventListener("beforeunload", e=>{
    if(pendientesSync()>0){ e.preventDefault(); e.returnValue="Hay cambios aún subiéndose al Sheet."; return e.returnValue; }
  });
  window.addEventListener("online", ()=>{ syncReintentos=0; lanzarSync(); });
}

   La IP no la da Apps Script; se consulta desde el navegador (ipapi.co) al
   iniciar sesión. Sin internet o si el servicio falla, queda vacía. */
let IPINFO=null;
async function obtenerIPInfo(){

  try{

  return {dispositivo:os, navegador:nav};

/* ---- Bitácora de acciones (auditoría) ----
   Ligada al usuario REAL de la sesión (no al texto libre de "responsable").
   IMPORTANTE: prepararLog() solo apila la entrada en memoria (sin red); el
   guardado viaja SIEMPRE dentro del MISMO commitAll de la acción principal
   (ver conLog()), para que no se pierda si la conexión falla y para no
   duplicar peticiones al backend. */
function prepararLog(accion, detalle){
  if(!usuarioActual) return;
  DB.auditoria.push({fechaHora:ahoraStr(), tsMs:Date.now(), usuario:usuarioActual.usuario, rol:usuarioActual.rol, accion:accion||"", detalle:String(detalle||"").slice(0,300)});
}
function conLog(tablas){ return usuarioActual ? [...tablas, "auditoria"] : tablas; }
async function registrarSesion(evento){
  if(!usuarioActual) return;
  const u={usuario:usuarioActual.usuario, rol:usuarioActual.rol}; // instantánea: cerrarSesion anula usuarioActual enseguida
  try{

    await commitAll(["sesiones"]);
  }catch(e){ /* auditoría best-effort: nunca bloquea la operación */ }
}
let usuarioActual=null, moduloActual=null, dashTimer=null, ocupado=false;
/* v8.78 (2C): perro guardián de "ocupado". Un guardado colgado (red muerta, una
   promesa que nunca resuelve) podría dejar "ocupado" en true y congelar TODOS los
   botones y el cambio de pantalla. Como los guardados son optimistas (guardan local
   y suben en segundo plano), "ocupado" debe soltarse en menos de 1-2 s; si sigue
   activo pasados 15 s es un cuelgue: lo liberamos para que la app no quede trabada.
   Esto NO cambia la lógica de guardado — solo es una red de seguridad. */
const OCUPADO_MAX_MS = 15000; let _ocupadoDesde = 0;
setInterval(function(){
  if(ocupado){
    if(!_ocupadoDesde) _ocupadoDesde = Date.now();
    else if(Date.now()-_ocupadoDesde > OCUPADO_MAX_MS){
      ocupado=false; _ocupadoDesde=0;
      try{ mostrarAviso("warn","La app se recuperó tras una operación demorada. Si tu último cambio no aparece, revisa la píldora de sincronización (⏳ junto a la lupa) e inténtalo otra vez."); }catch(e){}
    }
  } else { _ocupadoDesde=0; }
}, 1000);

/* ---- Sesión persistente: se mantiene hasta 1 h de inactividad ---- */
const SESION_MS = 60*60*1000; // 1 hora
let sesionTimer=null;
function guardarSesion(){ if(!usuarioActual) return; try{ localSet("hcrm:sesion", JSON.stringify({usuario:usuarioActual.usuario, rol:usuarioActual.rol, nombre:usuarioActual.nombre, ts:Date.now()})); }catch(e){} }
function limpiarSesion(){ try{ localStorage.removeItem("hcrm:sesion"); }catch(e){} }
function sesionGuardada(){
  try{
    const raw=localGet("hcrm:sesion"); if(!raw) return null;
    const s=JSON.parse(raw);
    if(!s || !s.usuario || !s.ts) return null;
    if(Date.now()-s.ts > SESION_MS){ limpiarSesion(); return null; } // expiró por inactividad
    return s;
  }catch(e){ return null; }
}
function tocarSesion(){ // renueva la marca de actividad y reinicia el reloj de expiración
  if(!usuarioActual) return;
  guardarSesion();
  clearTimeout(sesionTimer);
  sesionTimer=setTimeout(()=>{ if(usuarioActual){ cerrarSesion(true); } }, SESION_MS);
}
function cerrarSesion(porInactividad){
  if(usuarioActual) registrarSesion(porInactividad?"EXPIRACION":"SALIDA");
  clearInterval(dashTimer); clearInterval(syncRolTimer); clearTimeout(sesionTimer);
  usuarioActual=null; moduloActual=null; limpiarSesion();

}
function iniciarSesionCon(found, silencioso){

}
/* v8.37: verifica QUÉ versión de Codigo.gs está sirviendo la implementación.
   Si el servidor responde una versión vieja (o ninguna: código anterior a
   v7.31), significa que el guard anti-regresión NO está activo y las altas
   pueden seguir revirtiéndose por sincronizaciones rezagadas. Se muestra un
   banner rojo fijo SOLO a admin/coordinación (quienes pueden re-desplegar).
   Sin red no molesta. */
const BACKEND_ESPERADO="7.38";
async function verificarBackend(){
  try{
    const r=await apiPost({op:"ping"});
    const v=(r&&r.version)?String(r.version):null;
    const b0=document.getElementById("bkVerBanner");
    if(v===BACKEND_ESPERADO){ if(b0) b0.remove(); return; }
    if(!usuarioActual || ROLES_RECONCILIAR.indexOf(usuarioActual.rol)<0) return;
    // v8.44: distinguir la DIRECCIÓN del desajuste comparando versiones.
    //  · servidor MÁS VIEJO que lo esperado → crítico: el guard puede no estar
    //    activo, las altas/triage pueden revertirse. Rojo.
    //  · servidor MÁS NUEVO (o el HTML quedó atrás) → solo hay que recargar el
    //    HTML con caché limpia; el backend está bien. Ámbar, no alarma.
    const cmp=(a,b)=>{ const pa=String(a||"0").split(".").map(Number), pb=String(b||"0").split(".").map(Number); for(let i=0;i<Math.max(pa.length,pb.length);i++){ const d=(pa[i]||0)-(pb[i]||0); if(d) return d<0?-1:1; } return 0; };
    const servidorViejo = v ? cmp(v, BACKEND_ESPERADO)<0 : true;
    let b=b0;
    if(!b){ b=document.createElement("div"); b.id="bkVerBanner"; document.body.appendChild(b); }
    if(servidorViejo){
      b.style.cssText="position:fixed;top:0;left:0;right:0;z-index:9999;background:#8c1c1c;color:#fff;padding:10px 14px;font-size:13px;font-weight:700;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.25)";
      b.textContent="⚠️ El servidor ejecuta una versión VIEJA del backend ("+(v||"anterior a 7.31")+"; se esperaba "+BACKEND_ESPERADO+"). El guard anti-regresión NO está activo y las altas/triage pueden revertirse. Re-despliega: Apps Script → Implementar → Administrar implementaciones → (la implementación existente) → Editar → Nueva versión.";
    }else{
      b.style.cssText="position:fixed;top:0;left:0;right:0;z-index:9999;background:#8a6100;color:#fff;padding:10px 14px;font-size:13px;font-weight:700;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.25)";
      b.textContent="ℹ️ El servidor ya corre el backend "+v+" (el guard está activo). Esta app tiene una versión más antigua ("+BACKEND_ESPERADO+"): recarga con caché limpia (Ctrl/Cmd+Shift+R) o sube el HTML actualizado. No afecta la protección de datos.";
    }
  }catch(e){ /* sin conexión: no alertar */ }
}

  // paciente (triage/consulta/estabilización/traslado), o su ingreso si aún no
  // tiene ninguno. Es epoch (tsMs), inmune a la zona horaria del dispositivo.
  function mapaUltEvento(){
    const m={};
    const add=arr=>{ if(!arr) return; for(const r of arr){ const id=r.id; if(!id) continue; const t=Number(r.tsMs)||0; if(t>(m[id]||0)) m[id]=t; } };
    add(DB.triage); add(DB.consulta); add(DB.estabilizacion); add(DB.traslados);
    return m;
  }
