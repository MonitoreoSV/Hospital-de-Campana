let CONN_ERR = null, CONN_OK = false, ULTIMO_PULL = 0, PULL_EN_CURSO = false, PULL_HUBO_CAMBIOS = false;
/* Refresco suave: trae datos del Sheet si pasaron >45 s desde el último pull.
   No bloquea la interfaz; al terminar repinta el módulo activo si no hay un
   formulario a medio llenar (solo módulos de lectura). */
async function refrescarSuave(moduloLectura){
  if(MODO!=="sheet" || PULL_EN_CURSO) return;
  if(pendientesSync()>0){
    // PUSH-FIRST: con cambios locales aún sin subir, NO se baja nada del Sheet
    // (el pull podría pisar lo pendiente). Se reintenta la subida y se avisa
    // para que nadie vuelva a registrar lo mismo pensando que se perdió.
    avisarPendientesUnaVez();
    lanzarSync();
    return;
  }
  if(Date.now()-ULTIMO_PULL < 45000) return;
  PULL_EN_CURSO=true;
  try{ await pullRemoto(); CONN_OK=true; CONN_ERR=null;
    if(moduloLectura && moduloActual===moduloLectura && !ocupado && (PULL_HUBO_CAMBIOS || moduloLectura==="dashboard")) renderModulo(moduloLectura);
  }catch(e){ CONN_OK=false; CONN_ERR=e.message; }
  finally{ PULL_EN_CURSO=false; }
}
let _avisoPendTs=0;
function avisarPendientesUnaVez(){
  const n=pendientesSync(); if(!n) return;
  const ahora=Date.now(); if(ahora-_avisoPendTs<120000) return; // máx. cada 2 min
  _avisoPendTs=ahora;
  try{ mostrarAviso("warn","Hay "+n+" cambio(s) guardándose todavía (mira la píldora ⏳ junto a la lupa). Ya quedaron registrados en este dispositivo: NO los vuelvas a ingresar."); }catch(e){}
}
/* ---- Sincronización de fondo POR ROL ----
   Cada rol necesita una frescura distinta; espaciar los pulls reduce mucho el
   tráfico en redes de campo sin que nadie vea datos viejos:
   · Monitoreo (admin, coordinación): 60s en el tablero, 3 min en el resto.
   · Flujo clínico (triage, asistente de médico, estabilización, salud mental,
     veterinario): 1 min.
   · Puntuales (recepción, bodega, fila): 3 min — casi solo escriben, y las
     escrituras SIEMPRE van directo al servidor sin esperar este ciclo.
   Además, entrar a los módulos clave ya dispara un refresco (con tope de 45s). */
function intervaloSyncMs(){
  if(!usuarioActual) return 0;
  const rol=usuarioActual.rol;
  if(rol==="admin"||rol==="coordinacion"||rol==="coordinacionVzla"||rol==="tablero") return moduloActual==="dashboard" ? 60000 : 180000;
  if(rol==="recepcion"||rol==="bodega"||rol==="fila") return 180000;
  return 60000;
}
let syncRolTimer=null;
function programarSyncFondo(){
  clearInterval(syncRolTimer);
  syncRolTimer=setInterval(()=>{
    if(!usuarioActual) return;
    const cada=intervaloSyncMs(); if(!cada) return;
    if(Date.now()-ULTIMO_PULL < cada) return;
    // Solo el tablero se repinta solo; los demás módulos reciben los datos en
    // silencio (se ven al interactuar) para no borrar formularios a medio llenar.
    refrescarSuave(moduloActual==="dashboard" ? "dashboard" : null);
  }, 30000);
}
const DB = {pacientes:[],triage:[],consulta:[],estabilizacion:[],traslados:[],inventario:[],movimientos:[],consultaVet:[],pacientesVet:[],estabVet:[],usuarios:[],sesiones:[],auditoria:[],medicos:[],fila:[],config:[]};

/* -- almacenamiento local (fallback / modo sin Sheet) -- */
const memoria = {};
function localGet(k){ try{ if(window.localStorage) return localStorage.getItem(k); }catch(e){} return memoria[k]!==undefined?memoria[k]:null; }
let _avisoQuota=false;
function localSet(k,v){ try{ if(window.localStorage){ localStorage.setItem(k,v); return; } }catch(e){ if(!_avisoQuota){ _avisoQuota=true; try{ mostrarAviso("warn","El respaldo local del navegador se llenó. La app sigue funcionando y guardando en el Sheet, pero sin copia local en este dispositivo. Avisa al administrador."); }catch(_e){} } } memoria[k]=v; }
/* Respaldo local inteligente: escribir a localStorage es sincrónico (bloquea el
   hilo) y con datos grandes cada escritura cuesta. Guardamos en memoria lo
   último escrito por tabla y solo tocamos el disco si algo cambió de verdad —
   elimina ~90% de las escrituras del auto-refresco sin perder ningún respaldo. */
const LS_CACHE = {};
function localSetTabla(t, json){ if(LS_CACHE[t]===json) return false; LS_CACHE[t]=json; localSet("hcrm:"+t, json); return true; }

function coerce(tabla,row){
  const o={}; ESQUEMA[tabla].forEach(c=>{o[c]=row[c]!==undefined?row[c]:"";});
  (CAMPOS_BOOL[tabla]||[]).forEach(c=>{const v=o[c]; const s=String(v).trim().toUpperCase(); o[c]=(v===true||s==="TRUE"||s==="SI"||s==="SÍ"||s==="S"||s==="X"||s==="1"||v===1);});
  (CAMPOS_NUM[tabla]||[]).forEach(c=>{ if(o[c]!==""&&o[c]!=null&&!isNaN(Number(o[c]))) o[c]=Number(o[c]); });
  return o;
}
function serializa(tabla){ return DB[tabla].map(r=>{const o={}; ESQUEMA[tabla].forEach(c=>{let v=r[c]; if(typeof v==="boolean")v=v?true:false; o[c]=v===undefined?"":v;}); return o;}); }

/* ---- Estrategia de escritura por tabla (segura para muchos usuarios) ----
   · Tablas de EVENTOS (triage, consulta, estabilización, traslados, movimientos,
     consulta vet): solo se AGREGAN filas nuevas (appendRows, dedupe por tsMs).
   · Tablas de ESTADO (pacientes, usuarios, inventario): upsert por clave —
     cada fila se actualiza o agrega sin borrar las de otros usuarios.        */
const ESTRATEGIA = {
  pacientes:{op:"upsertById", key:"id"},
  pacientesVet:{op:"upsertById", key:"id"},
  usuarios:{op:"upsertById", key:"usuario"}, medicos:{op:"upsertById", key:"id"},
  inventario:{op:"upsertById", key:"item"},
  fila:{op:"upsertById", key:"id"},
  config:{op:"upsertById", key:"clave"},
  triage:{op:"appendRows"}, consulta:{op:"appendRows"}, estabilizacion:{op:"appendRows"},
  // traslados es upsert por tsMs: cada traslado es único por su marca de tiempo
  // y así se puede ACTUALIZAR después (confirmar si fue recibido en destino).
  traslados:{op:"upsertById", key:"tsMs"},
  movimientos:{op:"appendRows"}, consultaVet:{op:"appendRows"}, estabVet:{op:"appendRows"}, sesiones:{op:"appendRows"}, auditoria:{op:"appendRows"}
};
/* Punteros de "ya sincronizado" para append (por tabla). */
const SYNCED = {};
function syncedGet(t){ if(SYNCED[t]!==undefined) return SYNCED[t]; const v=parseInt(localGet("hcrm:sync:"+t)||"0",10); SYNCED[t]=isNaN(v)?0:v; return SYNCED[t]; }
function syncedSet(t,n){ SYNCED[t]=n; localSet("hcrm:sync:"+t, String(n)); }
/* Instantánea de lo último sincronizado en tablas upsert: permite enviar
   SOLO las filas que cambiaron (clave→JSON), no la tabla completa. */
const SNAP = {};
function snapKeyDe(t){ return (ESTRATEGIA[t]||{}).key || "id"; }
function snapActualiza(t, filas){ const k=snapKeyDe(t); SNAP[t]=SNAP[t]||{}; filas.forEach(r=>{ const kv=String(r[k]==null?"":r[k]).toUpperCase(); if(kv) SNAP[t][kv]=JSON.stringify(r); }); }
function filasCambiadas(t, filas){ const k=snapKeyDe(t); const sn=SNAP[t]||{}; return filas.filter(r=>{ const kv=String(r[k]==null?"":r[k]).toUpperCase(); return !kv || sn[kv]!==JSON.stringify(r); }); }
/* Construye la operación pendiente de una tabla (o null si no hay nada). */
function opPendiente(tabla){
  if(!HOJAS[tabla] || !ESQUEMA[tabla]) return null; // nunca enviar una operación sin hoja destino
  const est=ESTRATEGIA[tabla]||{op:"pushTable"};
  const filas=serializa(tabla);
  if(est.op==="appendRows"){
    const desde=Math.min(syncedGet(tabla), filas.length);
    const nuevas=filas.slice(desde);
    if(!nuevas.length) return null;
    return {op:"appendRows", sheet:HOJAS[tabla], rows:nuevas, _tabla:tabla, _total:filas.length};
  }
  if(est.op==="upsertById"){
    const cambiadas=filasCambiadas(tabla, filas);
    if(!cambiadas.length) return null;
    return {op:"upsertById", sheet:HOJAS[tabla], key:est.key, rows:cambiadas, _tabla:tabla};
  }
  return {op:"pushTable", sheet:HOJAS[tabla], rows:filas, _tabla:tabla};
}
function opConfirmada(o){
  if(!o) return;
  if(o.op==="appendRows") syncedSet(o._tabla, o._total);
  else if(o.op==="upsertById") snapActualiza(o._tabla, o.rows);
}

const CLAVE_API="HC-LaGuaira-2026"; // debe coincidir con el Codigo.gs
async function apiPost(payload){
  if(CLAVE_API) payload.k=CLAVE_API;
  const res = await fetch(API_URL, {method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body: JSON.stringify(payload)});
  const txt = await res.text();
  let j; try{ j=JSON.parse(txt); }catch(e){ throw new Error("Respuesta no válida al guardar (HTTP "+res.status+"). "+_pistaConexion(txt)); }
  if(!j.ok){ const err=new Error(j.error||"Error al guardar en el Sheet."); if(j.busy) err.busy=true; throw err; }
  return j;
}
async function pushRemoto(tabla){
  const o=opPendiente(tabla);
  if(!o) return;
  const {_tabla,_total,...limpio}=o;
  await apiPost(limpio);
  opConfirmada(o);
}
/* Reescribe por completo las hojas indicadas con el contenido ACTUAL del DB
   local (pushTable). Se usa para eliminaciones (p. ej. limpiar datos demo),
   ya que el upsert normal no borra filas del Sheet. Reajusta snapshots/synced. */
async function reescribirTablas(tablas){
  for(const t of tablas){
    if(!HOJAS[t] || !ESQUEMA[t]) continue;
    const filas=serializa(t);
    await apiPost({op:"pushTable", sheet:HOJAS[t], rows:filas});
    // Reajustar el control de sincronización según la estrategia de la tabla
    const est=(ESTRATEGIA[t]||{}).op;
    if(est==="appendRows"){ syncedSet(t, filas.length); }
    else if(est==="upsertById"){ SNAP[t]={}; snapActualiza(t, filas); }
  }
}
/* true si el backend aún no entiende la operación "batch" */
let BATCH_NO_SOPORTADO=false;
async function pullRemoto(){
  // Guardia PUSH-FIRST: nunca reemplazar los datos locales mientras haya
  // cambios en cola sin subir — primero sube lo pendiente, luego se baja.
  if(pendientesSync()>0){ lanzarSync(); return; }
  const res = await fetch(API_URL + (API_URL.indexOf("?")>=0?"&":"?") + "action=readAll" + (CLAVE_API?"&k="+encodeURIComponent(CLAVE_API):""), {method:"GET"});
  const txt = await res.text();
  let j; try{ j=JSON.parse(txt); }catch(e){ throw new Error("Respuesta no válida (HTTP "+res.status+"). "+_pistaConexion(txt)); }
  if(!j.ok) throw new Error(j.error||"Error al leer el Sheet.");
  let cambios=false;
  TABLAS.forEach(t=>{
    // 'usuarios' no viaja en readAll (el backend la excluye por seguridad); se
    // carga aparte con listaUsuarios. NO la pisamos aquí o borraríamos la lista
    // que el admin ya cargó (y el auto-refresco de 60s la dejaría vacía).
    if(t==="usuarios") return;
    const filas=(j.data&&j.data[HOJAS[t]])||[]; DB[t]=filas.map(f=>coerce(t,f)); const est=(ESTRATEGIA[t]||{}).op; if(est==="appendRows") syncedSet(t, DB[t].length); if(est==="upsertById"){ SNAP[t]={}; snapActualiza(t, serializa(t)); } if(localSetTabla(t, JSON.stringify(serializa(t)))) cambios=true;
  });
  PULL_HUBO_CAMBIOS=cambios;
  ULTIMO_PULL = Date.now();
}
/* Pista según el cuerpo recibido cuando NO es JSON */
function _pistaConexion(txt){
  const t=(txt||"").toLowerCase();
  if(t.indexOf("accounts.google.com")>=0 || t.indexOf("iniciar sesión")>=0 || t.indexOf("sign in")>=0)
    return "El servidor pidió inicio de sesión → en el despliegue, 'Quién tiene acceso' debe ser CUALQUIERA.";
  if(t.indexOf("<a class=\"i\"")>=0 || t.indexOf("hospital de campaña — menú")>=0 || t.indexOf("1 · ingreso")>=0)
    return "Respondió la página del menú viejo → falta re-desplegar con Versión: Nueva (para que atienda ?action).";
  if(t.indexOf("<!doctype")>=0 || t.indexOf("<html")>=0)
    return "El servidor devolvió una página HTML en vez de datos → revisa la URL /exec y el acceso 'Cualquiera'.";
  if(t.indexOf("script function not found")>=0 || t.indexOf("doget")>=0)
    return "El proyecto no tiene la función esperada → confirma que pegaste el Codigo.gs actualizado y guardaste.";
  return "Revisa que la URL termine en /exec y que el despliegue sea Aplicación web con acceso 'Cualquiera'.";
}
/* Prueba de conexión: ?action=ping (no escribe nada) */
async function pingRemoto(){
  if(!API_URL) return {ok:false, local:true};
  const url = API_URL + (API_URL.indexOf("?")>=0?"&":"?") + "action=ping";
  let res, txt;
  try{ res = await fetch(url, {method:"GET"}); }
  catch(e){ return {ok:false, error:"No se pudo contactar el servidor (posible URL mal escrita, sin internet o bloqueo CORS). "+e.message}; }
  try{ txt = await res.text(); }catch(e){ txt=""; }
  let j=null; try{ j=JSON.parse(txt); }catch(e){}
  if(j && j.ok) return {ok:true, status:res.status, info:j};
  return {ok:false, status:res.status, error:_pistaConexion(txt), muestra:(txt||"").slice(0,160)};
}
async function diagnoseRemoto(){
  if(!API_URL) return {ok:false, error:"Sin API_URL."};
  const url = API_URL + (API_URL.indexOf("?")>=0?"&":"?") + "action=diagnose" + (CLAVE_API?"&k="+encodeURIComponent(CLAVE_API):"");
  let res, txt;
  try{ res = await fetch(url, {method:"GET"}); }catch(e){ return {ok:false, error:e.message}; }
  try{ txt = await res.text(); }catch(e){ txt=""; }
  let j=null; try{ j=JSON.parse(txt); }catch(e){}
  if(j && j.ok) return {ok:true, info:j};
  return {ok:false, error:_pistaConexion(txt)};
}

async function cargarTodo(){
  if(MODO==="sheet"){ await pullRemoto(); }
  else { TABLAS.forEach(t=>{ const raw=localGet("hcrm:"+t); if(raw!=null) LS_CACHE[t]=raw; DB[t]=raw?JSON.parse(raw).map(f=>coerce(t,f)):[]; }); }
}
async function commit(tabla){
  if(MODO==="sheet"){
    try{ await pushRemoto(tabla); }
    catch(e){ localSetTabla(tabla, JSON.stringify(serializa(tabla))); throw e; }
  } else {
    localSetTabla(tabla, JSON.stringify(serializa(tabla)));
  }
}
/* commit de varias tablas; devuelve error combinado si alguna falla */
function _pistaBackendViejo(msg){
  // El backend antiguo no conoce las hojas nuevas ni la op batch: devuelve
  // "Hoja no permitida ... undefined" o "Operación no reconocida". Damos una
  // instrucción accionable en vez del error técnico.
  if(/no permitida|no reconocida|undefined/i.test(msg))
    return "El Google Sheet aún corre una versión anterior del script. En Apps Script: ejecuta setup() una vez y vuelve a desplegar (Administrar implementaciones → ✏️ → Versión: Nueva). Detalle: "+msg;
  return msg;
}
/* ==================== COLA DE SINCRONIZACIÓN (outbox) ====================
   Cada guardado queda LOCAL al instante y el usuario sigue trabajando; la
   subida al Sheet ocurre en segundo plano. Si varios guardados se acumulan
   (conexión lenta, ráfaga de trabajo) se agrupan en UN solo POST — menos
   ejecuciones en Google = más usuarios simultáneos. Si el servidor responde
   "busy" o no hay señal, se reintenta con espera creciente. Es seguro
   reintentar: el backend deduplica eventos por tsMs y los upserts son
   idempotentes. La cola sobrevive a recargas (localStorage) y un indicador
   en la barra superior informa siempre el estado. */
const colaTablas = new Map((()=>{ try{ const v=JSON.parse(localGet("hcrm:cola")||"[]"); return Array.isArray(v)? v.map(x=>Array.isArray(x)?x:[x,1]) : []; }catch(e){ return []; } })());
let colaGen=[...colaTablas.values()].reduce((a,b)=>Math.max(a,b||1),0);
let syncEnCurso=false, syncReintentos=0, syncTimer=null, syncUltimoErr="", syncErrPermanente=false;
function colaPersistir(){ localSet("hcrm:cola", JSON.stringify([...colaTablas.entries()])); }
function pendientesSync(){ return colaTablas.size; }

function esReintentable(err){
  if(err && err.busy) return true;
  const m=String(err&&err.message||err||"");
  return /busy|ocupado|Failed to fetch|NetworkError|load failed|timeout|HTTP 429|HTTP 5\d\d/i.test(m);
}

async function commitAll(tablas){
  // 1) Respaldo local SIEMPRE primero: la operación nunca se pierde.
  tablas.forEach(t=>localSetTabla(t, JSON.stringify(serializa(t))));
  if(MODO!=="sheet") return;
  // 2) Encolar (con generación) y disparar la subida en segundo plano.
  colaGen++;
  tablas.forEach(t=>colaTablas.set(t, colaGen)); colaPersistir();
  syncErrPermanente=false;
  actualizarPildoraSync();
  lanzarSync();
}

async function subirTablas(tablas){
  let ops=tablas.map(opPendiente).filter(Boolean);
  const invalidas=ops.filter(o=>!o.sheet);
  ops=ops.filter(o=>o.sheet);
  if(!ops.length){
    if(invalidas.length) throw new Error("Tabla sin hoja destino. Actualiza la app (recarga con caché limpia).");
    return; // nada que subir (sin cambios netos)
  }
  if(ops.length>1 && !BATCH_NO_SOPORTADO){
    try{
      await apiPost({op:"batch", ops:ops.map(o=>{const {_tabla,_total,...l}=o; return l;})});
      ops.forEach(opConfirmada);
      return;
    }catch(e){
      if(/Operación no reconocida/i.test(e.message)) BATCH_NO_SOPORTADO=true; // backend viejo → uno por uno
      else throw e;
    }
  }
  for(const o of ops){ const {_tabla,_total,...l}=o; await apiPost(l); opConfirmada(o); }
}

async function lanzarSync(){
  if(syncEnCurso || MODO!=="sheet" || !colaTablas.size) { actualizarPildoraSync(); return; }
  syncEnCurso=true; actualizarPildoraSync();
  const genVuelo=colaGen;               // lo encolado DESPUÉS de aquí no se desmarca
  const lote=[...colaTablas.keys()];
  let exito=false;
  try{
    await subirTablas(lote);
    lote.forEach(t=>{ if((colaTablas.get(t)||0)<=genVuelo) colaTablas.delete(t); });
    colaPersistir();
    syncReintentos=0; syncUltimoErr=""; syncErrPermanente=false; exito=true;
  }catch(e){
    syncUltimoErr=_pistaBackendViejo(e.message||String(e));
    if(esReintentable(e)){
      syncReintentos++;
      const espera=Math.min(60000, 3000*Math.pow(2, Math.min(syncReintentos-1,4)))*(0.7+Math.random()*0.6);
      clearTimeout(syncTimer); syncTimer=setTimeout(lanzarSync, espera);
    }else{
      // Error de configuración (p. ej. backend viejo): no martillar; reintento lento
      syncErrPermanente=true;
      clearTimeout(syncTimer); syncTimer=setTimeout(lanzarSync, 90000);
    }
  }
  syncEnCurso=false; actualizarPildoraSync();
  if(exito && colaTablas.size) lanzarSync(); // se encoló más durante la subida
}

/* Píldora de estado en la barra superior: el usuario siempre sabe qué pasa. */
function actualizarPildoraSync(){
  const el=document.getElementById("syncPill"); if(!el) return;
  if(MODO!=="sheet"){ el.style.display="none"; return; }
  el.style.display="";
  const n=pendientesSync();
  el.classList.remove("ok","subiendo","reintento","error");
  if(n===0){ el.classList.add("ok"); el.innerHTML="✓"; el.title="Todo sincronizado con el Sheet"; }
  else if(syncEnCurso){ el.classList.add("subiendo"); el.innerHTML="⏳ "+n; el.title="Subiendo "+n+" cambio(s) al Sheet…"; }
  else if(syncErrPermanente){ el.classList.add("error"); el.innerHTML="⚠ "+n; el.title="No se pudo sincronizar: "+syncUltimoErr+" — Tus datos están guardados en este equipo."; }
  else { el.classList.add("reintento"); el.innerHTML="🔁 "+n; el.title="Sin conexión o servidor ocupado. "+n+" cambio(s) guardados en este equipo; reintentando solos…"; }
}

/* Guardias: que nadie cierre o salga creyendo que ya subió todo. */
if(typeof window!=="undefined" && window.addEventListener){
  window.addEventListener("beforeunload", e=>{
    if(pendientesSync()>0){ e.preventDefault(); e.returnValue="Hay cambios aún subiéndose al Sheet."; return e.returnValue; }
  });
  window.addEventListener("online", ()=>{ syncReintentos=0; lanzarSync(); });
}

/* ---- Registro de conexiones (auditoría de sesiones) ----
   La IP no la da Apps Script; se consulta desde el navegador (ipapi.co) al
   iniciar sesión. Sin internet o si el servicio falla, queda vacía. */
let IPINFO=null;
async function obtenerIPInfo(){
  if(IPINFO) return IPINFO;
  try{
    const ctl=new AbortController(); const t=setTimeout(()=>ctl.abort(),4000);
    const r=await fetch("https://ipapi.co/json/",{signal:ctl.signal});
    clearTimeout(t);
    const j=await r.json();
    IPINFO={ip:j.ip||"", ciudad:[j.city,j.country_name].filter(Boolean).join(", ")};
  }catch(e){ IPINFO={ip:"",ciudad:""}; }
  return IPINFO;
}
function infoDispositivo(){
  const ua=navigator.userAgent||"";
  const os=/Android/i.test(ua)?"Android":/iPhone|iPad/i.test(ua)?"iOS":/Windows/i.test(ua)?"Windows":/Mac/i.test(ua)?"Mac":/Linux/i.test(ua)?"Linux":"Otro";
  const nav=/Edg\//i.test(ua)?"Edge":/Chrome/i.test(ua)?"Chrome":/Safari/i.test(ua)?"Safari":/Firefox/i.test(ua)?"Firefox":"Otro";
  return {dispositivo:os, navegador:nav};
}
/* ---- Bitácora de acciones (auditoría) ----
   Ligada al usuario REAL de la sesión (no al texto libre de "responsable").
   IMPORTANTE: prepararLog() solo apila la entrada en memoria (sin red); el
   guardado viaja SIEMPRE dentro del MISMO commitAll de la acción principal
   (ver conLog()), para que no se pierda si la conexión falla y para no
   duplicar peticiones al backend. */
function prepararLog(accion, detalle){
  if(!usuarioActual) return;
  DB.auditoria.push({fechaHora:ahoraStr(), tsMs:Date.now(), usuario:usuarioActual.usuario, rol:usuarioActual.rol, accion:accion||"", detalle:String(detalle||"").slice(0,300)});
}
function conLog(tablas){ return usuarioActual ? [...tablas, "auditoria"] : tablas; }
async function registrarSesion(evento){
  if(!usuarioActual) return;
  const u={usuario:usuarioActual.usuario, rol:usuarioActual.rol}; // instantánea: cerrarSesion anula usuarioActual enseguida
  try{
    const d=infoDispositivo();
    const info=(evento==="LOGIN")? await obtenerIPInfo() : (IPINFO||{ip:"",ciudad:""});
    DB.sesiones.push({fechaHora:ahoraStr(),tsMs:Date.now(),usuario:u.usuario,rol:u.rol,evento,ip:info.ip,ciudad:info.ciudad,dispositivo:d.dispositivo,navegador:d.navegador});
    await commitAll(["sesiones"]);
  }catch(e){ /* auditoría best-effort: nunca bloquea la operación */ }
}
let usuarioActual=null, moduloActual=null, dashTimer=null, ocupado=false;

/* ---- Sesión persistente: se mantiene hasta 1 h de inactividad ---- */
const SESION_MS = 60*60*1000; // 1 hora
let sesionTimer=null;
function guardarSesion(){ if(!usuarioActual) return; try{ localSet("hcrm:sesion", JSON.stringify({usuario:usuarioActual.usuario, rol:usuarioActual.rol, nombre:usuarioActual.nombre, ts:Date.now()})); }catch(e){} }
function limpiarSesion(){ try{ localStorage.removeItem("hcrm:sesion"); }catch(e){} }
function sesionGuardada(){
  try{
    const raw=localGet("hcrm:sesion"); if(!raw) return null;
    const s=JSON.parse(raw);
    if(!s || !s.usuario || !s.ts) return null;
    if(Date.now()-s.ts > SESION_MS){ limpiarSesion(); return null; } // expiró por inactividad
    return s;
  }catch(e){ return null; }
}
function tocarSesion(){ // renueva la marca de actividad y reinicia el reloj de expiración
  if(!usuarioActual) return;
  guardarSesion();
  clearTimeout(sesionTimer);
  sesionTimer=setTimeout(()=>{ if(usuarioActual){ cerrarSesion(true); } }, SESION_MS);
}
function cerrarSesion(porInactividad){
  if(usuarioActual) registrarSesion(porInactividad?"EXPIRACION":"SALIDA");
  clearInterval(dashTimer); clearInterval(syncRolTimer); clearTimeout(sesionTimer);
  usuarioActual=null; moduloActual=null; limpiarSesion();
  renderLogin();
  if(porInactividad && typeof document!=="undefined") setTimeout(()=>{ const e=document.querySelector("#loginErr"); if(e){ e.style.display="block"; e.textContent="Sesión cerrada por inactividad (1 hora). Vuelve a entrar."; } },50);
}
function iniciarSesionCon(found, silencioso){
  usuarioActual=found; moduloActual=ROLES[found.rol].modulos[0];
  guardarSesion(); tocarSesion(); renderApp();
  programarSyncFondo(); // sincronización de fondo con la cadencia del rol
  if(!silencioso) registrarSesion("LOGIN"); // no bloquea: corre en segundo plano
  cargarConfigSiFalta().then(cargada=>{ if(cargada && (moduloActual==="triage"||moduloActual==="veterinaria")) renderApp(); }); // catálogos editables (una sola lectura)
  if(found.rol==="admin") cargarUsuariosSiFalta(); // precarga en segundo plano; Usuarios abre al instante
}
/* Cualquier interacción o actualización renueva la sesión */
if(typeof document!=="undefined") ["click","keydown","input","touchstart"].forEach(ev=>document.addEventListener(ev,()=>{ if(usuarioActual) tocarSesion(); }, {passive:true, capture:true}));

function catalogoNombres(){ const set={}; MEDICAMENTOS.forEach(n=>set[n]=1); INSUMOS_SUGERIDOS.forEach(n=>set[n]=1); INSUMOS_VET_SUGERIDOS.forEach(n=>set[n]=1); getInventario(DB).forEach(it=>set[it.item]=1); return Object.keys(set).sort(); }
const CAT_DEFECTO = "Insumo médico"; // ítems sin categoría clara
/* Nombres de inventario filtrados por categoría y área. Se usa para que cada
   pantalla ofrezca solo lo que corresponde:
   · Consulta → Medicamento (área Humano/Ambos)
   · Estabilización → Medicamento + Insumo médico (área Humano/Ambos)
   · Equipamiento no aparece en selectores clínicos (solo en Inventario). */
function catNorm(c){ const t=String(c||"").trim().toLowerCase(); if(t.indexOf("medicamento")>=0) return "Medicamento"; if(t.indexOf("equip")>=0) return "Equipamiento"; return "Insumo médico"; }
function itemsPorCategoria(area, cats){
  const s={};
  getInventarioPorArea(DB,area).forEach(it=>{ if(cats.indexOf(catNorm(it.categoria))>=0) s[it.item]=1; });
  return s;
}

function montarBuscador(id, estados, onSelect, orden){
  const cont=document.getElementById(id); if(!cont) return;
  const input=cont.querySelector(".bp-input"), lista=cont.querySelector(".lista-activos"), selDiv=cont.querySelector(".seleccionado");
  const chipsWrap=cont.querySelector(".bp-chips");
  let ordenActual = orden||"prioridad";
  let colorFiltro = ""; // "", "ESPERA ROJO", "ESPERA AMARILLO", "ESPERA VERDE"
  let soloInfec = false; // filtro de sospecha de infección
  const iconos={"ESPERA ROJO":"🔴","ESPERA AMARILLO":"🟡","ESPERA VERDE":"🟢","ESPERA ESTABILIZACION":"💧","SUERO EN CURSO":"💧","TRASLADO PENDIENTE":"🚑","INGRESADO":"🆕"};
  function datosBase(){ return getPacientesActivos(DB,estados,ordenActual); }
  const cntInfec=()=>datosBase().filter(d=>d.sospechaInfeccion).length;
  // Chips de filtro por color (solo si el buscador incluye los estados de espera de consulta)
  const tieneColores = estados.includes(ESTADO.ESPERA_ROJO)||estados.includes(ESTADO.ESPERA_AMARILLO)||estados.includes(ESTADO.ESPERA_VERDE);
  if(chipsWrap){
    const cnt=e=>datosBase().filter(d=>d.estado===e).length;
    let html='<button type="button" class="bp-chip sel" data-col="">Todos</button>';
    if(tieneColores){
      html+='<button type="button" class="bp-chip" data-col="ESPERA ROJO">🔴 Rojo ('+cnt("ESPERA ROJO")+')</button>'+
            '<button type="button" class="bp-chip" data-col="ESPERA AMARILLO">🟡 Amarillo ('+cnt("ESPERA AMARILLO")+')</button>'+
            '<button type="button" class="bp-chip" data-col="ESPERA VERDE">🟢 Verde ('+cnt("ESPERA VERDE")+')</button>';
    }
    html+='<button type="button" class="bp-chip bp-chip-infec" data-infec="1">🦠 Infección ('+cntInfec()+')</button>';
    if(tieneColores) html+='<button type="button" class="bp-chip bp-chip-orden" data-orden="1">↕ Orden: llegada</button>';
    chipsWrap.innerHTML=html;
    $$(".bp-chip[data-col]",chipsWrap).forEach(b=>b.addEventListener("click",()=>{
      colorFiltro=b.getAttribute("data-col");
      $$(".bp-chip[data-col]",chipsWrap).forEach(x=>x.classList.toggle("sel",x===b));
      pintar(input.value);
    }));
    const btnInfec=chipsWrap.querySelector(".bp-chip-infec");
    if(btnInfec) btnInfec.addEventListener("click",()=>{
      soloInfec=!soloInfec; btnInfec.classList.toggle("sel",soloInfec);
      pintar(input.value);
    });
    const btnOrden=chipsWrap.querySelector(".bp-chip-orden");
    if(btnOrden) btnOrden.addEventListener("click",()=>{
      ordenActual = ordenActual==="prioridad" ? "fifo" : "prioridad";
      btnOrden.textContent = ordenActual==="fifo" ? "↕ Orden: llegada" : "↕ Orden: prioridad";
      pintar(input.value);
    });
  }
  input.placeholder = datosBase().length ? ("Filtrar por cédula o nombre… ("+datosBase().length+" en espera)") : "— No hay pacientes en espera —";
  let selId=null;
  function pintar(filtro){
    const n=normalizar(filtro||"");
    let vis=datosBase().filter(d=>!n||normalizar(d.busqueda).includes(n));
    if(colorFiltro) vis=vis.filter(d=>d.estado===colorFiltro);
    if(soloInfec) vis=vis.filter(d=>d.sospechaInfeccion);
    if(!vis.length){ lista.innerHTML='<div class="la-vacio">'+(datosBase().length?"Sin coincidencias.":"No hay pacientes en espera.")+'</div>'; return; }
    lista.innerHTML=vis.map((d,i)=>'<div class="la-row'+(d.id===selId?" sel":"")+'" data-id="'+d.id+'"><span class="la-pos">'+(i+1)+'</span><span class="la-ic">'+(iconos[d.estado]||"")+'</span><div class="la-main">'+esc(d.etiqueta)+(d.embarazada?' <span class="tag-emb">🤰</span>':'')+(d.sospechaInfeccion?' <span class="tag-infec">🦠</span>':'')+'<small>ingresó '+esc(d.hora)+'</small></div></div>').join("");
    $$(".la-row",lista).forEach(row=>row.addEventListener("click",()=>{
      selId=row.getAttribute("data-id"); const d=datosBase().find(x=>x.id===selId);
      onSelect(d); selDiv.innerHTML="✓ Seleccionado: <b>"+esc(d.etiqueta)+"</b>"; selDiv.style.display="block";
      pintar(input.value);
    }));
  }
  input.addEventListener("input",()=>{ pintar(input.value); });
  pintar("");
}

function avisoHTML(){ return '<div class="aviso" id="aviso"></div>'; }
function mostrarAviso(tipo,msg){ toast(tipo,msg); }
function toast(tipo,msg){
  if(!msg) return;
  let cont=document.getElementById("toasts");
  if(!cont){ cont=document.createElement("div"); cont.id="toasts"; document.body.appendChild(cont); }
  const t=document.createElement("div"); t.className="toast toast-"+(tipo||"info");
  const ic=({ok:"✅",warn:"⚠️",error:"⛔",info:"ℹ️"})[tipo]||"ℹ️";
  t.innerHTML='<span class="toast-ic">'+ic+'</span><span class="toast-msg"></span><button class="toast-x" type="button" aria-label="Cerrar">✕</button>';
  t.querySelector(".toast-msg").textContent=msg;
  cont.appendChild(t);
  const quitar=()=>{ if(!t.parentNode) return; t.classList.add("saliendo"); setTimeout(()=>{ if(t.parentNode) t.parentNode.removeChild(t); },220); };
  t.querySelector(".toast-x").addEventListener("click",quitar);
  const dur=(tipo==="warn"||tipo==="error")?9000:3500;
  const tmr=setTimeout(quitar,dur);
  t.addEventListener("click",e=>{ if(e.target.classList.contains("toast-x")) clearTimeout(tmr); });
  requestAnimationFrame(()=>t.classList.add("visible"));
}

/* --- Modal de confirmación (Promise<bool> o Promise<string> si requiereComentario) --- */
function confirmar(titulo, detalleHTML, opciones){
  opciones=opciones||{};
  const pideCom=!!opciones.requiereComentario;
  return new Promise(res=>{
    const f=document.createElement("div"); f.className="modal-fondo";
    f.innerHTML='<div class="modal"><h3>'+esc(titulo)+'</h3><div class="modal-cuerpo">'+(detalleHTML||"")+'</div>'+
      (pideCom?'<label class="modal-coment-l">'+esc(opciones.comentarioLabel||"Comentario del cambio de estado *")+'</label><textarea class="modal-coment" placeholder="Obligatorio: qué se decidió y por qué"></textarea><div class="modal-coment-err" style="display:none">Escribe un comentario para continuar.</div>':'')+
      '<div class="modal-acciones"><button class="btn-sec" data-a="0">'+esc(opciones.cancelar||"Cancelar")+'</button><button class="btn-ok" data-a="1">'+esc(opciones.ok||"Confirmar")+'</button></div></div>';
    document.body.appendChild(f);
    const ta=f.querySelector(".modal-coment"), err=f.querySelector(".modal-coment-err");
    if(ta) setTimeout(()=>{ try{ta.focus();}catch(e){} },30);
    function cerrar(v){ if(f.parentNode) document.body.removeChild(f); res(v); }
    f.addEventListener("click",e=>{
      if(e.target===f){ cerrar(pideCom?"":false); return; }
      const a=e.target.getAttribute("data-a"); if(a===null) return;
      if(a==="0"){ cerrar(pideCom?"":false); return; }
      if(pideCom){
        const txt=(ta.value||"").trim();
        if(!txt){ err.style.display="block"; try{ta.focus();}catch(x){} return; }
        cerrar(txt);
      } else { cerrar(true); }
    });
  });
}

/* --- Registro con confirmación + anti-duplicado (deshabilita botón hasta guardar) --- */
async function registrar(btn, confInfo, tablas, fn, contexto){
  if(ocupado) return;
  let comentario="";
  if(confInfo){
    const opc={ok:confInfo.ok||"Sí, registrar"};
    if(confInfo.comentario){ opc.requiereComentario=true; opc.comentarioLabel=confInfo.comentarioLabel||"Comentario del cambio de estado *"; }
    const r=await confirmar(confInfo.titulo, confInfo.detalle, opc);
    if(!r) return;
    if(confInfo.comentario) comentario=String(r);
  }
  ocupado=true; const t0=btn?btn.textContent:""; if(btn){ btn.disabled=true; btn.textContent="Guardando…"; }
  let mutado=false;
  try{
    const r=fn(comentario); mutado=true;
    prepararLog(confInfo?confInfo.titulo:moduloActual, r.mensaje);
    try{ await commitAll(conLog(tablas)); }
    catch(sync){ ocupado=false; renderModulo((contexto&&contexto.volverA)||moduloActual, {tipo:"warn", msg:sync.message}, contexto); return; }
    ocupado=false;
    renderModulo((contexto&&contexto.volverA)||moduloActual, {tipo:"ok", msg:r.mensaje}, contexto);
  }catch(err){
    ocupado=false; if(btn){ btn.disabled=false; btn.textContent=t0; }
    if(!mutado) mostrarAviso("error", err.message); else renderModulo((contexto&&contexto.volverA)||moduloActual,{tipo:"error",msg:err.message},contexto);
  }
}

function montarSelectorItems(id, checkStock){
  selectores[id]=[];
  const cont=$("#"+id), sel=cont.querySelector(".seli-sel"), otro=cont.querySelector(".seli-otro"), cant=cont.querySelector(".seli-cant"), btn=cont.querySelector(".seli-btn"), lista=cont.querySelector(".seli-lista");
  let warn=cont.querySelector(".seli-warn"); if(!warn){ warn=document.createElement("div"); warn.className="seli-warn"; warn.style.display="none"; cont.insertBefore(warn, lista); }
  function pintar(){
    if(!selectores[id].length){ lista.innerHTML='<div class="seli-vacio">Ninguno agregado todavía.</div>'; return; }
    lista.innerHTML=selectores[id].map((it,i)=>'<div class="chip"><span>'+esc(it.nombre)+' × '+it.cant+'</span><button type="button" data-i="'+i+'">✕</button></div>').join("");
    $$("button[data-i]",lista).forEach(b=>b.addEventListener("click",()=>{ selectores[id].splice(+b.getAttribute("data-i"),1); pintar(); }));
  }
  sel.addEventListener("change",()=>{ const o=sel.value==="__OTRO__"; otro.style.display=o?"block":"none"; if(o)otro.focus(); });
  function agregar(){
    let n=""; if(sel.value==="__OTRO__") n=(otro.value||"").trim(); else n=sel.value;
    const c=parseInt(cant.value,10);
    if(!n){ (sel.value==="__OTRO__"?otro:sel).focus(); return; }
    if(!c||c<1){ cant.focus(); return; }
    const ex=selectores[id].find(x=>x.nombre.toLowerCase()===n.toLowerCase());
    // checkStock ahora es SOLO informativo: muestra un aviso de color según el
    // nivel (hay / poco / no hay) pero NUNCA impide agregar el medicamento,
    // porque en el sitio no se garantiza el control exacto del inventario.
    if(checkStock){
      const pedido=c+(ex?ex.cant:0);
      const r=checkStock(n,pedido);
      if(r && r.aviso){ warn.style.display="block"; warn.className="seli-warn nivel-"+(r.nivel||"poco"); warn.textContent=(r.nivel==="sin"?"⚠️ ":"ℹ️ ")+r.aviso; }
      else { warn.style.display="none"; }
    }
    if(ex)ex.cant+=c; else selectores[id].push({nombre:n,cant:c});
    sel.value=""; otro.value=""; otro.style.display="none"; cant.value="1"; pintar();
  }
  btn.addEventListener("click",agregar);
  otro.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); agregar(); } });
  pintar();
}

  $("#i_nombre").addEventListener("input",soloLetrasLive);

  // anteriores. Si la persona YA EGRESÓ en visitas pasadas, ofrecer cargar sus

  // que es duplicado (el guardado lo bloqueará igual).
  function chequearReingreso(){
    const box=$("#reingresoAviso"); if(!box) return;

      reingresoDe=null; return;

      box.innerHTML='<div class="reingreso-box">'+

        '<div class="mut" style="font-size:12px; margin:4px 0 6px">'+esc(nombreCompleto(u)||"(sin nombre)")+' · '+r.previas.length+' visita(s) previa(s). Última: '+esc(u.fecha||"")+'.</div>'+
        filas+
        '<div style="display:flex; gap:8px; margin-top:10px; flex-wrap:wrap"><button type="button" class="btn" id="reConfirm">Sí, es la misma persona — cargar datos</button><button type="button" class="btn-sec" id="reNo" style="border:1.5px solid var(--gris); color:var(--tinta); font-weight:700">✕ No es la misma persona</button></div>'+
      '</div>';
      $("#reConfirm").addEventListener("click",()=>{
        // Prellenar datos personales (editables) desde la última visita.
        if($("#i_nombre")) $("#i_nombre").value=u.nombre||"";

        const vh=$("#reVerHist"); if(vh) vh.addEventListener("click",()=>mostrarHistorialDoc(doc));
      });

  { const ci=$("#i_cedula"); if(ci){ ci.addEventListener("change",chequearReingreso); ci.addEventListener("blur",chequearReingreso); } }

    else if(modo==="repminor") w.innerHTML='<div class="modal-alerta" style="margin-top:0">⚠️ El representante también es menor de edad: NO hay representante válido.</div><label>Describe la situación y quién acompaña al menor *</label><textarea id="i_desc" placeholder="Ej.: Acompañado por su hermana de 15 años; sin adulto responsable presente"></textarea>';

  function evaluarRep(){

    if(e!=="" && e<18){ repMenorFlag=true; if(msg){ msg.style.color="var(--rojo)"; msg.textContent="El representante tiene "+e+" años: es menor de edad."; } pintarDesc("repminor"); }

    const menor=chk("#i_menor"), noId=chk("#i_noid"), sinCed=chk("#i_sincedula");

      '<div id="rDocWrap"><label>Documento del representante *</label><div style="display:flex; gap:8px; align-items:flex-end"><div style="flex:1">'+docGrupoHTML("r_tipoDoc","r_ced")+'</div><button type="button" class="btn-refrescar" id="r_buscar" title="Buscar representante registrado">🔍</button></div></div>'+
      '<label class="check gris"><input type="checkbox" id="r_sincedula"> El representante <b>no proporciona</b> documento</label>'+
      '<div id="r_msg" style="font-size:12px; margin-top:4px"></div>'+
      '<div class="fila"><div><label>Nombre del representante *</label><input id="r_nom" style="text-transform:uppercase"></div><div><label>Apellido del representante *</label><input id="r_ape" style="text-transform:uppercase"></div></div></div>' : "";
    if(menor){
      montarDocGrupo("r_tipoDoc","r_ced");

  function sexoCambia(){

    if(rep){ $("#r_nom").value=rep.repNombre; $("#r_ape").value=rep.repApellido; if(rep.repFechaNac){$("#r_fn").value=rep.repFechaNac; evaluarRep();} if(!repMenorFlag){ msg.style.color="var(--verde)"; msg.textContent="✓ Representante encontrado; datos completados."; } }

      registrar(btn, {titulo:"Confirmar ingreso (no identificado)", detalle, ok:"Sí, registrar"}, ["pacientes"], ()=>registrarPaciente(DB,datos), {volverA:"ingreso"});
      return;
    }

    const menor=chk("#i_menor"), emb=chk("#i_emb"), sinCed=chk("#i_sincedula");
    const nombre=val("#i_nombre").trim().toUpperCase(), apellido=val("#i_apellido").trim().toUpperCase();
    const sexo=val("#i_sexo"), fn=val("#i_fn");

    if(!nombre||!apellido){ mostrarAviso("error","Nombre y apellido son obligatorios."); return; }
    if(RE_LETRAS.test(nombre)||RE_LETRAS.test(apellido)){ mostrarAviso("error","Nombre y apellido solo pueden contener letras."); return; }
    if(!sexo){ mostrarAviso("error","Selecciona el sexo (femenino o masculino)."); return; }
    if(fn && fn>=isoHoy()){ mostrarAviso("error","La fecha de nacimiento debe ser anterior a hoy."); return; }
    const edad=calcularEdad(fn);
    if(menor && edad!=="" && edad>=18){ mostrarAviso("error","La fecha indica "+edad+" años: no corresponde a un menor de edad."); return; }
    if(emb && sexo==="MASCULINO"){ mostrarAviso("error","Inconsistencia: un paciente masculino no puede estar embarazada."); return; }

    let cedula="";
    if(!menor){ cedula=docFinal("i_tipoDoc","i_cedula"); if(!cedula && !sinCed){ mostrarAviso("error","Indica el documento o marca que el paciente no lo proporciona."); return; } }

    const alertas=[];
    if(edad!=="" && edad>100) alertas.push("La edad ("+edad+" años) es muy alta: verifica la fecha de nacimiento.");
    if(!menor && edad!=="" && edad<18) alertas.push("La edad ("+edad+" años) es menor de 18 pero NO marcaste \"menor de edad\" (se registrará sin representante).");
    if(emb && edad!=="" && edad<12) alertas.push("Marcaste EMBARAZADA con edad de "+edad+" años: combinación inusual.");

    const datos={nombre,apellido,sexo,fechaNacimiento:fn,tipoDocumento:(menor?"":val("#i_tipoDoc")),cedula,menor,embarazada:emb,noIdentificado:false,sinCedula:sinCed,observacionIngreso:val("#i_obsing").trim(),sospechaInfeccion:chk("#i_infec")};
    if(menor){
      const rNom=val("#r_nom").trim().toUpperCase(), rApe=val("#r_ape").trim().toUpperCase();

        datos.sinRepresentante=true; datos.descripcion=desc;
      } else {
        if(!rNom||!rApe){ mostrarAviso("error","Nombre y apellido del representante son obligatorios."); return; }
        if(RE_LETRAS.test(rNom)||RE_LETRAS.test(rApe)){ mostrarAviso("error","El nombre del representante solo puede contener letras."); return; }
        const rSin=chk("#r_sincedula"), rDoc=rSin?"":docFinal("r_tipoDoc","r_ced");
        if(!rDoc && !rSin){ mostrarAviso("error","Indica el documento del representante o marca que no lo proporciona."); return; }
        const rEdad=val("#r_fn")?calcularEdad(val("#r_fn")):"";
        if(rEdad!=="" && rEdad<18){ mostrarAviso("error","El representante debe ser mayor de edad."); return; }
        datos.repNombre=rNom; datos.repApellido=rApe; datos.repFechaNac=val("#r_fn"); datos.repCedula=rDoc; datos.repSinCedula=rSin; datos.tipoDocumento=rSin?"":val("#r_tipoDoc");
      }
    }

    const docMostrar = menor ? (datos.sinRepresentante?"— (sin representante válido)":((datos.repCedula||"—")+" (rep.)")) : (cedula|| (sinCed?"— (no proporciona)":"—"));
    let detalle='<b>'+esc(nombre+" "+apellido)+'</b><br>Sexo: '+esc(sexo)+(edad!==""?' · Edad: '+edad+' años':'')+'<br>Documento: '+esc(docMostrar)+
      (menor?(datos.sinRepresentante?'<br>Menor SIN representante válido':'<br>Menor · Rep: '+esc((datos.repNombre||"")+" "+(datos.repApellido||""))):'')+(emb?'<br>Embarazada: sí':'');
    if(reingresoDe) detalle+='<div class="modal-alerta" style="background:rgba(15,71,175,0.08); border-color:var(--cobalto,#0F47AF)">🔁 <b>Reingreso:</b> se registrará como una nueva visita ligada al historial de este paciente.</div>';
    if(alertas.length) detalle+='<div class="modal-alerta">⚠️ '+alertas.map(esc).join('<br>⚠️ ')+'<br><br>¿Estás seguro de registrar así?</div>';

    registrar(btn, {titulo:reingresoDe?"Confirmar reingreso":"Confirmar ingreso", detalle, ok:"Sí, registrar"}, ["pacientes"], ()=>registrarPaciente(DB,datos), {volverA:"ingreso"});
  });
}

  '<div class="tarjeta"><h2>Clasificación del paciente</h2><p class="desc">Al registrar signos vitales, signos de peligro y motivos, el sistema sugiere el color (parpadeante); el médico puede cambiarlo.</p>'+

    '<label>3 · Signos de peligro <small class="mut">(selección múltiple)</small></label>'+
    '<div class="peligro" id="t_peligro">'+ SIGNOS_PELIGRO.map(s=>'<label data-cod="'+s.cod+'"><input type="checkbox"><span>'+s.nombre+'</span></label>').join("") +'</div>'+
    '<div id="t_sugerencia"></div>'+
    '<label>4 · Código de triage * <small class="mut">(el sugerido parpadea; puedes cambiarlo)</small></label>'+
    '<div class="codigos" id="t_codigos">'+
      '<button type="button" class="cod-ROJO" data-cod="ROJO">ROJO<br><small>urgente en sitio</small></button>'+

      '<button type="button" class="cod-ESTAB" data-cod="ESTABILIZACION">🛏️ ESTABILIZACIÓN<br><small>pasa directo a camilla</small></button>'+
      '<button type="button" class="cod-SALUDMENTAL" data-cod="SALUDMENTAL">🧠 SALUD MENTAL<br><small>apoyo psicosocial</small></button>'+
      '<button type="button" class="cod-TRASLADO" data-cod="ESCALAMIENTO">🚑 ESCALAMIENTO<br><small>referencia / emergencia externa</small></button>'+
      '<button type="button" class="cod-DESCARTADO" data-cod="DESCARTADO">DESCARTAR — fuera del alcance</button>'+

  $$("#t_motivos label").forEach(l=>l.addEventListener("click",()=>{ const cb=l.querySelector("input"); setTimeout(()=>{ l.classList.toggle("marcado",cb.checked); toggleArr(triageSel.motivos,l.getAttribute("data-cod"),cb.checked); recalc(); },0); }));

  });

function toggleArr(arr,v,on){ const i=arr.indexOf(v); if(on&&i<0)arr.push(v); if(!on&&i>=0)arr.splice(i,1); }
function fmtTA(el){
  let d=(el.value||"").replace(/[^0-9]/g,"").slice(0,6); let out=d;
  if(d.length===4) out=d.slice(0,2)+"/"+d.slice(2);
  else if(d.length>=5) out=d.slice(0,3)+"/"+d.slice(3);
  el.value=out;
}
function pintarAlertasVitales(ev){
  const el=$("#t_valert"); if(!el) return;
  const nom={taZ:"Tensión",fc:"Frec. cardíaca",fr:"Frec. respiratoria",temp:"Temperatura",sat:"Saturación O₂"};
  const rojo=[], amar=[];
  Object.keys(nom).forEach(k=>{ const z=ev.zonas&&ev.zonas[k]; if(z==="rojo")rojo.push(nom[k]); else if(z==="amarillo")amar.push(nom[k]); });
  if(!rojo.length && !amar.length){ el.style.display="none"; el.innerHTML=""; return; }
  el.style.display="block";

/* Cierra la fila de suero abierta (si existe) al sacar al paciente por otra vía */
function getUltimaEstab(db,id){ for(var i=db.estabilizacion.length-1;i>=0;i--){ if(db.estabilizacion[i].id===id) return db.estabilizacion[i]; } return null; }
function cerrarSueroSiAbierto(db,id,nota,resp){
  for(let i=db.estabilizacion.length-1;i>=0;i--){
    const r=db.estabilizacion[i];
    if(r.id===id && r.horaInicio && !r.horaFin){
      r.horaFin=horaAhora(); r.desenlace=nota||r.desenlace; if(resp)r.respSalida=resp; return true;
    }
  }
  return false;
}
function colorEsperaDe(db,id){
  const map={ROJO:ESTADO.ESPERA_ROJO,AMARILLO:ESTADO.ESPERA_AMARILLO,VERDE:ESTADO.ESPERA_VERDE};
  // Busca el triage más reciente que haya asignado un COLOR real (ignora
  // ESTABILIZACION/SALUDMENTAL/ESCALAMIENTO, que no son colores de consulta).
  for(let i=db.triage.length-1;i>=0;i--){ const r=db.triage[i]; if(r.id===id && map[r.codigo]) return map[r.codigo]; }
  return ESTADO.ESPERA_AMARILLO; // sin color previo: prioridad media por seguridad
}
function porQueEsta(db,id){
  for(let i=db.consulta.length-1;i>=0;i--){ const r=db.consulta[i]; if(r.id===id) return (r.diagnostico?("Dx: "+r.diagnostico):(r.motivo?("Motivo: "+r.motivo):"")); }
  const t=getUltimoTriage(db,id); return t&&t.motivos?("Triage: "+motivosLegibles(t.motivos)):"";
}

    const tiempoTxt = mins!==null ? '<span class="es-sum-t'+(tarde?' mal':'')+'">'+(mins>=60?("+"+Math.floor(mins/60)+" h"):(mins+" min"))+' sin actualizar</span>' : '';
    const resumen='<summary class="es-sum"><span class="es-sum-nom">'+esc(etiquetaPaciente(p))+'</span><span class="es-sum-meta"><span class="es-sum-est">'+estadoCorto+'</span>'+tiempoTxt+'</span></summary>';

      (razon?'<div class="mut" style="font-size:12px; margin-top:8px">'+esc(razon)+'</div>':'')+
      (trat?'<div class="pc-sit" style="background:#eef4fb;color:#12324a">Tratamiento: '+esc(trat)+(tarde?' · <b style="color:var(--rojo)">+1 h sin actualización</b>':'')+'</div>':'')+
      (novedades.length?'<div class="es-nov">'+novedades.map(n=>'<div>'+esc(n)+'</div>').join("")+'</div>':'')+
      '<div class="es-acciones">'+
        '<label class="es-lbl">Registrar evolución</label>'+
        '<textarea class="es-obs" placeholder="Observación / evolución… (ej.: paciente estable, tolera la vía)"></textarea>'+
        (cfg.conTratamiento?
          '<label class="es-lbl">'+(enCamilla?"Actualizar qué se le está haciendo":"Tratamiento / procedimiento")+'</label>'+
          '<textarea class="es-trat" placeholder="Ej.: hidratación IV, oxígeno, curación, nebulización…"></textarea>'+
          '<label class="es-lbl">Medicamentos administrados <small class="mut">(descuentan del inventario)</small></label>'+

        '<textarea class="es-cierre-obs" placeholder="Comentario de cierre (obligatorio): cómo sale y por qué"></textarea>'+
        '<div class="es-cierre">'+
          (cfg.salidas||[]).map(s=>'<button type="button" class="es-out '+s.cls+'" data-id="'+p.id+'" data-a="'+s.a+'">'+s.txt+'</button>').join("")+
        '</div>'+
      '</div>'+
      '</div></details>';

  const soloInfecSala=!!salaFiltroInfec[cfg.mod];
  const salaFiltrada = soloInfecSala ? sala.filter(p=>p.sospechaInfeccion) : sala;
  const nInfec=todas.filter(p=>p.sospechaInfeccion).length;
  c.innerHTML='<div class="tarjeta"><h2>'+cfg.titulo+'</h2><p class="desc">'+todas.length+' paciente(s). '+cfg.desc+'</p>'+
      bannerSobrecupo(cfg.mod)+
      '<input class="es-buscar" id="salaBuscar" placeholder="🔍 Buscar paciente por nombre o documento…" value="'+esc(salaFiltro[cfg.mod]||"")+'">'+
      '<div class="bp-chips" style="margin-top:8px"><button type="button" class="bp-chip'+(!soloInfecSala?" sel":"")+'" id="salaTodos">Todos ('+todas.length+')</button><button type="button" class="bp-chip bp-chip-infec'+(soloInfecSala?" sel":"")+'" id="salaInfec">🦠 Infección ('+nInfec+')</button></div>'+
      avisoHTML()+'</div>'+
    (salaFiltrada.length?salaFiltrada.map(p=>'<div class="tarjeta es-wrap">'+card(p)+'</div>').join(""):'<div class="tarjeta"><div class="vacio">'+(q||soloInfecSala?"Ningún paciente coincide con el filtro.":"No hay pacientes aquí ahora.")+'</div></div>');

  const chTodos=$("#salaTodos"), chInfec=$("#salaInfec");

  if(chInfec) chInfec.addEventListener("click",()=>{ salaFiltroInfec[cfg.mod]=true; renderModulo(cfg.mod); });

    catch(e){ ocupado=false; renderModulo(cfg.mod,{tipo:"warn",msg:e.message}); }
  }));

  // GUARDAR EVOLUCIÓN: nota + tratamiento + medicamentos, todo en una acción
  $$(".es-guardar").forEach(btn=>btn.addEventListener("click",async()=>{

    const selId="selMedSala_"+id;

        }
        if(trat) partes.push("Tratamiento: "+trat);
        if(meds) partes.push("Meds: "+meds);
      }

  }));
}

function renderTraslado(cont){
  let pid="", trPac=null, escSel=null;
  cont.innerHTML='<div id="segEscWrap"></div><div class="tarjeta"><h2>Escalamientos de emergencia y referencias</h2><p class="desc">Pacientes con escalamiento pendiente. Al guardar se registra la <b>hora de salida</b> y el paciente pasa a <b>Escalado</b>.</p><form id="fTr">'+

    '<label>Motivo del escalamiento *</label><textarea id="x_mot"></textarea>'+
    '<label>Centro de destino *</label><input id="x_dest" placeholder="Hospital / clínica de destino">'+
    '<label>Acompañante / personal</label><input id="x_acomp">'+
    '<label>Observaciones</label><textarea id="x_obs"></textarea>'+
    '<label>Responsable</label><input id="x_resp">'+
    '<button class="btn" type="submit">Registrar escalamiento (registra hora de salida)</button>'+avisoHTML()+'</form></div>';
  // Seguimiento de casos críticos escalados (movido aquí desde el tablero).
  // Re-render local para no perder lo escrito en el formulario al interactuar.
  function pintarSeg(){
    const w=$("#segEscWrap"); if(!w) return;
    w.innerHTML=htmlSeguimientoEscalados(escSel);
    $$("#segEscWrap .seg-item").forEach(el=>el.addEventListener("dblclick",()=>{ const id=el.getAttribute("data-pid"); escSel=(escSel===id?null:id); pintarSeg(); }));
    $$("#segEscWrap .seg-step").forEach(b=>b.addEventListener("click",async()=>{ if(b.disabled) return; const id=b.getAttribute("data-pid"), key=b.getAttribute("data-seg"); b.disabled=true; try{ await toggleSegTraslado(id,key); }catch(e){} pintarSeg(); }));
  }
  pintarSeg();
  montarBuscador("bpTr",[ESTADO.TRASLADO_PENDIENTE],d=>{pid=d?d.id:""; trPac=d; if(d){ const pp=DB.pacientes.find(x=>x.id===d.id); const sel=$("#x_ori"); if(sel && pp && pp.origenTraslado) sel.value=pp.origenTraslado; }},"fifo");
  if(usuarioActual && !val("#x_resp")) $("#x_resp").value=usuarioActual.nombre;
  $("#fTr").addEventListener("submit",e=>{
    e.preventDefault();

    if(!val("#x_ori")){ mostrarAviso("error","Indica el origen del escalamiento."); return; }
    if(!val("#x_mot").trim()){ mostrarAviso("error","Indica el motivo del escalamiento."); return; }
    if(!val("#x_dest").trim()){ mostrarAviso("error","Indica el centro de destino."); return; }

    registrar(btn, {titulo:"Registrar escalamiento", detalle, ok:"Sí, registrar", comentario:true, comentarioLabel:"Comentario del escalamiento / cambio de estado *"}, ["pacientes","traslados"], (coment)=>{ datos.comentarioEstado=coment; return registrarTraslado(DB,datos); }, {volverA:"traslado"});
  });
}

/* --------- ESTABILIZACIÓN VETERINARIA (sala) --------- */
let estabVetSel=null;
function renderEstabVet(c){
  const q=normalizar(salaFiltro.estabvet||"");
  const todas=DB.pacientesVet.filter(p=>p.estado===VETESTADO.ESTABILIZACION).sort((a,b)=>(a.tsMs||0)-(b.tsMs||0));
  const sala=q?todas.filter(p=>normalizar([p.nombreAnimal,p.propietario,p.especie,p.cedulaPropietario,p.diagnostico].join(" ")).includes(q)):todas;
  if(estabVetSel && !todas.some(p=>p.id===estabVetSel)) estabVetSel=null;
  if(estabVetSel){ panelEstabVet(c, DB.pacientesVet.find(p=>p.id===estabVetSel)); return; }
  function fichaEstab(p){
    const ultima=String(p.descripcion||"").split(" | ").filter(Boolean).pop();
    const enTrat=!!estabVetAbierta(DB,p.id);
    return '<div class="pc-card pc-click" data-vid="'+esc(p.id)+'"><div class="pc-top"><div class="pc-nom">🐾 '+esc(p.nombreAnimal||"(sin nombre)")+' · '+esc(p.especie||"")+'</div><div class="pc-hora">'+(enTrat?"🩹 en tratamiento":"en sala")+'</div></div>'+
      '<div class="mut" style="font-size:12px; margin-top:2px">'+esc(p.propietario||"")+(p.diagnostico?' · Dx: '+esc(p.diagnostico):'')+'</div>'+
      (ultima?'<div class="pc-sit">📝 '+esc(ultima)+'</div>':'')+'</div>';
  }
  c.innerHTML='<div class="tarjeta"><h2>Estabilización veterinaria — sala</h2><p class="desc">'+todas.length+' animal(es) en estabilización. Registra el tratamiento (descuenta inventario), observaciones y el cierre. Se derivan desde Veterinaria con desenlace «Queda en estabilización».</p>'+
      '<input class="es-buscar" id="salaBuscar" placeholder="🔍 Buscar animal por nombre, especie o propietario…" value="'+esc(salaFiltro.estabvet||"")+'">'+
      avisoHTML()+'</div>'+
    (sala.length?'<div class="tarjeta">'+sala.map(fichaEstab).join("")+'</div>':'<div class="tarjeta"><div class="vacio">'+(q?"Ningún animal coincide con la búsqueda.":"No hay animales en estabilización ahora.")+'</div></div>');
  const bq=$("#salaBuscar");
  if(bq) bq.addEventListener("input",()=>{ salaFiltro.estabvet=bq.value; const pos=bq.selectionStart; renderEstabVet(c); const n=$("#salaBuscar"); if(n){ n.focus(); try{ n.setSelectionRange(pos,pos); }catch(e){} } });
  $$(".pc-click[data-vid]").forEach(el=>el.addEventListener("click",()=>{ estabVetSel=el.getAttribute("data-vid"); renderEstabVet(c); }));
}
function panelEstabVet(c,p){
  if(!p){ estabVetSel=null; renderEstabVet(c); return; }
  const items=getInventarioPorArea(DB,"Veterinario");
  const catVet=(function(){const s={};INSUMOS_VET_SUGERIDOS.forEach(n=>s[n]=1);items.forEach(it=>s[it.item]=1);return Object.keys(s).sort();})();
  const eventos=DB.estabVet.filter(r=>r.idVet===p.id).sort((a,b)=>(a.tsMs||0)-(b.tsMs||0));
  const novedades=String(p.descripcion||"").split(" | ").map(x=>x.trim()).filter(Boolean);
  const tl=eventos.map(r=>'<div class="ftl-ev"><div class="ftl-h">'+esc(r.fechaHora||"")+(r.horaFin?(" · fin "+esc(r.horaFin)):(" · inicio "+esc(r.horaInicio||"")))+'</div><div class="ftl-t">Tratamiento</div><div class="ftl-x">'+[r.solucion&&("Proc.: "+r.solucion), r.volumen&&(r.volumen+" ml"), r.insumosIV&&("Insumos: "+r.insumosIV), r.desenlace&&("Desenlace: "+r.desenlace), r.respEntrada&&("Por: "+r.respEntrada)].filter(Boolean).map(esc).join("<br>")+'</div></div>').join("");
  c.innerHTML='<div class="tarjeta"><button class="btn-sec" id="evVolver" style="margin-bottom:10px">← Volver a la sala</button>'+
    '<h2>🐾 '+esc(p.nombreAnimal||"(sin nombre)")+' · '+esc(p.especie||"")+'</h2>'+
    '<p class="desc">'+esc(p.id)+' · Sexo: '+esc(p.sexoAnimal||"—")+' · Propietario: '+esc(p.propietario||"—")+(p.diagnostico?' · Dx: '+esc(p.diagnostico):'')+'</p>'+
    ((eventos.length||novedades.length)?'<div class="fichatl">'+tl+(novedades.length?'<div class="ftl-ev"><div class="ftl-t">Novedades</div><div class="ftl-x">'+novedades.map(esc).join("<br>")+'</div></div>':'')+'</div>':'')+
    avisoHTML()+'</div>'+
    '<div class="tarjeta"><h3 style="margin:0 0 8px">Registrar tratamiento <small class="mut">(descuenta inventario)</small></h3>'+
      '<label>Procedimiento / solución</label><textarea id="ev_sol" placeholder="Ej.: hidratación IV, curación, oxígeno, nebulización…"></textarea>'+
      '<div class="fila"><div><label>Volumen (ml)</label><input id="ev_vol" inputmode="numeric" placeholder="opcional"></div><div><label>Responsable</label><input id="ev_resp"></div></div>'+
      '<label>Insumos / medicamentos IV <small class="mut">(descuentan stock; varios)</small></label>'+selectorItemsHTML("selEstabVet", catVet, "Buscar o escribir insumo…")+
      '<button class="btn" id="ev_trat">Registrar tratamiento</button></div>'+
    '<div class="tarjeta"><h3 style="margin:0 0 8px">Observación / evolución</h3>'+
      '<textarea id="ev_obs" placeholder="Nota de evolución…"></textarea>'+
      '<button class="btn" id="ev_nota">Guardar observación</button></div>'+
    '<div class="tarjeta"><h3 style="margin:0 0 8px">Cerrar estabilización</h3>'+
      '<label>Comentario de cierre *</label><textarea id="ev_cierre" placeholder="Obligatorio: cómo sale y por qué"></textarea>'+
      '<div class="es-cierre"><button type="button" class="btn-sec" id="ev_ref">↪ Referir a otro centro</button><button type="button" class="btn" id="ev_alta">✓ Alta veterinaria</button></div></div>';
  $("#evVolver").addEventListener("click",()=>{ estabVetSel=null; renderEstabVet(c); });
  if(usuarioActual && !val("#ev_resp")) $("#ev_resp").value=usuarioActual.nombre;
  montarSelectorItems("selEstabVet",(nombre,cant)=>avisoStockItem(nombre,cant));
  $("#ev_trat").addEventListener("click",async()=>{
    const sol=val("#ev_sol").trim(), insumos=serializeItems("selEstabVet");
    if(!sol && !insumos){ mostrarAviso("error","Indica el procedimiento y/o los insumos aplicados."); return; }
    const det=[sol,(val("#ev_vol")?val("#ev_vol")+" ml":""),insumos].filter(Boolean).join(" · ");
    const ok=await confirmar("Registrar tratamiento", '<b>'+esc(p.nombreAnimal)+'</b><br>'+esc(det), {ok:"Sí, registrar"});
    if(!ok) return;
    const btn=$("#ev_trat"); btn.disabled=true; ocupado=true;
    try{ registrarEstabVetEntrada(DB,{id:p.id,solucion:sol,volumen:val("#ev_vol"),insumosIV:insumos,observaciones:"",responsable:val("#ev_resp")});
      prepararLog("Tratamiento veterinario", p.nombreAnimal+": "+det);
      await commitAll(conLog(["pacientesVet","estabVet","inventario","movimientos"])); ocupado=false; renderModulo("estabvet",{tipo:"ok",msg:"Tratamiento registrado."}); }
    catch(e){ ocupado=false; renderModulo("estabvet",{tipo:"warn",msg:e.message}); }
  });
  $("#ev_nota").addEventListener("click",async()=>{
    const obs=val("#ev_obs").trim(); if(!obs){ mostrarAviso("warn","Escribe la observación."); return; }
    $("#ev_nota").disabled=true; ocupado=true;
    p.descripcion=(p.descripcion?p.descripcion+" | ":"")+horaAhora()+" ["+usuarioActual.usuario+"] "+obs; p.actualizado=ahoraStr();
    prepararLog("Observación veterinaria", p.nombreAnimal+": "+obs);
    try{ await commitAll(conLog(["pacientesVet"])); ocupado=false; renderModulo("estabvet",{tipo:"ok",msg:"Observación guardada."}); }
    catch(e){ ocupado=false; renderModulo("estabvet",{tipo:"warn",msg:e.message}); }
  });
  async function cerrar(desenlace,titulo){
    const obs=val("#ev_cierre").trim();
    if(!obs){ mostrarAviso("error","El comentario de cierre es obligatorio."); return; }
    const ok=await confirmar(titulo, '<b>'+esc(p.nombreAnimal)+'</b><br>Comentario: '+esc(obs), {ok:"Sí, confirmar"});
    if(!ok) return;
    ocupado=true;
    try{ registrarEstabVetSalida(DB,{id:p.id,desenlace,observaciones:obs,responsable:val("#ev_resp")});
      prepararLog(titulo, p.nombreAnimal+" — "+obs);
      await commitAll(conLog(["pacientesVet","estabVet"])); ocupado=false; estabVetSel=null; renderModulo("estabvet",{tipo:"ok",msg:"Listo."}); }
    catch(e){ ocupado=false; renderModulo("estabvet",{tipo:"warn",msg:e.message}); }
  }
  $("#ev_alta").addEventListener("click",()=>cerrar("ALTA","Alta veterinaria"));
  $("#ev_ref").addEventListener("click",()=>cerrar("REFERIDO","Referir a otro centro"));
}

/* --------- INVENTARIO --------- */
let invSub="stock";
let invCatFiltro="";
function renderInventario(c){
  c.innerHTML='<nav class="subtabs" id="invSub">'+
    [["stock","Stock actual"],["entrada","➕ Registrar entrada"],["salida","➖ Registrar salida"]]
    .map(t=>'<button data-sub="'+t[0]+'" class="'+(invSub===t[0]?"activa":"")+'">'+t[1]+'</button>').join("")+
    '</nav><div id="invCont"></div>';
  $$("#invSub button").forEach(b=>b.addEventListener("click",()=>{ invSub=b.getAttribute("data-sub"); renderInventario(c); }));
  const cont=$("#invCont");
  if(invSub==="stock") invStock(cont);
  else if(invSub==="entrada") invEntrada(cont);
  else invSalida(cont);
}
function invStock(cont){
  const stockAll=getInventario(DB), movs=getMovimientos(DB,40);
  const catSel=invCatFiltro||"";
  const stock=catSel?stockAll.filter(i=>catNorm(i.categoria)===catSel):stockAll;
  const bajos=stock.filter(i=>i.bajoStock).length, sin=stock.filter(i=>i.sinStock).length;
  const cnt=c=>stockAll.filter(i=>catNorm(i.categoria)===c).length;
  const chips='<div class="bp-chips" style="margin-bottom:12px">'+
    '<button type="button" class="bp-chip'+(!catSel?" sel":"")+'" data-cat="">Todos ('+stockAll.length+')</button>'+
    CATEGORIAS_INV.map(c=>'<button type="button" class="bp-chip'+(catSel===c?" sel":"")+'" data-cat="'+esc(c)+'">'+c+' ('+cnt(c)+')</button>').join("")+
    '</div>';
  cont.innerHTML='<div class="tarjeta"><h2>Stock actual</h2><p class="desc">Semáforo de disponibilidad: <b style="color:var(--verde)">hay</b> · <b style="color:#b8730a">queda poco</b> (en o bajo el mínimo) · <b style="color:var(--rojo)">no hay</b>. El medicamento puede registrarse aunque no haya existencias.</p>'+
    chips+
    '<div class="resumen-inv"><div class="chip"><b>'+stock.length+'</b><span>Ítems'+(catSel?" en categoría":" registrados")+'</span></div><div class="chip'+(bajos?" alerta-poco":"")+'"><b>'+bajos+'</b><span>Queda poco</span></div><div class="chip'+(sin?" alerta":"")+'"><b>'+sin+'</b><span>Sin existencias</span></div></div>'+
    '<div class="stock-tabla">'+ (stock.length? stock.map(it=>{
        const nivel=it.sinStock?"sin":it.bajoStock?"poco":it.porAgotarse?"agotarse":"ok";
        const badge=it.sinStock?'<span class="badge-nivel sin">NO HAY</span>':it.bajoStock?'<span class="badge-nivel poco">QUEDA POCO</span>':it.porAgotarse?'<span class="badge-nivel agotarse">POR AGOTARSE</span>':'<span class="badge-nivel ok">HAY</span>';
        return '<div class="stock-fila niv-'+nivel+'"><div class="nom">'+(it.area==="Veterinario"?"🐾 ":it.area==="Humano"?"🧑 ":"")+esc(it.item)+badge+'<small>'+esc(catNorm(it.categoria))+(it.minimo?" · mínimo "+it.minimo:"")+' · área: '+esc(it.area)+'</small></div><div class="cant">'+it.stock+(it.unidad?" "+esc(it.unidad):"")+'</div></div>';
      }).join("") : '<div class="vacio-inv">'+(catSel?"No hay ítems en esta categoría.":"Todavía no hay ítems. Usa \"Registrar entrada\" para empezar.")+'</div>') +'</div>'+
    '<h2 style="margin-top:20px">Últimos movimientos</h2><div class="stock-tabla">'+ (movs.length? movs.map(m=>'<div class="mov-fila"><div class="tipo '+m.tipo+'">'+(m.tipo==="ENTRADA"?"+":"-")+m.cantidad+'</div><div class="detalle"><b>'+esc(m.item)+'</b> — '+esc(m.origen||"")+(m.referencia?" ("+esc(m.referencia)+")":"")+' · saldo '+m.saldo+'<br>'+esc(m.fechaHora)+(m.responsable?" · "+esc(m.responsable):"")+'</div></div>').join("") : '<div class="vacio-inv">Sin movimientos todavía.</div>') +'</div></div>';
  $$(".bp-chip[data-cat]",cont).forEach(b=>b.addEventListener("click",()=>{ invCatFiltro=b.getAttribute("data-cat"); invStock(cont); }));
}
function invEntrada(cont){

/* ---- utilidades de rango para el tablero ---- */
let dashRango="hoy"; // hoy | 7d | todo
function rangoDesde(){ const now=Date.now(); if(dashRango==="hoy"){ const d=new Date(); d.setHours(0,0,0,0); return d.getTime(); } if(dashRango==="7d") return now-7*86400000; return 0; }
function enRango(ts){ return (ts||0)>=rangoDesde(); }
/* Flujo por etapas del período (para el funnel) */
function flujoEtapas(db){
  const d0=rangoDesde();
  const ing=db.pacientes.filter(p=>(p.tsMs||0)>=d0).length;
  const tri=db.triage.filter(r=>(r.tsMs||0)>=d0).length;
  const desc=db.triage.filter(r=>(r.tsMs||0)>=d0&&r.codigo==="DESCARTADO").length;
  const con=db.consulta.filter(r=>(r.tsMs||0)>=d0).length;
  const est=db.estabilizacion.filter(r=>(r.tsMs||0)>=d0).length;
  const alt=db.consulta.filter(r=>(r.tsMs||0)>=d0&&/alta/i.test(r.desenlace||"")).length
          + db.estabilizacion.filter(r=>(r.tsMs||0)>=d0&&/alta/i.test(r.desenlace||"")).length;
  const tra=db.traslados.filter(r=>(r.tsMs||0)>=d0).length;
  return [
    {n:"Ingresos", v:ing, c:"#0F47AF"},
    {n:"Triage", v:tri, c:"#1565c0"},
    // Aparte del flujo de atención: no fueron tratados, se determinó en
    // Triage que el caso está fuera del alcance de la misión.
    {n:"Descartados (fuera del alcance)", v:desc, c:"#66707C"},
    {n:"Consulta", v:con, c:"#2e7d32"},
    {n:"Estabilización", v:est, c:"#00838f"},
    {n:"Egresos (altas + escalamientos)", v:alt+tra, c:"#5c6b78"}
  ];
}

/* History line: serie temporal según rango */
function serieHistoria(db){
  const d0=rangoDesde(), now=Date.now();
  const porHora=dashRango==="hoy";
  const paso=porHora?3600000:86400000;
  const ini=porHora?d0:(dashRango==="7d"?d0:(()=>{ const ts=[...db.pacientes,...db.consulta,...db.traslados].map(r=>r.tsMs||0).filter(Boolean); return ts.length?Math.min(...ts):now-86400000; })());
  const nb=Math.max(1,Math.min(porHora?24:60, Math.ceil((now-ini)/paso)+1));
  const mk=()=>new Array(nb).fill(0);
  const S={ingresos:mk(), atenciones:mk(), egresos:mk()};
  const idx=ts=>{ const i=Math.floor((ts-ini)/paso); return (i>=0&&i<nb)?i:-1; };
  db.pacientes.forEach(p=>{ const i=idx(p.tsMs||0); if(i>=0)S.ingresos[i]++; });
  db.triage.forEach(r=>{ const i=idx(r.tsMs||0); if(i>=0)S.atenciones[i]++; });
  db.consulta.forEach(r=>{ const i=idx(r.tsMs||0); if(i>=0){S.atenciones[i]++; if(/alta/i.test(r.desenlace||""))S.egresos[i]++;} });
  db.estabilizacion.forEach(r=>{ const i=idx(r.tsMs||0); if(i>=0&&/alta/i.test(r.desenlace||""))S.egresos[i]++; });
  db.traslados.forEach(r=>{ const i=idx(r.tsMs||0); if(i>=0)S.egresos[i]++; });
  const et=[]; for(let i=0;i<nb;i++){ const t=new Date(ini+i*paso); et.push(porHora? pad(t.getHours())+"h" : pad(t.getDate())+"/"+pad(t.getMonth()+1)); }
  return {S, et, nb};
}
function historiaSVG(h){
  const W=620,H=170,P=26;
  const series=[["ingresos","#0F47AF","Ingresos"],["atenciones","#e8a000","Atenciones"],["egresos","#2e7d32","Egresos"]];
  const max=Math.max(1,...series.map(sr=>Math.max(...h.S[sr[0]])));
  const x=i=>P+(W-2*P)*(h.nb===1?0.5:i/(h.nb-1));
  const y=v=>H-P-(H-2*P)*(v/max);
  let g="";
  series.forEach(sr=>{
    const vals=h.S[sr[0]];
    g+='<path d="'+vals.map((v,i)=>(i?"L":"M")+x(i).toFixed(1)+" "+y(v).toFixed(1)).join(" ")+'" fill="none" stroke="'+sr[1]+'" stroke-width="2"/>';
    g+=vals.map((v,i)=>v?'<circle cx="'+x(i).toFixed(1)+'" cy="'+y(v).toFixed(1)+'" r="4.5" fill="'+sr[1]+'"><title>'+sr[2]+" · "+h.et[i]+" · "+v+'</title></circle>':"").join("");
  });
  const ejeX=h.et.map((e,i)=>(h.nb<=12||i%Math.ceil(h.nb/10)===0)?'<text x="'+x(i).toFixed(1)+'" y="'+(H-6)+'" font-size="9" fill="#66707C" text-anchor="middle">'+e+'</text>':"").join("");
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%; height:auto" role="img" aria-label="Actividad en el tiempo">'+
    '<line x1="'+P+'" y1="'+(H-P)+'" x2="'+(W-P)+'" y2="'+(H-P)+'" stroke="#d4dade"/>'+g+ejeX+'</svg>'+
    '<div class="hist-leg"><span style="color:#0F47AF">● Ingresos</span><span style="color:#b8730a">● Atenciones (triage+consulta)</span><span style="color:#2e7d32">● Egresos</span></div>';
}
/* Alarma de estabilización sin actualización */
function estabSinActualizar(db, mins){
  const lim=(mins||60)*60000, now=Date.now();
  return db.pacientes.filter(p=>p.estado===ESTADO.SUERO_EN_CURSO && p.estabUltAct && (now-p.estabUltAct)>lim);

/* ---- Seguimiento de casos críticos escalados (ambulancia → clínica) ----
   El seguimiento vive en el propio paciente (campo segTraslado, JSON), porque
   abarca desde que sigue "escalamiento pendiente" hasta que egresa "escalado":
   así persiste durante toda la vida del caso y se sincroniza por upsert (id).
   Formato: {"solicitada":{ts,cuando,resp},"enCamino":{...},"ingresado":{...}}
   Etapa faltante = aún no realizada. Es monotónico (no puedes marcar "en
   camino" sin "solicitada"). */
const ETAPAS_AMBULANCIA = [
  {k:"solicitada", ic:"📞", txt:"Ambulancia solicitada"},
  {k:"enCamino",   ic:"🚑", txt:"Ambulancia en camino"},
  {k:"ingresado",  ic:"🏥", txt:"Paciente ingresado a clínica privada"}
];
function segTrasladoDe(p){
  try{ const o=JSON.parse((p&&p.segTraslado)||"{}"); return (o&&typeof o==="object")?o:{}; }catch(e){ return {}; }
}
function nivelSeg(seg){ let n=0; for(const e of ETAPAS_AMBULANCIA){ if(seg&&seg[e.k]&&seg[e.k].ts) n++; else break; } return n; }
function puedeEditarSeg(){ return moduloPermitido("traslado"); } // admin y coordinación; "Solo tablero" queda de lectura
/* Avanza o deshace una etapa del seguimiento de ambulancia (monotónico) y
   persiste por el mismo camino que el resto de la app (commitAll + cola). */
async function toggleSegTraslado(pid, key){
  const p=DB.pacientes.find(x=>x.id===pid); if(!p) return;
  const idx=ETAPAS_AMBULANCIA.findIndex(e=>e.k===key); if(idx<0) return;
  const seg=segTrasladoDe(p);
  const yaHecho=!!(seg[key]&&seg[key].ts);
  // "🏥 Ingresó a clínica" es un EGRESO: al marcarlo el caso se cierra (pasa a
  // TRASLADADO). Deshacerlo el mismo día lo reabre, salvo que ya exista un
  // traslado formal registrado (esa fila es la fuente de verdad del cierre).
  const cerrando   = (key==="ingresado" && !yaHecho && p.estado!==ESTADO.TRASLADADO);
  const reabriendo = (key==="ingresado" &&  yaHecho && p.estado===ESTADO.TRASLADADO && !DB.traslados.some(t=>String(t.id)===String(pid)));
  if(cerrando){
    const ok=await confirmar("Cerrar caso escalado", "<b>"+esc(etiquetaPaciente(p))+"</b> quedará como <b>Trasladado (egresó)</b> al confirmar que ingresó a la clínica privada. ¿Continuar?", {ok:"Sí, cerrar"});
    if(!ok) return;
  }
  if(yaHecho){
    for(let i=idx;i<ETAPAS_AMBULANCIA.length;i++) delete seg[ETAPAS_AMBULANCIA[i].k]; // deshace esta y las posteriores
    if(reabriendo){ p.estado=ESTADO.TRASLADO_PENDIENTE; p.cierreTsMs=""; p.actualizado=ahoraStr(); } // reabre el caso
  }else{
    const now=Date.now(), rsp=(usuarioActual&&usuarioActual.nombre)||"";
    for(let i=0;i<=idx;i++){ const k=ETAPAS_AMBULANCIA[i].k; if(!(seg[k]&&seg[k].ts)) seg[k]={ts:now, cuando:ahoraStr(), resp:rsp}; } // rellena las anteriores que falten
    if(cerrando){ actualizarEstado(DB, pid, ESTADO.TRASLADADO); } // egreso: cierra el caso
  }
  p.segTraslado=JSON.stringify(seg);
  prepararLog("SEGUIMIENTO ESCALAMIENTO", (nombreCompleto(p)||p.id)+" → "+(yaHecho?"(deshecho) ":"")+ETAPAS_AMBULANCIA[idx].txt+(cerrando?" · CASO CERRADO (egresó)":reabriendo?" · CASO REABIERTO":""));
  await commitAll(conLog(["pacientes"]));
}

  }).join("");
  let det="";
  const psel=escSel?lista.find(p=>p.id===escSel):null;
  if(psel){
    const seg=segTrasladoDe(psel), nv=nivelSeg(seg), editable=puedeEditarSeg();
    det='<div class="seg-detalle"><div class="seg-det-cab"><b>'+esc(etiquetaPaciente(psel))+'</b><span class="mut">'+esc(ESTADO_LABEL[psel.estado]||psel.estado)+'</span></div>'+

        const done=!!(seg[e.k]&&seg[e.k].ts);

        const info=done?('<small>'+esc(seg[e.k].cuando||"")+(seg[e.k].resp?" · "+esc(seg[e.k].resp):"")+'</small>'):'<small class="mut">pendiente</small>';
        return '<button type="button" class="seg-step'+(done?" done":"")+'"'+(habil?'':' disabled')+' data-seg="'+e.k+'" data-pid="'+esc(psel.id)+'">'+
          '<span class="seg-step-ic">'+(done?"✓":e.ic)+'</span><span class="seg-step-tx">'+esc(e.txt)+'</span>'+info+'</button>';
      }).join("")+'</div>'+
      '<div class="mut" style="font-size:11px; margin-top:8px">'+(editable?"Toca la siguiente etapa para avanzar, o la última marcada para deshacer.":"Tu rol es de solo lectura para este seguimiento.")+'</div>'+
    '</div>';
  }
  return '<h3 class="dash-h">🚑 Seguimiento de casos críticos escalados <small class="mut" style="text-transform:none">(doble clic en un caso para ver / actualizar la ambulancia)</small></h3>'+
    '<div class="seg-wrap"><div class="seg-lista">'+(lista.length?listaHTML:'<div class="vacio">Sin casos críticos escalados por ahora.</div>')+'</div>'+det+'</div>';
}

/* --------- USUARIOS --------- */
let usrEdit=null; // @usuario en edición, o null
let backofficeTab="plataforma"; // pestaña activa del Backoffice
/* Carga la lista de usuarios UNA sola vez, aunque varias partes de la app la
   pidan casi al mismo tiempo (Usuarios, buscador global). Evita peticiones
   duplicadas al backend. */
/* ---- Médicos y veterinarios (catálogo para desplegables) ----
   Una sola tabla `medicos` con campo `tipo` ('medico' | 'veterinario').
   Filas antiguas sin tipo se tratan como 'medico' (compatibilidad). */
function tipoDe(m){ return String(m.tipo||"medico").toLowerCase()==="veterinario"?"veterinario":"medico"; }
function medicosActivos(tipo){ return DB.medicos.filter(m=>m.activo!==false && (!tipo||tipoDe(m)===tipo)).sort((a,b)=>String(a.nombre).localeCompare(String(b.nombre),"es")); }
/* Desplegable con búsqueda: usa <datalist>. tipo opcional filtra el catálogo
   ('medico' para Consulta, 'veterinario' para Veterinaria). */
function selectorMedicoHTML(id, valor, tipo){
  const lista=medicosActivos(tipo);
  const etq=tipo==="veterinario"?"veterinario":"médico";
  if(!lista.length) return '<input id="'+id+'" list="'+id+'_dl" autocomplete="off" placeholder="No hay '+etq+'s cargados — pídele al admin que los agregue" value="'+esc(valor||"")+'"><datalist id="'+id+'_dl"></datalist>';
  return '<input id="'+id+'" list="'+id+'_dl" autocomplete="off" placeholder="Escribe o elige un '+etq+'…" value="'+esc(valor||"")+'">'+
    '<datalist id="'+id+'_dl">'+lista.map(m=>'<option value="'+esc(m.nombre)+'">'+(m.especialidad?esc(m.especialidad):'')+'</option>').join("")+'</datalist>';
}

  // Carga rápida: parsea líneas "Nombre[, Especialidad]", salta duplicados y vacíos
  function parseLineas(txt, tipo){
    const nuevos=[], vistos={};
    DB.medicos.filter(m=>tipoDe(m)===tipo).forEach(m=>{ vistos[String(m.nombre).trim().toLowerCase()]=1; });
    String(txt||"").split(/\r?\n/).forEach(linea=>{
      const l=linea.trim(); if(!l) return;
      const parts=l.split(/[,;\t]/).map(x=>x.trim());
      const nom=parts[0]; if(!nom) return;
      const key=nom.toLowerCase();
      if(vistos[key]) return; vistos[key]=1;
      nuevos.push({id:nuevoId(), nombre:nom, especialidad:parts[1]||"", activo:true, tipo});
    });
    return nuevos;
  }
  async function cargarLote(nuevos, tipo){
    if(!nuevos.length){ mostrarAviso("warn","No hay nombres nuevos para cargar (revisa duplicados o líneas vacías)."); return; }
    const ok=await confirmar("Cargar "+nuevos.length+" "+(tipo==="veterinario"?"veterinario(s)":"médico(s)"), nuevos.slice(0,8).map(n=>'• '+esc(n.nombre)).join("<br>")+(nuevos.length>8?"<br>…y "+(nuevos.length-8)+" más":""), {ok:"Sí, cargar todos"});
    if(!ok) return;
    ocupado=true;
    nuevos.forEach(n=>DB.medicos.push(n));
    prepararLog("Carga rápida "+(tipo==="veterinario"?"veterinarios":"médicos"), nuevos.length+" registros");
    try{ await commitAll(conLog(["medicos"])); ocupado=false; renderModulo("medicos",{tipo:"ok",msg:nuevos.length+" cargado(s)."}); }
    catch(e){ ocupado=false; renderModulo("medicos",{tipo:"warn",msg:e.message}); }
  }
  function conectarCarga(pfx, tipo){
    const btn=$("#"+pfx+"_bulkBtn");
    if(btn) btn.addEventListener("click",()=>cargarLote(parseLineas(val("#"+pfx+"_bulk"), tipo), tipo));
    const file=$("#"+pfx+"_csv");
    if(file) file.addEventListener("change",e=>{
      const f=e.target.files&&e.target.files[0]; if(!f) return;
      const rd=new FileReader();
      rd.onload=()=>{ let txt=String(rd.result||""); // salta encabezado si la 1ª línea trae "nombre"
        const lineas=txt.split(/\r?\n/); if(lineas.length && /nombre/i.test(lineas[0]) && /especialidad|tipo/i.test(lineas[0])) lineas.shift();
        cargarLote(parseLineas(lineas.join("\n"), tipo), tipo); };
      rd.onerror=()=>mostrarAviso("error","No se pudo leer el archivo.");
      rd.readAsText(f);
    });
  }
  conectarCarga("med","medico"); conectarCarga("vet","veterinario");
}

function etiquetaPaciente(p){

/* Formatea la marca temporal de un evento del historial para que se lea claro:
   devuelve {hora:"HH:MM", fecha:"DD/MM/AAAA"}. Acepta el string "DD/MM/AAAA
   HH:MM:SS" (quita segundos) y, si falta o no se puede leer, usa el ts numérico. */
function fmtHoraEvento(horaStr, ts){
  let f="", h="";
  const s=String(horaStr||"").trim();
  if(s){
    // Admite "AAAA-MM-DD HH:MM", ISO "AAAA-MM-DDTHH:MM", "DD/MM/AAAA HH:MM".
    s.split(/[ T]/).forEach(x=>{
      x=x.trim(); if(!x) return;
      if(/^\d{4}-\d{2}-\d{2}$/.test(x)){                 // fecha ISO AAAA-MM-DD
        if(x!=="1899-12-30"){ const p=x.split("-"); f=p[2]+"/"+p[1]+"/"+p[0]; } // ignora epoch basura de Sheets
      } else if(x.indexOf("/")>=0){ f=x; }               // fecha DD/MM/AAAA
      else if(x.indexOf(":")>=0){ h=x.split(":").slice(0,2).join(":"); } // hora HH:MM (sin segundos)
    });
  }
  if((!h||!f) && ts){                                     // completa lo que falte desde el epoch confiable
    try{ const d=new Date(Number(ts)); if(!isNaN(d.getTime())){ if(!f) f=pad(d.getDate())+"/"+pad(d.getMonth()+1)+"/"+d.getFullYear(); if(!h) h=pad(d.getHours())+":"+pad(d.getMinutes()); } }catch(e){}
  }
  if(h) h=h+" h"; // hora militar (24h) con sufijo, para diferenciar mañana/tarde
  return {hora:h, fecha:f};
}

function renderPacientes(c, contexto){
