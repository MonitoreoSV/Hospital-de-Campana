async function medirPlataforma(){
  const out={t:Date.now(), ping:null, lectura:null, filas:null, ok:false, error:""};
  if(!API_URL){ out.error="Modo local (sin API_URL)."; return out; }
  let t0=performance.now();
  const p=await pingRemoto();
  out.ping=Math.round(performance.now()-t0);
  if(!p.ok){ out.error=p.error||"Ping falló."; histMonPush(out); return out; }
  t0=performance.now();
  try{
    const res=await fetch(API_URL+(API_URL.indexOf("?")>=0?"&":"?")+"action=readAll"+(CLAVE_API?"&k="+encodeURIComponent(CLAVE_API):""),{method:"GET"});
    const j=JSON.parse(await res.text());
    out.lectura=Math.round(performance.now()-t0);
    if(j.ok){ out.ok=true; out.filas=Object.keys(j.data||{}).reduce((a,k)=>a+(j.data[k]||[]).length,0); }
    else out.error=j.error||"Lectura falló.";
  }catch(e){ out.lectura=Math.round(performance.now()-t0); out.error="Lectura falló: "+e.message; }
  histMonPush(out);
  return out;
}
function sparkSVG(hist){
  if(!hist.length) return '<div class="vacio">Aún no hay mediciones.</div>';
  const W=560,H=110,P=8, vals=hist.map(h=>h.ping==null?0:h.ping);
  const max=Math.max(1500, ...vals);
  const x=i=>P+(W-2*P)*(hist.length===1?0.5:i/(hist.length-1));
  const y=v=>H-P-(H-2*P)*Math.min(1,v/max);
  const linea=hist.map((h,i)=>(i?"L":"M")+x(i).toFixed(1)+" "+y(vals[i]).toFixed(1)).join(" ");
  const pts=hist.map((h,i)=>'<circle class="mon-pt" data-i="'+i+'" cx="'+x(i).toFixed(1)+'" cy="'+y(vals[i]).toFixed(1)+'" r="5" fill="'+(h.ok?"#2e7d32":"#c62828")+'"><title>'+new Date(h.t).toLocaleTimeString()+" · ping "+(h.ping==null?"—":h.ping+" ms")+(h.lectura!=null?" · lectura "+h.lectura+" ms":"")+(h.ok?"":" · FALLO: "+h.error)+'</title></circle>').join("");
  const umbral=y(2500);
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%; height:auto" role="img" aria-label="Historial de latencia">'+
    '<line x1="'+P+'" y1="'+umbral+'" x2="'+(W-P)+'" y2="'+umbral+'" stroke="#e8a000" stroke-dasharray="4 4" stroke-width="1"/>'+
    '<path d="'+linea+'" fill="none" stroke="#0F47AF" stroke-width="2"/>'+pts+'</svg>'+
    '<div class="mut" style="font-size:11px">Cada punto es una medición (verde OK, rojo fallo). Línea punteada: umbral 2.5 s. Toca un punto para ver su detalle.</div>';
}

/* ---- Facilitador de fila: contador simple de personas esperando ----
   Un solo registro (id:"FILA") con la cantidad, la marca de tiempo y quién la
   actualizó. Se sincroniza como el resto (upsert por id). */
/* ---- Configuración (capacidad instalada por etapa) ----
   Registros clave/valor en la tabla config. Claves: cap_consulta,
   cap_estabilizacion, cap_saludmental. 0 o vacío = sin límite definido. */
function cfgGet(clave){ const r=DB.config.find(x=>x.clave===clave); return r?r.valor:""; }
function cfgNum(clave){ const v=parseInt(cfgGet(clave),10); return isNaN(v)?0:v; }
function capacidadEtapa(mod){ return cfgNum("cap_"+mod); }
/* Nivel de ocupación de una etapa: {cap, ocup, pct, nivel} donde nivel es
   "ok" (<80%), "alto" (>=80% y <100%), "lleno" (>=100%). Sin capacidad → nivel ok. */
function ocupacionEtapa(mod, ocup){
  const cap=capacidadEtapa(mod);
  if(!cap) return {cap:0, ocup, pct:0, nivel:"ok"};
  const pct=Math.round(ocup/cap*100);
  const nivel = ocup>=cap ? "lleno" : (ocup>=cap*0.8 ? "alto" : "ok");
  return {cap, ocup, pct, nivel};
}
/* Cuenta cuántos pacientes ocupan una etapa ahora mismo. */
function contarOcupacion(mod){
  if(mod==="atencion") return DB.pacientes.filter(p=>[ESTADO.ESPERA_ROJO,ESTADO.ESPERA_AMARILLO,ESTADO.ESPERA_VERDE].includes(p.estado)).length;
  if(mod==="estabilizacion") return DB.pacientes.filter(p=>[ESTADO.ESPERA_ESTABILIZACION,ESTADO.SUERO_EN_CURSO].includes(p.estado)).length;
  if(mod==="saludmental") return DB.pacientes.filter(p=>p.estado===ESTADO.SALUD_MENTAL).length;
  return 0;
}

/* Línea de tiempo de la fila: usa los puntos históricos (id "H-…") del día
   seleccionado según el rango del tablero. Devuelve un SVG sparkline simple. */
function filaSerie(desde){
  return DB.fila.filter(r=>r.id&&r.id.indexOf("H-")===0&&Number(r.tsMs)>=desde)
    .map(r=>({t:Number(r.tsMs), n:Number(r.cantidad)||0}))
    .sort((a,b)=>a.t-b.t);
}
function filaTimelineHTML(desde){
  const s=filaSerie(desde);
  if(s.length<2) return '<div class="caja"><h3>🧍 Línea de tiempo de la fila</h3><div class="vacio">Aún no hay suficientes registros de fila para dibujar la evolución. Se irá construyendo a medida que el facilitador actualice el número.</div></div>';
  const W=680,H=140,MG=28;
  const t0=s[0].t, t1=s[s.length-1].t, span=Math.max(1,t1-t0);
  const maxN=Math.max(...s.map(p=>p.n),1);
  const x=t=>MG+(t-t0)/span*(W-MG*2);
  const y=n=>H-MG-(n/maxN)*(H-MG*2);
  const pts=s.map(p=>x(p.t).toFixed(1)+","+y(p.n).toFixed(1));
  const area="M"+MG+","+(H-MG)+" L"+pts.join(" L")+" L"+(W-MG)+","+(H-MG)+" Z";
  const linea="M"+pts.join(" L");
  const hhmm=t=>{const d=new Date(t);return pad(d.getHours())+":"+pad(d.getMinutes());};
  const picoP=s.reduce((a,b)=>b.n>a.n?b:a,s[0]);
  const ejeX='<text x="'+MG+'" y="'+(H-6)+'" class="tl-ax">'+hhmm(t0)+'</text><text x="'+(W-MG)+'" y="'+(H-6)+'" class="tl-ax" text-anchor="end">'+hhmm(t1)+'</text>';
  const puntos=s.map(p=>'<circle cx="'+x(p.t).toFixed(1)+'" cy="'+y(p.n).toFixed(1)+'" r="2.5" class="tl-dot"/>').join("");
  return '<div class="caja"><h3>🧍 Línea de tiempo de la fila</h3>'+
    '<div class="mut" style="font-size:12px; margin-bottom:6px">Pico: <b>'+picoP.n+'</b> personas a las '+hhmm(picoP.t)+' · Último: <b>'+s[s.length-1].n+'</b> · '+s.length+' registros</div>'+
    '<svg viewBox="0 0 '+W+' '+H+'" class="tl-svg" preserveAspectRatio="xMidYMid meet">'+
      '<path d="'+area+'" class="tl-area"/><path d="'+linea+'" class="tl-line"/>'+puntos+ejeX+
      '<line x1="'+MG+'" y1="'+(H-MG)+'" x2="'+(W-MG)+'" y2="'+(H-MG)+'" class="tl-base"/>'+
    '</svg></div>';
}

function montarCatalogos(c){
  $$(".cat-card", c).forEach(card=>{
    const clave=card.getAttribute("data-clave"), tipo=card.getAttribute("data-tipo");
    const lista=$(".cat-lista", card);
    const aviso=$(".aviso", card);
    const nuevaFila=()=> tipo==="codnom"
      ? '<div class="cat-fila"><input class="cat-cod" placeholder="CÓDIGO" style="flex:0 0 90px"><input class="cat-nom" placeholder="Descripción"><button class="btn-mini cat-del" title="Quitar">✕</button></div>'
      : '<div class="cat-fila"><input class="cat-nom" placeholder="Nombre"><button class="btn-mini cat-del" title="Quitar">✕</button></div>';
    const engancharDel=()=>$$(".cat-del", card).forEach(b=>{ b.onclick=()=>{ b.closest(".cat-fila").remove(); }; });
    engancharDel();
    $(".cat-add", card).onclick=()=>{ lista.insertAdjacentHTML("beforeend", nuevaFila()); engancharDel(); };
    $(".cat-guardar", card).onclick=async()=>{
      // Recolecta los valores de las filas.
      let valor, vacios=false;
      if(tipo==="codnom"){
        valor=[];
        $$(".cat-fila", lista).forEach(f=>{ const cod=$(".cat-cod",f).value.trim(), nom=$(".cat-nom",f).value.trim(); if(cod&&nom) valor.push({cod,nombre:nom}); else if(cod||nom) vacios=true; });
      } else {
        valor=[];
        $$(".cat-fila", lista).forEach(f=>{ const v=$(".cat-nom",f).value.trim(); if(v) valor.push(v); });
      }
      if(!valor.length){ aviso.style.display="block"; aviso.className="aviso error"; aviso.textContent="La lista no puede quedar vacía. Si quieres los valores originales, usa «Restaurar por defecto»."; return; }
      const btn=$(".cat-guardar", card); btn.disabled=true; const t=btn.textContent; btn.textContent="Guardando…"; ocupado=true;
      try{
        await guardarConfig(clave, valor);
        ocupado=false; btn.disabled=false; btn.textContent=t;
        aviso.style.display="block"; aviso.className="aviso ok"; aviso.textContent="Guardado."+(vacios?" (Se ignoraron filas incompletas.)":"");
      }catch(e){ ocupado=false; btn.disabled=false; btn.textContent=t; aviso.style.display="block"; aviso.className="aviso error"; aviso.textContent=e.message||"No se pudo guardar."; }
    };
    $(".cat-restaurar", card).onclick=async()=>{
      const ok=await confirmar("Restaurar por defecto","Se volverá a la lista original del sistema para «"+esc(CATALOGOS_EDIT.find(x=>x.clave===clave).titulo)+"». ¿Continuar?",{ok:"Sí, restaurar"});
      if(!ok) return;
      const def=CONFIG_DEFAULTS[clave];
      const btn=$(".cat-restaurar", card); btn.disabled=true; ocupado=true;
      try{
        await guardarConfig(clave, JSON.parse(JSON.stringify(def)));
        ocupado=false; backofficeTab="catalogos"; renderModulo("estado");
      }catch(e){ ocupado=false; btn.disabled=false; aviso.style.display="block"; aviso.className="aviso error"; aviso.textContent=e.message||"No se pudo restaurar."; }
    };
  });
}
function montarTabsBackoffice(c){
  $$(".bo-tab", c).forEach(b=>b.addEventListener("click",()=>{ backofficeTab=b.getAttribute("data-tab"); renderModulo("estado"); }));
}
function renderEstado(c){
  const esAdmin = usuarioActual && usuarioActual.rol==="admin";
  // Barra de pestañas (Catálogos solo para admin).
  const tabs=[["plataforma","🔌 Plataforma"]];
  if(esAdmin){ tabs.push(["catalogos","📋 Catálogos"]); }
  const barra='<div class="bo-tabs">'+tabs.map(t=>'<button class="bo-tab'+(backofficeTab===t[0]?" activa":"")+'" data-tab="'+t[0]+'">'+t[1]+'</button>').join("")+'</div>';
  if(backofficeTab==="catalogos" && esAdmin){
    c.innerHTML=barra+renderCatalogos();
    montarTabsBackoffice(c);
    montarCatalogos(c);
    return;
  }
  // ---- Pestaña PLATAFORMA (lo que ya existía) ----
  const hist=histMon();
  const ult=hist[hist.length-1];
  let sem="gris", semTxt="Sin mediciones todavía. Toca «Medir ahora».";
  if(ult){
    if(!ult.ok){ sem="rojo"; semTxt="ÚLTIMA MEDICIÓN FALLÓ — "+ult.error; }
    else if(ult.ping>2500||{}.hasOwnProperty.call(ult,"lectura")&&ult.lectura>6000){ sem="amarillo"; semTxt="Funciona pero LENTO (ping "+ult.ping+" ms, lectura "+ult.lectura+" ms). Puede haber saturación."; }
    else { sem="verde"; semTxt="Todo en orden (ping "+ult.ping+" ms · lectura "+ult.lectura+" ms · "+ult.filas+" filas)."; }
  }
  const fallos=hist.filter(h=>!h.ok).length;
  c.innerHTML=barra+'<div class="tarjeta"><h2>Estado de la plataforma</h2>'+
    '<p class="desc">Modo: <b>'+MODO+'</b> · Mediciones guardadas: '+hist.length+(fallos?' · <b style="color:var(--rojo)">'+fallos+' con fallo</b>':'')+'</p>'+
    '<div class="sem sem-'+sem+'">'+semTxt+'</div>'+
    '<div style="display:flex; gap:8px; margin-top:10px"><button class="btn" id="stMedir" style="flex:1">Medir ahora</button><button class="btn-sec" id="stDiag" style="flex:1">Mapeo de hojas</button></div>'+
    (esAdmin ? '<div style="margin-top:14px; border-top:1px solid var(--linea); padding-top:12px"><h3 style="font-size:13px; margin:0 0 6px">Datos de prueba</h3><p class="mut" style="font-size:12px; margin:0 0 8px">Genera ~25 pacientes en todas las fases (triage, consulta, estabilización, salud mental, traslados) + consultas veterinarias, para revisar los tableros. Quedan marcados con «DEMO». <b>Escribe en el Google Sheet.</b></p><div style="display:flex; gap:8px; flex-wrap:wrap"><button class="btn" id="stSeed">Cargar datos de prueba</button><button class="btn-sec" id="stLimpiar">🧹 Limpiar datos demo</button></div></div>' : '')+
    '<h3 style="margin:16px 0 6px; font-size:13px">Historial de latencia (picos)</h3><div id="stSpark">'+sparkSVG(hist)+'</div>'+
    panelConexiones()+
    panelBitacora()+
    '<div style="font-size:11px; word-break:break-all; color:var(--gris); margin-top:10px">URL: '+esc(API_URL||"(no definida)")+'</div>'+
    '<div id="stDetail" style="display:none; margin-top:10px; font-size:12px; white-space:pre-wrap; word-break:break-word"></div>'+
    '</div>'+
    (esAdmin ? capacidadCardHTML() : '');
  montarTabsBackoffice(c);
  if(esAdmin) montarCapacidad();
  $("#stMedir").addEventListener("click",async()=>{
    const b=$("#stMedir"); b.disabled=true; const t=b.textContent; b.textContent="Midiendo…";
    await medirPlataforma(); b.disabled=false; b.textContent=t;
    renderModulo("estado");
  });
  $("#stDiag").addEventListener("click",async()=>{
    const out=$("#stDetail"), b=$("#stDiag"); out.style.display="block";
    if(MODO==="local"){ out.style.color="#8a6100"; out.textContent="Sin conexión (modo local)."; return; }
    b.disabled=true; const t=b.textContent; b.textContent="Consultando…"; out.style.color="#607080"; out.textContent="Leyendo mapeo…";
    const r=await diagnoseRemoto(); b.disabled=false; b.textContent=t;
    if(!r.ok){ out.style.color="var(--rojo)"; out.textContent="No se pudo leer el mapeo.\n"+(r.error||""); return; }
    out.style.color="var(--tinta)";
    const lineas=(r.info.hojas||[]).map(h=>{
      let x="• "+h.pestana+(h.mapeadaComo?(" → "+h.mapeadaComo):"")+" ("+h.filas+" filas)";
      if(h.chequeo && h.chequeo.faltan && h.chequeo.faltan.length) x+="\n   ⚠️ faltan: "+h.chequeo.faltan.join(", ");
      return x;
    });
    out.textContent="Hoja: "+r.info.spreadsheet+"\nPestañas: "+r.info.totalHojas+"\n\n"+lineas.join("\n");
  });
  if(usuarioActual && usuarioActual.rol==="admin"){
    const sb=$("#stSeed");
    if(sb) sb.addEventListener("click",async()=>{
      const ok=await confirmar("Cargar datos de prueba","Se agregarán ~25 pacientes de demostración y registros en todas las fases (marcados con «DEMO»).<br><br>Esto <b>escribe en el Google Sheet</b> conectado.",{ok:"Sí, cargar"});
      if(!ok) return;
      sb.disabled=true; sb.textContent="Cargando…"; ocupado=true;
      try{ await sembrarDemo(); ocupado=false; renderModulo("dashboard",{tipo:"ok",msg:"Datos de prueba cargados. Revisa el tablero."}); }
      catch(e){ ocupado=false; sb.disabled=false; sb.textContent="Cargar datos de prueba"; mostrarAviso("warn","Guardado local OK, pero la sincronización falló: "+e.message); }
    });
    const lim=$("#stLimpiar");
    if(lim) lim.addEventListener("click",async()=>{
      const n=contarDemo();
      if(!n){ mostrarAviso("ok","No hay datos demo para limpiar."); return; }
      const ok=await confirmar("Limpiar datos demo","Se eliminarán <b>"+n+" registro(s)</b> marcados con «DEMO» (pacientes, triage, consultas, estabilización, traslados y veterinaria de prueba).<br><br>Los datos reales NO se tocan. Esto <b>reescribe las hojas</b> del Google Sheet.",{ok:"Sí, limpiar"});
      if(!ok) return;
      lim.disabled=true; lim.textContent="Limpiando…"; ocupado=true;
      const afectadas=["pacientes","triage","consulta","estabilizacion","traslados","consultaVet","pacientesVet","estabVet","movimientos"];
      try{
        limpiarDemo();
        // Respaldo local inmediato
        afectadas.forEach(t=>localSetTabla(t, JSON.stringify(serializa(t))));
        if(MODO==="sheet"){ await reescribirTablas(afectadas); }
        ocupado=false; renderModulo("dashboard",{tipo:"ok",msg:n+" registro(s) demo eliminados."});
      }
      catch(e){ ocupado=false; lim.disabled=false; lim.textContent="🧹 Limpiar datos demo"; mostrarAviso("warn","No se pudo completar la limpieza en el Sheet: "+e.message); }
    });
    const lb=$("#logBusca");
    if(lb) lb.addEventListener("input", e=>{ logFiltro=e.target.value; renderEstado(c); const b=$("#logBusca"); if(b){ b.focus(); b.setSelectionRange(b.value.length,b.value.length); } });
  }
}

/* --------- DATOS DE PRUEBA (solo admin) --------- */
/* --- Limpieza de datos demo ---
   Los datos de prueba se marcan con "DEMO" en descripcion/observaciones, y los
   IDs de pacientes demo van con secuencia 9xxx. Identificamos y removemos. */
function esDemoReg(r){
  return String(r.descripcion||"").toUpperCase()==="DEMO" || String(r.observaciones||"").toUpperCase()==="DEMO" || String(r.obsEntrada||"").toUpperCase()==="DEMO" || String(r.antecedentes||"").toUpperCase()==="DEMO";
}
function idsDemo(){
  const ids={};
  DB.pacientes.forEach(p=>{ if(esDemoReg(p)) ids[p.id]=1; });
  return ids;
}
function contarDemo(){
  const ids=idsDemo();
  let n=Object.keys(ids).length;
  ["triage","consulta","estabilizacion","traslados"].forEach(t=>{ n+=DB[t].filter(r=>ids[r.id]||esDemoReg(r)).length; });
  n+=DB.consultaVet.filter(esDemoReg).length;
  n+=DB.pacientesVet.filter(esDemoReg).length;
  n+=DB.estabVet.filter(esDemoReg).length;
  return n;
}
function limpiarDemo(){
  const ids=idsDemo();
  DB.pacientes=DB.pacientes.filter(p=>!ids[p.id]);
  ["triage","consulta","estabilizacion","traslados"].forEach(t=>{ DB[t]=DB[t].filter(r=>!(ids[r.id]||esDemoReg(r))); });
  DB.consultaVet=DB.consultaVet.filter(r=>!esDemoReg(r));
  DB.pacientesVet=DB.pacientesVet.filter(r=>!esDemoReg(r));
  DB.estabVet=DB.estabVet.filter(r=>!esDemoReg(r));
  DB.movimientos=DB.movimientos.filter(r=>!/DEMO|demostraci/i.test(String(r.motivo||"")));
}
async function sembrarDemo(){
  const now=Date.now();
  const rnd=a=>a[Math.floor(Math.random()*a.length)];
  const nomM=["JOSÉ","LUIS","CARLOS","MIGUEL","JESÚS","PEDRO","ANDRÉS","DAVID","RAFAEL","ÁNGEL"];
  const nomF=["MARÍA","ANA","CARMEN","ROSA","LUISA","GABRIELA","DANIELA","SOFÍA","VALENTINA","ISABEL"];
  const ape=["GONZÁLEZ","RODRÍGUEZ","PÉREZ","GARCÍA","MARTÍNEZ","HERNÁNDEZ","LÓPEZ","RAMÍREZ","FLORES","TORRES","DÍAZ","MORENO"];
  const motivos=["TRAUMA","DOLFIE","RESP","GASTRO","HTA","DM","DERMA"];
  const meds=["PARACETAMOL CAP 1G x20","AMOXICILINA CAP 500MG X12","LOSARTAN POTA TAB REC 50MG X30"];
  const plan=[
    ["INGRESADO",3,null],["ESPERA ROJO",2,"ROJO"],["ESPERA AMARILLO",3,"AMARILLO"],["ESPERA VERDE",3,"VERDE"],
    ["ESPERA ESTABILIZACION",2,"ROJO"],["SUERO EN CURSO",2,"ROJO"],["SALUD MENTAL",2,"AMARILLO"],
    ["TRASLADO PENDIENTE",1,"TRASLADO"],["ALTA",4,"VERDE"],["TRASLADADO",2,"ROJO"],["DESCARTADO",1,"DESCARTADO"]
  ];
  const fechaId=(function(){const d=new Date(); return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate());})();
  let seq=9000;
  plan.forEach(function(fila){
    const estado=fila[0], cant=fila[1], cod=fila[2];
    for(let i=0;i<cant;i++){
      seq++;
      const fem=Math.random()<0.5, edad=2+Math.floor(Math.random()*88), menor=edad<18;
      const ts=now-Math.floor(Math.random()*5*3600*1000), d=new Date(ts);
      const nombre=fem?rnd(nomF):rnd(nomM), apellido=rnd(ape)+" "+rnd(ape), pacNom=nombre+" "+apellido;
      const id="P-"+fechaId+"-"+pad(seq,4);
      const ced=menor?"":("V-"+(10000000+Math.floor(Math.random()*19999999)));
      DB.pacientes.push({id, fecha:fechaHoy(d), hora:horaAhora(d), tsMs:ts, nombre, apellido, sexo:fem?"FEMENINO":"MASCULINO",
        fechaNacimiento:"", edad, tipoDocumento:menor?"":"CEDULA", cedula:ced, menor, repNombre:menor?rnd(nomF):"", repApellido:menor?rnd(ape):"",
        repFechaNac:"", repCedula:menor?("V-"+(6000000+Math.floor(Math.random()*9999999))):"",
        embarazada:(fem&&!menor&&Math.random()<0.12), noIdentificado:false, descripcion:"DEMO", estabUltAct:(estado==="SUERO EN CURSO"?ts:""), estado, actualizado:ahoraStr(d)});
      if(cod){
        const tt=ts+5*60000;
        DB.triage.push({fechaHora:ahoraStr(new Date(tt)),tsMs:tt,id,cedula:ced,paciente:pacNom,codigo:cod,
          ta:"120/80",fc:String(70+Math.floor(Math.random()*30)),fr:String(14+Math.floor(Math.random()*8)),temp:(36+Math.random()*2).toFixed(1),sat:String(94+Math.floor(Math.random()*5)),
          motivos:rnd(motivos),observaciones:"DEMO",responsable:"Demo",signos:"",colorSugerido:cod});
      }
      if(["ESPERA ESTABILIZACION","SUERO EN CURSO","SALUD MENTAL","TRASLADO PENDIENTE","ALTA"].includes(estado)){
        const tc=ts+20*60000;
        const des={"ESPERA ESTABILIZACION":"Derivado a estabilización","SUERO EN CURSO":"Derivado a estabilización","SALUD MENTAL":"Derivado a salud mental","TRASLADO PENDIENTE":"Escalamiento de emergencia","ALTA":"Alta con tratamiento"}[estado];
        DB.consulta.push({fechaHora:ahoraStr(new Date(tc)),tsMs:tc,id,cedula:ced,paciente:pacNom,antecedentes:"DEMO",motivo:"Demo",diagnostico:"Diagnóstico de prueba",medicamentos:(estado==="ALTA"?(rnd(meds)+" x 1"):""),desenlace:des,observaciones:"DEMO",medico:"Demo"});
      }
      if(estado==="SUERO EN CURSO"){
        const te=ts+30*60000;
        DB.estabilizacion.push({fechaHora:ahoraStr(new Date(te)),tsMs:te,id,cedula:ced,paciente:pacNom,solucion:"Hidratación IV + observación",volumen:"",medicamentosIV:"",horaInicio:horaAhora(new Date(te)),horaFin:"",desenlace:"",obsEntrada:"DEMO",obsSalida:"",respEntrada:"Demo",respSalida:""});
      }
      if(estado==="TRASLADADO"){
        const tr=ts+40*60000;
        DB.traslados.push({fechaHora:ahoraStr(new Date(tr)),tsMs:tr,id,cedula:ced,paciente:pacNom,origen:"Consulta",motivo:"Demo",destino:"Hospital de referencia",vehiculo:"Ambulancia",horaSalida:horaAhora(new Date(tr)),acompanante:"",referenciaEfectiva:rnd(["Sí — recibido","Pendiente","No — rechazado / no completado"]),observaciones:"DEMO",responsable:"Demo"});
      }
    }
  });
  const esp=["Canino","Felino","Ave"];
  const vetPlan=[["ALTA VET","Alta con tratamiento",2],["ESTAB VET","Queda en estabilización veterinaria",2],["REFERIDO VET","Referido a otro centro veterinario",1]];
  let vseq=0;
  vetPlan.forEach(function(vf){
    const estadoV=vf[0], desV=vf[1], cantV=vf[2];
    for(let i=0;i<cantV;i++){
      vseq++;
      const tv=now-Math.floor(Math.random()*4*3600*1000), dv=new Date(tv);
      const nombreA="DEMO-"+vseq, especieA=rnd(esp);
      DB.consultaVet.push({fechaHora:ahoraStr(dv),tsMs:tv,especie:especieA,sexoAnimal:rnd(["HEMBRA","MACHO","DESCONOCIDO"]),nombreAnimal:nombreA,propietario:"NO IDENTIFICADO",cedulaPropietario:"",contacto:"",antecedentes:"",motivo:"Demo",diagnostico:"Chequeo de prueba",insumos:"",desenlace:desV,observaciones:"DEMO",veterinario:"Demo"});
      const idV="V-"+fechaId+"-"+pad(9000+vseq,4);
      DB.pacientesVet.push({id:idV,fecha:fechaHoy(dv),hora:horaAhora(dv),tsMs:tv,especie:especieA,sexoAnimal:rnd(["HEMBRA","MACHO","DESCONOCIDO"]),nombreAnimal:nombreA,propietario:"NO IDENTIFICADO",cedulaPropietario:"",contacto:"",antecedentes:"DEMO",motivo:"Demo",diagnostico:"Chequeo de prueba",estado:estadoV,descripcion:"DEMO",desenlace:desV,veterinario:"Demo",actualizado:ahoraStr(dv)});
      if(estadoV==="ESTAB VET"){
        const te=tv+15*60000;
        DB.estabVet.push({fechaHora:ahoraStr(new Date(te)),tsMs:te,idVet:idV,nombreAnimal:nombreA,especie:especieA,solucion:"Hidratación IV + observación",volumen:"",insumosIV:"",horaInicio:horaAhora(new Date(te)),horaFin:"",desenlace:"",obsEntrada:"DEMO",obsSalida:"",respEntrada:"Demo",respSalida:""});
      }
    }
  });
  [["PARACETAMOL CAP 1G x20","Medicamento","caja",40,30,"Humana"],["AMOXICILINA CAP 500MG X12","Medicamento","caja",8,15,"Humana"],["Guantes de examinación (caja)","Insumo","caja",5,10,"Ambos"],["Solución 0.9% (fisiológica) 1000ml","Insumo","unidad",25,10,"Humana"],["Antiparasitario interno (tableta)","Veterinario","caja",3,8,"Veterinaria"]].forEach(function(fx){
    const item=fx[0]; let row=DB.inventario.find(r=>String(r.item).trim().toLowerCase()===item.toLowerCase());
    if(!row){ row={item,categoria:fx[1],unidad:fx[2],stock:fx[3],minimo:fx[4],actualizado:ahoraStr(),area:fx[5]}; DB.inventario.push(row); }
    else { row.stock=fx[3]; row.minimo=fx[4]; row.actualizado=ahoraStr(); }
  });
  await commitAll(TABLAS);
}

/* ==================== ARRANQUE ==================== */
(async function init(){
  // Carga LOCAL instantánea (no bloquea por la red). Usuarios NO se cachea local.
  TABLAS.forEach(t=>{ try{ if(t==="usuarios"){ DB[t]=[]; return; } const raw=localGet("hcrm:"+t); if(raw!=null) LS_CACHE[t]=raw; DB[t]=raw?JSON.parse(raw).map(f=>coerce(t,f)):[]; }catch(e){ DB[t]=[]; } });
  restaurarOLogin();
  // Sincroniza con el Sheet en segundo plano (si hay API_URL)
  if(MODO==="sheet"){
    pullRemoto()
      .then(()=>{ CONN_OK=true; CONN_ERR=null; })
      .catch(e=>{ CONN_OK=false; CONN_ERR=e.message; });
  }
})();
